# crap4rs scorecard configuration for cute-dbt.
#
# Keyed-threshold policy scaffolded at PR 1 — the policy must precede the
# code it governs (per the /plan audit: thresholds-as-adjectives are not
# gates). As each strict-keyed module lands, the keyed threshold applies
# from the same PR.
#
# Threshold semantics: CRAP = comp * (1 - cov)^3 + comp. Lower is better.
# - default <= 25: the conservative starting line for v0.x render glue,
#   CLI wiring, POD-only domain types — surfaces real complexity creep
#   without flagging mundane wiring.
# - strict <= 15: the modules where correctness is load-bearing.

# v0.x defaults (apply to anything not explicitly keyed).
threshold = 25

# Per-path strict overrides. Paths land as their PR lands; the path
# pattern is tolerated until the source file exists (crap4rs treats
# absent paths as no-op).
[[overrides]]
# StateComparator strategy + state:modified scoping (PR 5).
pattern ="src/domain/state.rs"
threshold = 15

[[overrides]]
# Two-stage fail-closed (PR 6). Stage-1 lives in adapters; Stage-2 in
# domain/preflight.rs. The strict threshold applies to both files
# regardless of which module physically holds them.
pattern ="src/domain/preflight.rs"
threshold = 15

[[overrides]]
pattern ="src/adapters/manifest.rs"
threshold = 15

[[overrides]]
# sqlparser CTE engine — graph + join-type edge classification (PR 7).
pattern ="src/adapters/cte_engine.rs"
threshold = 15

[[overrides]]
# THE position/span vocabulary — the half-open byte primitives
# (contains/contains_byte/contains_range/overlaps) + the empty-span guard
# (cute-dbt#444). Off-by-one / underflow bugs here silently mis-bind a zone
# to the wrong node or mis-slice compiled SQL, never crash — correctness-
# load-bearing, strict.
pattern ="src/domain/span.rs"
threshold = 15

[[overrides]]
# THE per-model source-map primitive — the SourceMap assembler
# (`from_cte_graph`) + the derived `compiled_slices`/`node_spans`
# projections + the whole-text terminal-span synthesis (cute-dbt#445,
# source-map-spine S2). The single source of truth `compiled_sql` derives
# from; a silent span-arithmetic or key-derivation bug yields a
# mis-sliced compiled SQL or a DAG node with no code anchor, never a
# crash — correctness-load-bearing, strict.
pattern ="src/domain/source_map.rs"
threshold = 15

[[overrides]]
# Asset-inlining infra (PR 8a). The embedding logic is where bytes-vs-
# templates accidents creep in.
pattern ="src/adapters/asset_embed.rs"
threshold = 15

[[overrides]]
# askama renderer. The composition layer between domain types, CTE
# engine output, and the askama template — payload assembly, node-role
# classification, import-CTE binding, and the run-loop wiring all live
# here. Correctness regressions silently produce wrong reports, not
# crashes.
pattern ="src/adapters/render.rs"
threshold = 15

[[overrides]]
# PR-diff facts + the single normalization authority + block-precise
# `changed` narrowing + inline YAML diff reconstruction (cute-dbt#96).
# The overlap / drift-guard / splice arithmetic is the most correctness-
# load-bearing code in #96 — a silent off-by-one mis-marks a test or
# mis-renders its diff, never crashes.
pattern ="src/domain/pr_diff.rs"
threshold = 15

[[overrides]]
# Cell-level unit-test fixture IR — rows × typed cells, format/engine
# normalized (cute-dbt#98). The cell-typing canonicalizer + the
# hand-rolled RFC 4180 csv parser + the OLD-side YAML row parsers are
# correctness-load-bearing: a silent canonicalization or parser bug
# yields a wrong table (a false "changed"/"unchanged" cell), never a
# crash. The cell-diff algorithm (cell_diff.rs) lands with its own entry.
pattern ="src/domain/unit_test_table.rs"
threshold = 15

[[overrides]]
# Cell-level data-table diff algorithm (cute-dbt#98). Multiset row
# matching + positional residual pairing + the OLD-side YAML region
# slicer + the reconstruction driver are correctness-load-bearing: a
# silent alignment or before<->after bug yields a wrong/misleading diff
# (a false "all changed" on a reorder, or a flipped old/new cell), never
# a crash. The pre-diff IR + parsers live in unit_test_table.rs above.
pattern ="src/domain/cell_diff.rs"
threshold = 15

[[overrides]]
# PR-scope lineage mini-DAG domain core (cute-dbt#352 Slice A). The
# multi-source BFS connector computation (descendants ∩ ancestors of the
# modified set, differing-seed predicate) + the induced-edge filter are
# correctness-load-bearing: a silent connector mis-classification or
# induced-edge bug yields a wrong/misleading PR-shape graph, never a
# crash. Pure-domain graph walks — comfortably under 15.
pattern ="src/domain/pr_dag.rs"
threshold = 15

[[overrides]]
# The ONE cross-model `depends_on` self-inversion site (cute-dbt#443,
# source-map-spine S0). `invert_depends_on` + `ModelLineage::from_manifest`
# are the single producer→consumer inversion the three consumers
# (explore lineage, PR mini-DAG, governance blast-radius) now read instead
# of each re-inverting — a silent inversion bug here mis-shapes every
# downstream lineage view, never crashes. Simple loops; comfortably under
# 15.
pattern ="src/domain/lineage.rs"
threshold = 15

# crap4rs v0.4.0's [[overrides]] schema accepts only `pattern` and
# `threshold`. There is no top-level `exclude` array; to exclude a file
# from gating, add an [[overrides]] entry with a very high threshold
# (with an inline `tracked: …#N` or `adr: …` comment per
# `~/.claude/rules/exclusions.md`). No exclusions defined at v0.1.
