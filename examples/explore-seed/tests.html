/* ============================================================================
   cute-dbt design tokens v1 (cute-dbt#242)
   ----------------------------------------------------------------------------
   The design-system ROOT: the semantic token layer + ALL EIGHT [data-theme]
   blocks, extracted VERBATIM from templates/report.css (the cute-dbt#177
   chassis) at cute-dbt#242 — exact current values, zero value changes.
   Shared by BOTH page families through an askama include (report.html and
   explore-dag.html / explore-tests.html each inline this partial into their
   own <style> block at compile time), so the report and the explore pages
   consume ONE design system structurally. Single-file outputs hold: the
   sharing happens at the template layer, never via a runtime asset.

   FIRST-PARTY asset — authored for cute-dbt. Deliberately NOT listed in
   `assets/MANIFEST.toml` (that index is third-party vendoring provenance);
   its integrity gates are the banner-pin + comment-balance tests in
   `src/adapters/asset_embed.rs`.

   Design sessions: treat THIS file as the design-system root (see
   DESIGN.md). Tokens are law — no new color literals; per-theme,
   surface-scoped AA overrides live with their surfaces in the page
   layers, never here.

   PORTING-BUG GUARD (handoff §2.1): never write a `*` immediately followed
   by `/` inside a comment body — it closes the comment early and silently
   eats the next rule. A comment-balance test pins this.
   ========================================================================== */

/* ============================================================================
   AA pins — do not re-brighten
   ----------------------------------------------------------------------------
   Every theme passes WCAG-AA (>= 4.5:1) on the load-bearing diff add/remove
   pair (pass-2 handoff §2.3, re-pinned for 8 themes at cute-dbt#198). These
   contrast ratios are verified and LOAD-BEARING; do not re-brighten any
   theme's add/remove colors. Re-run the WCAG math on the diff add/remove
   pair for every theme if any code-surface color changes.

   | theme     | add-fg on surface | remove-fg on surface | white on add-chip | white on remove-chip |
   |-----------|-------------------|----------------------|-------------------|----------------------|
   | Light     | 5.02              | 4.83                 | 5.02              | 4.83                 |
   | Solarized | 6.10              | 5.68                 | 4.81              | 5.41                 |
   | Latte     | 5.42              | 5.63                 | 4.98              | 6.01                 |
   | Rosé Pine | 5.37              | 6.24                 | 5.31              | 6.36                 |
   | Dark      | 9.65              | 7.52                 | 5.02              | 4.58                 |
   | Tokyo     | 8.81              | 6.08                 | 5.22              | 4.99                 |
   | Gruvbox   | 6.74              | 4.85                 | 4.86              | 5.47                 |
   | Dracula   | 9.83              | 4.95                 | 4.96              | 5.03                 |

   cute-dbt#251 — the per-theme AA token repair (the #206 deepening
   pattern, applied at TOKEN level — since #264 the tokens live in ONE
   place, so deepening here repairs the report AND explore pages
   simultaneously; the older surface-scoped overrides in report.css
   predate this and stay). The #264 adversarial verification measured
   the shared palette sub-AA on 5 of 8 themes; the values below were
   adjusted minimally (lightness-only shifts, hue/saturation kept) so
   EVERY combo clears 4.5:1 — pinned by the report + explore AA matrix
   guards in tests/headless_toggle.rs (universal: all 8 themes,
   effective composited backdrops). Do not re-brighten:
     · --text-muted on the worst of bg/bg-alt/surface/surface-2/
       code-header-bg/code-bg (solarized 4.58, latte 5.14,
       rosepine 4.82, tokyo 4.58, gruvbox 4.59);
     · --accent (and --accent-hover) on the worst of bg/bg-alt/surface
       (accent: solarized 4.57, latte 4.77, rosepine 4.59; hover:
       latte 4.55, rosepine 4.56);
     · --code-add/rem-sigil on their composited add/rem rows (all
       themes >= 4.55 at FULL opacity — `.diff-sigil` opacity dimming
       was removed at #251 per the #227 composited-opacity rule);
     · body --text on --code-add/rem-word composited over row + code-bg
       (all themes >= 4.56; the dark themes' word-tint alphas were
       lowered, the light themes' rem-word hexes lightened).
   Latte/rosepine muted + latte accent adopt the themes' OWN deeper
   steps already established by the #198/#227 scoped stand-ins
   (Catppuccin subtext1 #5c5f77, latte blue #1a5cdd, rosepine #5d5780).
   Light and Dark are untouched (they already passed everywhere).
   ========================================================================== */

/* ============================================================================
   1. TOKEN LAYER  (engine/tokens.css)
   ----------------------------------------------------------------------------
   Semantic design tokens (the ~50 hardcoded report hexes collapsed to ~24
   themeable tokens) + a density layer (set by the *direction* stylesheet, not
   the theme) + eight [data-theme] blocks.

   TWO ORTHOGONAL AXES
     · THEME  (data-theme on <html>): colour identity. 8 of them.
     · DIRECTION (a separate stylesheet): density + feel. 4 of them.

   Theme families (kept in lockstep with the settings-panel theme grid):
     · light : Light, Solarized, Catppuccin Latte, Rosé Pine Dawn
     · dark  : Dark, Tokyo Night, Gruvbox, Dracula

   FIXED-ACROSS-THEMES (intentionally NOT overridden per theme):
     · the DAG role/edge palette (Okabe-Ito, colourblind-safe) — handoff §5.
     · the diff "strong marker" chips (white-on-fill, AA everywhere).
   Everything else themes.
   ========================================================================== */

:root {
  /* ---- surfaces ------------------------------------------------------- */
  --bg:            #ffffff;   /* page */
  --bg-alt:        #f5f6f8;   /* code blocks, callouts, sunken wells */
  --surface:       #ffffff;   /* cards / panels */
  --surface-2:     #f1f2f4;   /* control chrome, switch tracks */

  /* ---- text ----------------------------------------------------------- */
  --text:          #33363d;   /* body */
  --text-muted:    #6a6e78;   /* labels, hints, captions */
  --text-faint:    #9aa0ab;   /* absent cells, disabled */

  /* ---- lines ---------------------------------------------------------- */
  --border:        #d9dce1;   /* dividers, inputs, panels */
  --border-strong: #b9bdc6;   /* emphasised dividers */

  /* ---- accent (themes + Tweakable) ------------------------------------ */
  --accent:         #1d7484;  /* links, focus, active control, table rule */
  --accent-hover:   #155c69;
  --accent-tint:    #e3f0f2;  /* faint accent wash */
  --accent-on:      #ffffff;  /* text on a solid accent fill */

  /* ---- control chrome (segmented toggles, settings switches) ---------- */
  --control-bg:        var(--surface-2);
  --control-fg:        var(--text);
  --control-border:    var(--border);
  --control-active-bg: #2a2d34;
  --control-active-fg: #ffffff;

  /* ---- diff: text-on-surface (LOAD-BEARING, AA per theme) ------------- */
  --diff-add-fg:    #15803d;  /* "new" scalar text */
  --diff-remove-fg: #dc2626;  /* "old" scalar text */
  --diff-arrow:     var(--text-muted);
  --diff-add-row:    rgba(46, 160, 67, 0.07);   /* whole-row tint */
  --diff-remove-row: rgba(244, 63, 94, 0.07);
  --diff-add-edge:    rgba(46, 160, 67, 0.85);  /* inset left accent */
  --diff-remove-edge: rgba(244, 63, 94, 0.85);

  /* ---- diff: strong marker chip (CONSTANT — white-on-fill, AA) -------- */
  --diff-add-chip:    #15803d;  /* green fill, white text ≈ 5.0:1   */
  --diff-remove-chip: #dc2626;  /* red fill,   white text ≈ 4.8:1   */
  --diff-chip-on:     #ffffff;
  --col-add-chip:     #a6f0b8;  --col-add-on:    #04260f;
  --col-remove-chip:  #ffabd6;  --col-remove-on: #26000a;

  /* ---- badges / incremental ------------------------------------------ */
  --badge-amber:    #b07400;  /* incremental affordances */
  --badge-amber-bg: #fff8e1;
  --badge-amber-edge: #E69F00;

  /* ---- syntax (cool/neutral; never red/green) ------------------------ */
  --syntax-keyword: #4338ca;
  --syntax-string:  #0e7490;
  --syntax-comment: #555a66;
  --syntax-jinja:   #7c3aed;
  --syntax-fold:    #4338ca;
  --syntax-fold-bg: rgba(67, 56, 202, 0.07);

  /* ---- code surface (GitHub-grade frame + unified diff) -------------- */
  --code-bg:          #ffffff;   /* the code canvas */
  --code-header-bg:   #f6f8fa;   /* toolbar strip + file header */
  --code-gutter-bg:   #ffffff;   /* line-number rail (plain blocks) */
  --code-gutter-fg:   #9aa0ab;   /* line numbers */
  --code-line-hover:  rgba(27,31,36,0.035);
  /* unified-diff rows (full-bleed tint) + their gutter rail + word-emphasis */
  --code-add-bg:        #e6ffec;  --code-add-gutter: #ccffd6;  --code-add-word: #abf2bc;
  --code-rem-bg:        #ffebe9;  --code-rem-gutter: #ffd7d5;  --code-rem-word: #ff9c98;
  --code-hunk-bg:       #ddf4ff;  --code-hunk-fg:    #4b5563;  /* fold / "show N" rows */
  --code-add-sigil:     #1a7f37;  --code-rem-sigil:  #cf222e;

  /* ---- feedback ------------------------------------------------------- */
  --warn:     #a06320;
  --error:    #b3261e;
  --error-bg: #fdecea;

  /* ---- tooltip (dark bubble, constant) ------------------------------- */
  --tooltip-bg: #1d1d22;
  --tooltip-fg: #f5f5f7;

  /* ====================================================================
     FIXED DAG PALETTE — identical in every theme (handoff §5).
     The DAG must read the same colourblind-safe way regardless of skin.
     ==================================================================== */
  --dag-import-fill:   #e8f1f8;  --dag-import-stroke:   #0072B2;
  --dag-transform-fill:#f4f4f5;  --dag-transform-stroke:#8a8a90;
  --dag-final-fill:    #fdf2dc;  --dag-final-stroke:    #E69F00;
  --dag-node-text:     #1c1c1f;
  --dag-selected:      #E91E63;  /* pink, reserved for selection only */
  /* edge types (Okabe-Ito) */
  --edge-from:  #1c1c1f;  --edge-inner:  #009E73;  --edge-left: #0072B2;
  --edge-right: #56B4E9;  --edge-cross:  #CC79A7;  --edge-full: #982c61;
  --edge-union-all: #E69F00;  --edge-union-distinct: #0072B2;

  /* ---- DENSITY (defaults; the DIRECTION stylesheet overrides these) --- */
  --fs-base:   13px;
  --lh-base:   1.5;
  --fs-label:  10.5px;
  --pad-cell:  0.2rem 0.5rem;
  --pad-panel: 1rem;
  --gap-section: 1rem;
  --radius-sm:  4px;
  --radius-pan: 6px;
  --rule-w:     1px;        /* hairline weight */
  --font-ui:   system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --label-font: var(--font-ui);   /* directions can flip labels to mono */
  --label-tracking: 0.06em;
}

  // (templates/partials/tokens.css), light family first (design pass-2,
  // cute-dbt#198) — kept in lockstep with the report's static theme grid.
  // `dark` drives the html.dark class DataTables' vendored dark rules key on.
  var THEMES = [
    { id: "light",     dark: false },
    { id: "solarized", dark: false },
    { id: "latte",     dark: false },
    { id: "rosepine",  dark: false },
    { id: "dark",      dark: true  },
    { id: "tokyo",     dark: true  },
    { id: "gruvbox",   dark: true  },
    { id: "dracula",   dark: true  }
  ];

  // Accent palettes: value / hover / tint triples applied as inline custom
  // properties on <html>. "theme" = remove the override (the active theme's
  // own accent shows through).
  var ACCENTS = [
    { id: "theme" },
    { id: "teal",   v: "#1d7484", h: "#155c69", t: "#e3f0f2" },
    { id: "blue",   v: "#2a6fdb", h: "#1f57b0", t: "#e6eefb" },
    { id: "violet", v: "#7c3aed", h: "#6027c4", t: "#efe8fd" },
    { id: "green",  v: "#1f8a5b", h: "#176d47", t: "#e2f3ec" },
    { id: "amber",  v: "#b45c0c", h: "#8f4708", t: "#fbeede" }
  ];

  // The public localStorage key for the appearance state — a stable consumer
  // contract (cute-dbt#178 AC3), not a credential. Cross-page since #242:
  // every cute-dbt page family reads + applies this same key.
  var KEY = "cute-dbt.appearance.v1"; // gitleaks:allow — a public storage key name, no secret
  // `engine` (cute-dbt#180) is the DAG-engine picker: "mermaid" (the static
  // default) or "cytoscape" (the opt-in interactive engine).
  // `coverage` (cute-dbt#219) is the viewer-side coverage-intelligence
  // display toggle: "off" (the default since cute-dbt#292 — the settings
  // panel's Experimental group; the field may be absent) or the explicit
  // opt-in "on". The CROSS-PAGE contract: any cute-dbt page that renders
  // check-engine-derived content reads this same field — the report keys
  // one CSS rule on html[data-coverage=off]; the explorer pages adopt it
  // as #103/#104 land.
  // `project` (cute-dbt#292) is the viewer-side project-state display
  // toggle: "on" (default; the field may be absent) or "off". Emission is
  // already opt-in at render time (the cute-dbt#291 experimental gate), so
  // the viewer default SHOWS what the producer chose to emit; the report
  // keys CSS rules on html[data-project=off].
  var pref = { theme: null, style: "soft", accent: "theme", density: "auto", difflayout: "auto", engine: "mermaid", coverage: "off", project: "on" };

  // Read the persisted appearance, string-typed keys only. Any storage error
  // (file:// SecurityError, disabled storage) leaves the defaults intact.
  function load() {
    var raw;
    try { raw = window.localStorage && window.localStorage.getItem(KEY); } catch (e) { raw = null; }
    if (!raw) return;
    try {
      var p = JSON.parse(raw);
      if (p && typeof p === "object") {
        ["theme", "style", "accent", "density", "difflayout", "engine", "coverage", "project"].forEach(function (k) {
          if (typeof p[k] === "string") pref[k] = p[k];
        });
      }
    } catch (e) { /* ignore — defaults hold */ }
    // Coerce the engine into its closed vocabulary — an unknown persisted
    // value must fall back to the static default, never reach the dispatcher.
    if (pref.engine !== "cytoscape") pref.engine = "mermaid";
    // Same closed-vocabulary coercion for the coverage toggle (cute-dbt#219;
    // default flipped OFF at cute-dbt#292): anything but the explicit "on"
    // reads as the default OFF.
    if (pref.coverage !== "on") pref.coverage = "off";
    // And for the project-state display toggle (cute-dbt#292): anything but
    // the explicit "off" reads as the default ON — emission is already
    // opt-in at render time (cute-dbt#291).
    if (pref.project !== "off") pref.project = "on";
  }
  // Persist the current appearance. Swallows any storage error (zero-egress
  // in-memory fallback, mirrors interaction.js saveSettings).
  function save() {
    try { if (window.localStorage) window.localStorage.setItem(KEY, JSON.stringify(pref)); } catch (e) { /* in-memory only */ }
  }

  var root = document.documentElement;

  function themeById(id) {
    for (var i = 0; i < THEMES.length; i++) if (THEMES[i].id === id) return THEMES[i];
    return THEMES[0];
  }

  function applyTheme(id) {
    var t = themeById(id);
    root.setAttribute("data-theme", t.id);
    root.classList.toggle("dark", t.dark); // DataTables dark rules follow html.dark
    pref.theme = t.id;
  }
  function applyAccent(id) {
    var a = null;
    for (var i = 0; i < ACCENTS.length; i++) if (ACCENTS[i].id === id) a = ACCENTS[i];
    if (!a || a.id === "theme") {
      root.style.removeProperty("--accent");
      root.style.removeProperty("--accent-hover");
      root.style.removeProperty("--accent-tint");
      pref.accent = "theme";
    } else {
      root.style.setProperty("--accent", a.v);
      root.style.setProperty("--accent-hover", a.h);
      root.style.setProperty("--accent-tint", a.t);
      pref.accent = a.id;
    }
  }
  function applyDensity(d) {
    if (d === "auto") root.removeAttribute("data-density");
    else root.setAttribute("data-density", d);
    pref.density = d;
  }
  function applyDiffLayout(v) {
    root.setAttribute("data-difflayout", v);
    pref.difflayout = v;
  }
  function applyStyle(s) {
    root.setAttribute("data-style", s);
    pref.style = s;
  }
  // cute-dbt#219 — the coverage-intelligence display toggle. PURE display:
  // OFF sets html[data-coverage=off] (one CSS rule hides every
  // check-engine-derived surface); ON removes the attribute and the
  // already-rendered content shows again — no re-render, payload untouched.
  // Default OFF since cute-dbt#292 (the Experimental settings group), so an
  // unknown value reads as OFF.
  function applyCoverage(v) {
    var coverage = v === "on" ? "on" : "off";
    if (coverage === "off") root.setAttribute("data-coverage", "off");
    else root.removeAttribute("data-coverage");
    pref.coverage = coverage;
  }
  // cute-dbt#292 — the project-state display toggle, the applyCoverage
  // twin with the OPPOSITE default polarity (emission is already opt-in at
  // render time, so an unknown value reads as ON): OFF sets
  // html[data-project=off] — CSS hides the project-definition panel and the
  // per-model provenance/var chips; ON removes the attribute. PURE display:
  // no re-render, payload untouched.
  function applyProject(v) {
    var project = v === "off" ? "off" : "on";
    if (project === "off") root.setAttribute("data-project", "off");
    else root.removeAttribute("data-project");
    pref.project = project;
  }

  // ---- boot: load, resolve the default theme, apply everything ----------
  load();
  // Default theme: saved -> prefers-color-scheme -> light.
  if (!pref.theme) {
    pref.theme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  applyStyle(pref.style);
  applyTheme(pref.theme);
  applyAccent(pref.accent);
  applyDensity(pref.density);
  applyDiffLayout(pref.difflayout);
  applyCoverage(pref.coverage);
  applyProject(pref.project);

  // The page-facing seam: templates/theme.js (the report's settings UI)
  // drives the engine through this object — `pref` is the ONE live state
  // (shared by reference; apply* mutate it, save() persists it).
  window.CuteAppearance = {
    key: KEY,
    pref: pref,
    save: save,
    applyTheme: applyTheme,
    applyStyle: applyStyle,
    applyAccent: applyAccent,
    applyDensity: applyDensity,
    applyDiffLayout: applyDiffLayout,
    applyCoverage: applyCoverage,
    applyProject: applyProject
  };
})();
/* end of cute-dbt shared appearance engine v1 (cute-dbt#242) */

</script>
<script>

/* cute-dbt explore tests viewer v1 (cute-dbt#102)
   ----------------------------------------------------------------------------
   The unit-test viewer on explore's tests.html: renders the selected
   test's description, badges, given fixtures and expected table into the
   SHARED test-card partial (templates/partials/test-card.html — the same
   markup report.html renders), reading the embedded `cute-dbt-data`
   ReportPayload (the build_payload reuse seam).

   Deliberately a LIGHT sibling of the report's interaction engine, not a
   copy: no jQuery, no DataTables, no diff toggles (explore is
   full-manifest — there is no changed-set and no PR diff to tint), no
   Mermaid/Cytoscape. The Current-view fixture grids render the SAME
   Rust-computed FixtureTable POD ({display, key} cells, cute-dbt#138)
   the report renders, so the two surfaces cannot drift on cell
   semantics.

   Affordances:
   - the test selector (the partial's #test-select) lists every unit
     test, optgrouped by model;
   - each index row's test-name button (data-test-id) selects that test
     in the viewer;
   - NULL / absent cells keep the report's vocabulary (.cell-null /
     .cell-absent); sql-format fixtures render as a code block; external
     fixture files surface the provenance note instead of a silently
     empty grid (the cute-dbt#126 contract).

   DOM discipline: every dynamic string lands via createElement +
   textContent — never an HTML-string sink (the asset_embed banner test
   pins this). First-party, NOT vendored: lives at templates/explore-tests.js,
   embedded via asset_embed::EXPLORE_TESTS_JS (include_str!). Banner-pin
   + end-of-file-sentinel tests guard the include. */
(function () {
  "use strict";

  var carrier = document.getElementById("cute-dbt-data");
  var viewer = document.querySelector(".explore-viewer");
  var select = document.getElementById("test-select");
  if (!carrier || !viewer || !select) return;
  var data = JSON.parse(carrier.textContent);

  // Flat id -> {model, test} index over the payload (prototype-less so a
  // hostile test id can never collide with a built-in property).
  var byId = Object.create(null);
  var total = 0;
  (data.models || []).forEach(function (m) {
    (m.tests || []).forEach(function (t) {
      byId[t.id] = { model: m, test: t };
      total += 1;
    });
  });
  if (!total) {
    viewer.hidden = true;
    return;
  }

  // ---- tiny DOM helpers (textContent only) --------------------------------
  function el(tag, cls, text) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function rowsText(n) {
    return n + " row" + (n === 1 ? "" : "s");
  }

  // ---- fixture-shape predicates (the interaction.js vocabulary) -----------
  function isSqlCodeBlock(obj) {
    return Boolean(obj && obj.format === "sql" && typeof obj.rows === "string");
  }

  function isExternalFixture(obj) {
    return Boolean(obj && obj.fixture && (obj.rows === null || obj.rows === undefined));
  }

  function isLoadedExternalFixture(obj) {
    return Boolean(obj && obj.fixture && obj.rows !== null && obj.rows !== undefined);
  }

  function provenanceChip(name) {
    var chip = el("span", "fixture-provenance", "from ");
    chip.appendChild(el("code", "", String(name)));
    return chip;
  }

  function externalNote(name) {
    var box = el("div", "given-empty external-fixture-note",
      "data in external fixture file: ");
    box.appendChild(el("code", "", String(name)));
    return box;
  }

  function sqlBlock(text) {
    var pre = el("pre", "sql-block");
    pre.appendChild(el("code", "", String(text)));
    return pre;
  }

  // ---- the Current-view grid off the Rust FixtureTable POD ----------------
  function cellTd(cell) {
    var td = document.createElement("td");
    var key = cell && cell.key;
    if (!key || key.t === "null") {
      td.className = "cell-null";
      td.textContent = "NULL";
      return td;
    }
    if (key.t === "absent") {
      td.className = "cell-absent";
      return td;
    }
    if (key.t === "number") td.className = "cell-num";
    td.textContent = cell.display;
    return td;
  }

  function buildTable(table, cls) {
    var tbl = el("table", cls);
    var thead = document.createElement("thead");
    var hr = document.createElement("tr");
    (table.columns || []).forEach(function (c) {
      hr.appendChild(el("th", "", c));
    });
    thead.appendChild(hr);
    tbl.appendChild(thead);
    var tbody = document.createElement("tbody");
    (table.rows || []).forEach(function (r) {
      var tr = document.createElement("tr");
      (r.cells || []).forEach(function (cell) {
        tr.appendChild(cellTd(cell));
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    return tbl;
  }

  // ---- per-test render -----------------------------------------------------
  function renderGiven(g) {
    var sec = el("section", "given-section");
    var hdr = el("div", "table-header");
    hdr.appendChild(el("h4", "table-title", "given · " + g.input));
    if (g.is_this) hdr.appendChild(el("span", "this-badge", "prior model state"));
    if (isLoadedExternalFixture(g)) hdr.appendChild(provenanceChip(g.fixture));
    if (isSqlCodeBlock(g)) {
      hdr.appendChild(el("span", "format-badge", "format: sql"));
      sec.appendChild(hdr);
      sec.appendChild(sqlBlock(g.rows));
      return sec;
    }
    if (isExternalFixture(g)) {
      if (g.format) hdr.appendChild(el("span", "format-badge", "format: " + g.format));
      sec.appendChild(hdr);
      sec.appendChild(externalNote(g.fixture));
      return sec;
    }
    var table = g.table || { columns: [], rows: [] };
    if (g.format && g.format !== "dict") {
      hdr.appendChild(el("span", "format-badge", "format: " + g.format));
    }
    hdr.appendChild(el("span", "row-count-badge", rowsText(table.rows.length)));
    sec.appendChild(hdr);
    sec.appendChild(buildTable(table, "given-table"));
    return sec;
  }

  function renderExpected(t) {
    var body = document.querySelector(".expected-body");
    var rowcount = document.querySelector(".expected-rowcount");
    clear(body);
    if (isLoadedExternalFixture(t.expected)) {
      body.appendChild(provenanceChip(t.expected.fixture));
    }
    if (isSqlCodeBlock(t.expected)) {
      rowcount.textContent = "format: sql";
      body.appendChild(sqlBlock(t.expected.rows));
      return;
    }
    if (isExternalFixture(t.expected)) {
      rowcount.textContent = "external fixture";
      body.appendChild(externalNote(t.expected.fixture));
      return;
    }
    var table = (t.expected && t.expected.table) || { columns: [], rows: [] };
    rowcount.textContent = rowsText(table.rows.length);
    body.appendChild(buildTable(table, "expected-table"));
  }

  function renderTest(t) {
    // Description (the partial's hidden-when-absent contract).
    var desc = document.querySelector(".test-description");
    if (t.description) {
      desc.textContent = t.description;
      desc.hidden = false;
    } else {
      desc.textContent = "";
      desc.hidden = true;
    }
    // Badges: tag chips (kept light — explore has no diff badges).
    var badges = document.querySelector(".test-badges");
    clear(badges);
    (t.tags || []).forEach(function (tag) {
      badges.appendChild(el("span", "tag-badge", tag));
    });
    // Details body: where the test was authored.
    var details = document.querySelector(".test-details-body");
    clear(details);
    if (t.defined_in) {
      var p = el("p", "test-defined-in", "defined in ");
      p.appendChild(el("code", "", t.defined_in));
      details.appendChild(p);
    }
    // Given panel.
    var givenWrap = document.querySelector(".left-panel-body");
    clear(givenWrap);
    if (!t.given || !t.given.length) {
      givenWrap.appendChild(el("div", "empty-hint", "No fixtures defined for this test."));
    } else {
      t.given.forEach(function (g) { givenWrap.appendChild(renderGiven(g)); });
    }
    // Expected panel.
    renderExpected(t);
  }

  function selectTest(id) {
    var entry = byId[id];
    if (!entry) return;
    if (select.value !== id) select.value = id;
    renderTest(entry.test);
  }

  // ---- selector population + wiring ----------------------------------------
  (data.models || []).forEach(function (m) {
    if (!m.tests || !m.tests.length) return;
    var og = document.createElement("optgroup");
    og.label = m.name;
    m.tests.forEach(function (t) {
      var opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name;
      og.appendChild(opt);
    });
    select.appendChild(og);
  });

  select.addEventListener("change", function () { selectTest(select.value); });

  // Index rows: each test-name button jumps the viewer to its test.
  Array.prototype.forEach.call(
    document.querySelectorAll(".test-jump[data-test-id]"),
    function (btn) {
      btn.addEventListener("click", function () {
        selectTest(btn.getAttribute("data-test-id"));
        if (viewer.scrollIntoView) viewer.scrollIntoView({ block: "start" });
      });
    }
  );

  // Boot: the first test in payload order.
  selectTest(select.value);
})();
/* end of cute-dbt explore tests viewer v1 (cute-dbt#102) */

/* cute-dbt#270 — the project pane on tests.html (identity + standing vars
   inventory). A SEPARATE IIFE so it renders independently of the unit-test
   viewer's guard (a test-free manifest still shows project context). Reads
   the `explore-project-data` carrier; absent ⇒ no-op (the pane shell is
   gated off server-side). createElement / textContent only. */
(function () {
  "use strict";
  var carrier = document.getElementById("explore-project-data");
  var paneEl = document.querySelector(".project-pane");
  if (!carrier || !paneEl) return;
  var pane = JSON.parse(carrier.textContent);
  if (!pane) return;

  function el(tag, className, text) {
    var out = document.createElement(tag);
    if (className) out.className = className;
    if (text !== undefined && text !== null) out.textContent = String(text);
    return out;
  }
  function fact(dl, label, valueNode) {
    dl.appendChild(el("dt", null, label));
    var dd = document.createElement("dd");
    dd.appendChild(valueNode);
    dl.appendChild(dd);
  }
  function formatValue(value) {
    if (typeof value === "string") return value;
    try { return JSON.stringify(value); } catch (e) { return String(value); }
  }

  while (paneEl.firstChild) paneEl.removeChild(paneEl.firstChild);
  paneEl.appendChild(el("summary", null, "Project"));

  var identity = el("dl", "project-identity", null);
  fact(identity, "name", el("code", null, pane.name || "—"));
  if (pane.version) fact(identity, "version", el("code", null, pane.version));
  if (pane.require_dbt_version) {
    fact(identity, "require-dbt-version", el("code", null, pane.require_dbt_version));
  }
  paneEl.appendChild(identity);

  paneEl.appendChild(el("p", "project-section-title", "vars"));
  if (pane.vars && pane.vars.length) {
    var table = el("table", "vars-table", null);
    var head = document.createElement("tr");
    ["var", "value", "direct", "config", "macro"].forEach(function (h) {
      head.appendChild(el("th", h === "var" || h === "value" ? null : "vars-count", h));
    });
    table.appendChild(head);
    pane.vars.forEach(function (v) {
      var row = document.createElement("tr");
      var nameCell = document.createElement("td");
      nameCell.appendChild(el("code", null, v.name));
      if (v.scope && v.scope.package) {
        nameCell.appendChild(document.createTextNode(" "));
        nameCell.appendChild(el("span", "vars-scope", "(" + v.scope.package + ")"));
      }
      row.appendChild(nameCell);
      row.appendChild(el("td", null, formatValue(v.value)));
      row.appendChild(el("td", "vars-count", String(v.direct)));
      row.appendChild(el("td", "vars-count", String(v.config)));
      row.appendChild(el("td", "vars-count", String(v.macros)));
      table.appendChild(row);
    });
    paneEl.appendChild(table);
    var fp = pane.vars_footprint || {};
    var note = "scanned " + (fp.models_scanned || 0) + " model(s), "
      + (fp.macros_scanned || 0) + " macro body(ies)";
    if (fp.python_models) { note += " — " + fp.python_models + " python model(s) not SQL-scanned"; }
    paneEl.appendChild(el("p", "project-footprint", note));
  } else {
    paneEl.appendChild(el("p", "vars-empty", "this project declares no vars"));
  }

  paneEl.open = true;
  paneEl.hidden = false;
})();
/* end of cute-dbt#270 explore project pane (tests.html) */

</script>
</body>
