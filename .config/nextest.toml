# cargo-nextest configuration for cute-dbt.
#
# The BDD outer-loop binary (`tests/bdd.rs`) uses cucumber-rs's
# `harness = false` mode — the cucumber runner replaces libtest's
# harness with its own dispatcher. nextest cannot enumerate scenarios
# from such a binary; trying to list its tests fails with exit code 2.
# We exclude the bdd binary from every nextest profile so
# `cargo nextest run --all-targets` succeeds without manual filters.
# The bdd target is invoked via plain `cargo test --test bdd` in its
# own CI job and locally via `cargo test --test bdd`.

[profile.default]
default-filter = "all() - binary(bdd)"

# Mutation-testing profile (cute-dbt#143): a mutant that breaks cursor
# advancement in a scan-loop helper hangs some lib test forever; plain
# `cargo test` then cannot exit to report the kill-test's failure, so the
# suite verdict degrades to an inconclusive TIMEOUT. nextest runs
# process-per-test and TERMINATES hung tests as failures, converting
# those hangs into genuine CAUGHT verdicts.
#
# fixture_manifest_listed is additionally filtered here: it enumerates
# committed files via `git ls-files`, and cargo-mutants scratch copies
# carry no `.git` dir, so the gate fails there spuriously. This is a
# profile-scoped filter, NOT a coverage exclusion — the gate still runs
# in the default profile, lefthook, and CI.
[profile.mutants]
default-filter = "all() - binary(bdd) - binary(fixture_manifest_listed)"
slow-timeout = { period = "5s", terminate-after = 1 }
