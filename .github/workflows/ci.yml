name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

# Workflow-level least-privilege default. The auto-injected GITHUB_TOKEN
# is scoped to `contents: read` for every job; no job here pushes back to
# the repo, comments on PRs, or hits the GitHub API with credentials. If
# a future job needs more (e.g. a release-publish step), grant it
# per-job rather than widening the workflow default. See cute-dbt#27.
permissions:
  contents: read

# Security note: every `run:` in this workflow is a static script. None of the
# run blocks interpolate untrusted GitHub event inputs (issue/PR titles, commit
# messages, head refs). The only `${{ … }}` uses are `github.ref` for cache
# keying and matrix values that are static within this file.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86
          - os: macos-latest
            name: macos-arm
          - os: macos-15-intel
            name: macos-x86
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-nextest@0.9
      - run: cargo nextest run --all-targets --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-llvm-cov@0.6
      # 85% threshold — not relaxed for v0.x. Bootstrap surface (placeholder
      # cli::run + main) hits 100% via tests/binary_smoke.rs + cli::run unit
      # test. Real coverage of run loop / CTE engine / renderer arrives with
      # their PRs.
      - run: cargo llvm-cov nextest --locked --fail-under-lines 85 --lcov --output-path lcov.info
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lcov
          path: lcov.info
          retention-days: 7

  msrv:
    # Version-agnostic job name (cute-dbt#266): the enforced version lives
    # ONLY in Cargo.toml `rust-version` + the `toolchain:` pin below, so an
    # MSRV bump never needs a branch-protection rename again. Currently
    # 1.88 (dbt-yaml's MSRV).
    name: MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@c56a35af9328d0bc581dc86c05e58f97f7c38a0e # 1.88
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets --locked

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # SHA-pinned: cargo-deny is the supply-chain gate itself; a tag-poisoning
      # attack on the action would silently disable every other supply-chain
      # check.
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
        with:
          command: check

  docs:
    name: cargo doc (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --no-deps --document-private-items --locked

  non-mirror-guard:
    # Rejects "pattern completion" additions to apparatus this single-crate
    # tool does not need — explicitly documented in ARCHITECTURE.md
    # "Conscious non-mirrors". The structural mechanism is the absence of
    # these constructs at bootstrap; this CI job preserves the absence over
    # time. ARCHITECTURE explicitly anticipates a future agent "completing
    # the pattern" — this job is the mechanical guard against that failure
    # mode.
    name: Non-mirror guard (no workspace / no deny.wrappers / no API shim)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Reject ADR-1 non-mirror tripwires
        run: |
          set -euo pipefail
          fail=0
          if grep -qE '^\[workspace\]' Cargo.toml; then
            echo "::error::non-mirror-guard: Cargo.toml must not declare a [workspace] table — see ARCHITECTURE.md 'Conscious non-mirrors'"
            fail=1
          fi
          if grep -qE '^[[:space:]]*\[bans\.deny\.wrappers\]|^[[:space:]]*deny\.wrappers[[:space:]]*=' deny.toml; then
            echo "::error::non-mirror-guard: deny.toml must not use bans.deny.wrappers (proc-macro chain fragility; no AST-purity invariant here)"
            fail=1
          fi
          if grep -rEn '^[[:space:]]*pub[[:space:]]+use[[:space:]]+crate::[a-zA-Z_]+::' src/lib.rs; then
            echo "::error::non-mirror-guard: no public-API re-export shim pattern (single crate, no library consumers)"
            fail=1
          fi
          exit "$fail"

  edge-vocab-completeness:
    # Guards that every EdgeType variant declared in domain/cte.rs is
    # carried through the render layer in two places:
    #   1. `edge_type_wire_key` in src/adapters/render.rs — an exhaustive
    #      Rust match producing the snake_case wire key per variant. The
    #      compile-time exhaustiveness is the primary mechanism (a new
    #      variant fails to compile); this CI grep is belt-and-braces
    #      against the function being renamed or moved.
    #   2. the `JOIN_COLORS_LIGHT`/`JOIN_COLORS_DARK` maps in
    #      templates/interaction.js (the first-party engine the template
    #      inlines, cute-dbt#178) — the JS palettes keyed by snake_case
    #      wire key. The renderer's edge_type field serializes via serde
    #      rename_all="snake_case", so the JS maps must contain each
    #      snake_case wire key as a property; a missing key surfaces as a
    #      gray fallback color and no legend entry.
    name: EdgeType enum/label completeness guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Every EdgeType variant covered by render layer
        run: |
          set -euo pipefail
          # Extract all variant names from the EdgeType enum declaration.
          variants=$(grep -A 40 'pub enum EdgeType' src/domain/cte.rs \
            | grep -oE '^[[:space:]]+[A-Z][A-Za-z]+,' \
            | tr -d ' ,' | sort -u)
          # 1. Every EdgeType variant must appear in `edge_type_wire_key`.
          covered_rs=$(grep -oE 'EdgeType::[A-Z][A-Za-z]+' src/adapters/render.rs \
            | grep -oE '[A-Z][A-Za-z]+$' | sort -u)
          missing_rs=$(comm -23 <(printf '%s\n' "$variants") <(printf '%s\n' "$covered_rs"))
          if [ -n "$missing_rs" ]; then
            echo "::error::edge-vocab-completeness: EdgeType variants missing from src/adapters/render.rs: $missing_rs"
            exit 1
          fi
          # 2. Every variant's snake_case wire key must appear in
          #    `templates/interaction.js`'s JOIN_COLORS_LIGHT/_DARK maps
          #    (one key per line, the format this grep line-anchors on).
          #    Derive the snake_case form (CamelCase -> snake_case) via awk
          #    so the gate does not need a Rust pass. Checked per-palette so
          #    a key missing from only the dark variant still fails.
          snake_keys=$(printf '%s\n' "$variants" \
            | awk '{ s=""; for(i=1;i<=length($0);i++){c=substr($0,i,1); if(c~/[A-Z]/ && i>1){s=s"_"} s=s tolower(c)} print s }' \
            | sort -u)
          for palette in JOIN_COLORS_LIGHT JOIN_COLORS_DARK; do
            covered_js=$(awk "/var ${palette} = \\{/,/\\};/" templates/interaction.js \
              | grep -oE '^[[:space:]]*[a-z_]+:' | tr -d ' :' | sort -u)
            missing_js=$(comm -23 <(printf '%s\n' "$snake_keys") <(printf '%s\n' "$covered_js"))
            if [ -n "$missing_js" ]; then
              echo "::error::edge-vocab-completeness: snake_case EdgeType wire keys missing from templates/interaction.js ${palette}: $missing_js"
              exit 1
            fi
          done

  baseline-required-grep:
    # The locked policy decision: --baseline-manifest is a required CLI
    # argument on the `report` verb; omitting it is a clap usage error
    # (NOT a PreflightError). This job makes that policy a structural CI
    # invariant — every feature scenario invoking `cute-dbt report` must
    # pass exactly one scope source (--baseline-manifest OR --pr-diff,
    # cute-dbt#85), except scenarios explicitly tagged
    # @no-baseline-usage-error (the deliberate neither-source case that
    # exercises the usage-error path itself). Since the cute-dbt#100 verb
    # restructure the gate is VERB-AWARE: `cute-dbt explore` invocations
    # are allowed through (the explorer takes no scope source by design),
    # while bare verbless invocations and report-without-a-source are
    # flagged. A ZERO-MATCH TRIPWIRE fails the gate loudly if the trigger
    # prose ever matches nothing — the pre-#100 gate keyed on literal
    # prose a verb rename would have silently broken.
    name: Baseline-required scenario invariant
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Every report scenario must use a scope source
        run: |
          set -euo pipefail
          # Gherkin tag semantics: a tag line applies to the NEXT scenario.
          # We track `pending_skip` on a tag line, then promote it to `skip`
          # when the Scenario header is seen and reset both. This avoids
          # flagging the very scenario that the @no-baseline-usage-error tag
          # is meant to exempt.
          if ! awk '
            /^[[:space:]]*@no-baseline-usage-error([[:space:]]|$)/ { pending_skip=1; next }
            /^[[:space:]]*Scenario(:|[[:space:]]+Outline)/ { skip=pending_skip; pending_skip=0; next }
            /cute-dbt( report| explore)? with --manifest/ {
              matched++
              # The explore verb takes no scope source by design (cute-dbt#100).
              if ($0 ~ /cute-dbt explore with /) next
              # Flags BOTH report-without-a-source and bare verbless
              # invocations (the pre-#100 flat shape must not reappear).
              if (!skip && $0 !~ /--baseline-manifest/ && $0 !~ /--pr-diff/) {
                print FILENAME ":" NR ": " $0
                found=1
              }
              next
            }
            END {
              if (matched == 0) {
                print "TRIPWIRE: the CLI-invocation trigger matched ZERO feature lines — the invocation prose drifted; update this gate alongside it"
                exit 1
              }
              exit (found ? 1 : 0)
            }
          ' features/*.feature; then
            echo "::error::baseline-required-grep: report scenarios without a scope source (--baseline-manifest or --pr-diff) must be tagged @no-baseline-usage-error — or the trigger matched nothing (tripwire)"
            exit 1
          fi

  feature-count:
    # Pins the .feature-count invariant. Tracks the contract:
    #   - 5 pre-PR 14, 6 after --config (cute-dbt#24)
    #   - 7 after unit_test_format_coverage (cute-dbt#39)
    #   - 8 after unit_test_yaml (cute-dbt#69)
    #   - 9 after consumer_report_contract (cute-dbt#71)
    #   - 10 after pr_diff_scoping (cute-dbt#84)
    #   - 11 after cell_table_diff (cute-dbt#98)
    #   - 12 after incremental_models (cute-dbt#145)
    #   - 13 after coverage_checks (cute-dbt#169)
    #   - 14 after check_selection (cute-dbt#171)
    #   - 16 after explore_cli + explore_full_manifest (cute-dbt#100)
    #   - 17 after explore_lineage_dag (cute-dbt#101)
    #   - 18 after explore_view_toggle (cute-dbt#102)
    #   - 19 after explore_test_badges (cute-dbt#103)
    #   - 20 after explore_model_detail (cute-dbt#104)
    #   - 21 after explore_js_contract (cute-dbt#105)
    #   - 22 after explore_change_context (cute-dbt#106)
    # The README is not a feature. The job name deliberately carries no
    # number (cute-dbt#68 — the old `==6` display label went stale across
    # several bumps): the enforced count lives ONLY in the `expected=`
    # line below and is echoed into the run log at runtime. The job name
    # is a required status check — a rename must update
    # `.github/branch-protection.json`, the live branch-protection
    # contexts, and `CONTRIBUTING.md` atomically.
    name: Feature file count
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: features/*.feature count matches expected
        run: |
          set -euo pipefail
          expected=22
          count=$(find features -maxdepth 1 -name '*.feature' | wc -l | tr -d ' ')
          echo "feature-count: expected ${expected}, found ${count}"
          if [ "$count" != "$expected" ]; then
            echo "::error::feature-count: expected ${expected} .feature files, found ${count}"
            exit 1
          fi

  fixture-manifest-gate:
    # Synthetic-only fixture invariant (hard, non-negotiable). Every file
    # under `tests/fixtures/` (except MANIFEST.toml itself) MUST be listed
    # in `tests/fixtures/MANIFEST.toml` with `synthetic_only = true`. As of
    # cute-dbt#115 the gate ALSO covers the embedded dbt-project/ DATA
    # carriers (the seed CSVs) via the [[project_data]]
    # table — closing the #114-review gap where seeds sat outside the scan.
    # Real data in the public repo is a release blocker. This job is the
    # STRUCTURAL gate; `tests/fixture_manifest_listed.rs` +
    # `tests/fixture_parse.rs` mirror the constraint for fast local signal,
    # and `lefthook.yml` mirrors this shell logic in the pre-push hook
    # (keep all three in sync). No untrusted GitHub event interpolation in
    # any `run:` block.
    name: Synthetic-only fixture gate (every fixture listed in MANIFEST.toml)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Every tests/fixtures/* file must be listed in MANIFEST.toml
        run: |
          set -euo pipefail
          manifest="tests/fixtures/MANIFEST.toml"
          if [ ! -f "$manifest" ]; then
            echo "::error::fixture-manifest-gate: $manifest missing"
            exit 1
          fi

          # Extract every `path = "..."` value inside a [[fixture]] table.
          # We track whether we are inside a `[[fixture]]` block so a
          # `path = ...` in some other table (e.g. [[project_data]]) does
          # not pollute the listed set.
          listed=$(awk '
            /^[[:space:]]*\[\[fixture\]\][[:space:]]*$/ { in_fixture=1; next }
            /^[[:space:]]*\[/ { in_fixture=0 }
            in_fixture && /^[[:space:]]*path[[:space:]]*=/ {
              line=$0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              print line
            }
          ' "$manifest" | sort -u)

          # Walk every regular file under tests/fixtures/ except the manifest.
          # `find -printf` is GNU-only; this job pins ubuntu-latest so it is
          # the right tool here (mirrors GNU-awk usage in
          # baseline-required-grep).
          committed=$(find tests/fixtures -type f \
            ! -name MANIFEST.toml \
            -printf '%P\n' 2>/dev/null \
            | sort -u || true)

          # Any committed file absent from `listed` violates the synthetic-only gate.
          unlisted=$(comm -23 <(printf '%s\n' "$committed") <(printf '%s\n' "$listed") | sed '/^$/d')
          # Any listed path not present on disk is MANIFEST drift.
          missing=$(comm -13 <(printf '%s\n' "$committed") <(printf '%s\n' "$listed") | sed '/^$/d')

          fail=0
          if [ -n "$unlisted" ]; then
            echo "::error::fixture-manifest-gate: files under tests/fixtures/ are NOT listed in MANIFEST.toml (synthetic-only invariant):"
            printf '  - %s\n' $unlisted
            fail=1
          fi
          if [ -n "$missing" ]; then
            echo "::error::fixture-manifest-gate: MANIFEST.toml lists paths that are not present on disk:"
            printf '  - %s\n' $missing
            fail=1
          fi

          # --- dbt-project/ data carriers (cute-dbt#115) ---------------------
          # Extract every `path = "..."` inside a [[project_data]] table
          # (repo-root-relative paths), the same way as [[fixture]] above.
          pd_listed=$(awk '
            /^[[:space:]]*\[\[project_data\]\][[:space:]]*$/ { in_pd=1; next }
            /^[[:space:]]*\[/ { in_pd=0 }
            in_pd && /^[[:space:]]*path[[:space:]]*=/ {
              line=$0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              print line
            }
          ' "$manifest" | sort -u)

          # Enumerate the git-tracked dbt-project DATA carriers: the seeds
          # directory (exhaustive). The compiled target/manifest.json is
          # gitignored build output (recompiled fresh by CI/local, never
          # committed — cute-dbt#115), so it is not a committed data carrier.
          # Use `git ls-files` (NOT find) so a local `dbt compile` leaving
          # build output under dbt-project/target/ cannot leak in and fail
          # the gate.
          pd_tracked=$(git ls-files dbt-project/seeds/ dbt-project/tests/fixtures/ | sort -u)

          pd_unlisted=$(comm -23 <(printf '%s\n' "$pd_tracked") <(printf '%s\n' "$pd_listed") | sed '/^$/d')
          pd_missing=$(comm -13 <(printf '%s\n' "$pd_tracked") <(printf '%s\n' "$pd_listed") | sed '/^$/d')

          if [ -n "$pd_unlisted" ]; then
            echo "::error::fixture-manifest-gate: git-tracked dbt-project data carriers are NOT listed in MANIFEST.toml [[project_data]] (synthetic-only invariant):"
            printf '  - %s\n' $pd_unlisted
            fail=1
          fi
          if [ -n "$pd_missing" ]; then
            echo "::error::fixture-manifest-gate: MANIFEST.toml [[project_data]] lists paths that are not git-tracked dbt-project data carriers:"
            printf '  - %s\n' $pd_missing
            fail=1
          fi

          # Every entry in EITHER table must have synthetic_only = true
          # (cheap whole-file structural check; the cargo test does the
          # strict per-table TOML parse).
          if grep -nE '^[[:space:]]*synthetic_only[[:space:]]*=' "$manifest" \
              | grep -vE '=[[:space:]]*true([[:space:]]*#.*)?$' >&2; then
            echo "::error::fixture-manifest-gate: every fixture / project_data entry must have synthetic_only = true (ADR-5)"
            fail=1
          fi
          exit "$fail"

  assets-manifest-gate:
    # Vendored-asset provenance invariant. Every file under `assets/`
    # (except MANIFEST.toml itself) MUST be listed in `assets/MANIFEST.toml`
    # with a permissive (non-copyleft) SPDX license. This is the STRUCTURAL
    # gate; `tests/assets_manifest.rs` mirrors the constraint and adds
    # SHA-256 verification for fast local signal. Shape mirrors
    # `fixture-manifest-gate`. No untrusted GitHub event interpolation in
    # any `run:` block.
    name: Asset-provenance gate (every asset listed in MANIFEST.toml)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Every assets/* file must be listed in MANIFEST.toml
        run: |
          set -euo pipefail
          manifest="assets/MANIFEST.toml"
          if [ ! -f "$manifest" ]; then
            echo "::error::assets-manifest-gate: $manifest missing"
            exit 1
          fi

          # Extract every `path = "..."` value inside an [[asset]] table.
          # Track whether we are inside an `[[asset]]` block so a `path =`
          # in some other table cannot pollute the listed set.
          listed=$(awk '
            /^[[:space:]]*\[\[asset\]\][[:space:]]*$/ { in_asset=1; next }
            /^[[:space:]]*\[/ { in_asset=0 }
            in_asset && /^[[:space:]]*path[[:space:]]*=/ {
              line=$0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              print line
            }
          ' "$manifest" | sort -u)

          # Walk every regular file under assets/ except the manifest.
          # `find -printf` is GNU-only; this job pins ubuntu-latest, so it
          # is the right tool here (mirrors fixture-manifest-gate).
          committed=$(find assets -type f \
            ! -name MANIFEST.toml \
            -printf '%P\n' 2>/dev/null \
            | sort -u || true)

          # Any committed file absent from `listed` violates provenance.
          unlisted=$(comm -23 <(printf '%s\n' "$committed") <(printf '%s\n' "$listed") | sed '/^$/d')
          # Any listed path not present on disk is MANIFEST drift.
          missing=$(comm -13 <(printf '%s\n' "$committed") <(printf '%s\n' "$listed") | sed '/^$/d')

          fail=0
          if [ -n "$unlisted" ]; then
            echo "::error::assets-manifest-gate: files under assets/ are NOT listed in MANIFEST.toml (provenance invariant):"
            printf '  - %s\n' $unlisted
            fail=1
          fi
          if [ -n "$missing" ]; then
            echo "::error::assets-manifest-gate: MANIFEST.toml lists paths that are not present on disk:"
            printf '  - %s\n' $missing
            fail=1
          fi

          # Every [[asset]] license must be permissive (no copyleft).
          bad_license=$(awk '
            /^[[:space:]]*\[\[asset\]\][[:space:]]*$/ { in_asset=1; next }
            /^[[:space:]]*\[/ { in_asset=0 }
            in_asset && /^[[:space:]]*license[[:space:]]*=/ {
              line=$0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              if (line != "MIT" && line != "BSD-2-Clause" \
                  && line != "BSD-3-Clause" && line != "Apache-2.0" \
                  && line != "ISC" && line != "0BSD")
                print line
            }
          ' "$manifest" | sort -u)
          if [ -n "$bad_license" ]; then
            echo "::error::assets-manifest-gate: non-permissive asset license(s) — only MIT / BSD-2-Clause / BSD-3-Clause / Apache-2.0 / ISC / 0BSD allowed:"
            printf '  - %s\n' $bad_license
            fail=1
          fi
          exit "$fail"

  example-report-check:
    # Per-example matrix worker. Regenerates one committed
    # examples/*-report.html against its fixture pair and diffs
    # byte-by-byte. Drift between the renderer and the committed
    # artifact is silent — the file ships unchanged until someone
    # re-runs the CLI locally; this job re-runs it on every PR. If
    # the diff fails for any example, regenerate locally with the
    # command surfaced in the failure log. The renderer is
    # deterministic over fixture input, so byte-equality is the
    # correct gate.
    #
    # To add a new example: commit examples/<name>-report.html
    # alongside its fixture pair in tests/fixtures/ AND add a row
    # to the matrix below. The fixture pair MUST also be listed in
    # tests/fixtures/MANIFEST.toml (separate gate enforces that).
    #
    # The aggregator job `example-report-up-to-date` below presents
    # a single stable check name to branch protection so adding new
    # matrix rows doesn't require a branch-protection.json bump.
    name: Example report check (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # `mode: report` rows render a single --out file with the
          # `report` verb; the `mode: explore` row renders the two-file
          # --out-dir shape with the `explore` verb (cute-dbt#100).
          - name: jaffle-shop
            mode: report
            current: tests/fixtures/jaffle-shop-current.json
            baseline: tests/fixtures/jaffle-shop-baseline.json
            pr_diff: ""
            output: examples/jaffle-shop-report.html
            project_root: ""
          - name: playground
            mode: report
            current: tests/fixtures/playground-current.json
            baseline: tests/fixtures/playground-baseline.json
            pr_diff: ""
            output: examples/playground-report.html
            # Playground unit_tests reference source YAML via
            # `original_file_path`; cute-dbt#69's authoring-YAML drawer
            # slices each `- name:` block out of the paired source files
            # under tests/fixtures/playground-source/. The matrix row
            # passes `--project-root` so the regenerated example matches
            # the committed one byte-for-byte.
            project_root: tests/fixtures/playground-source
          # cute-dbt#134 — the durable diff-view showcase (a GOLDEN example:
          # committed + byte-identity gated, NOT the live dogfood preview).
          # Renders the playground manifest in --pr-diff mode against a
          # synthetic hand-crafted patch (NO baseline), so the committed
          # example exercises the #132/#133 overhaul: foldable inline SQL
          # diff, YAML block diff, and a cell-level data diff with a real
          # NULL. `pr_diff` set + `baseline` empty selects the --pr-diff arm
          # in the run step below.
          - name: diff-showcase
            mode: report
            current: tests/fixtures/playground-current.json
            baseline: ""
            pr_diff: tests/fixtures/playground-pr-diff.patch
            output: examples/diff-showcase-report.html
            project_root: tests/fixtures/playground-source
          # cute-dbt#100 — the GOLDEN explore pages: the full synthetic
          # playground manifest rendered to the two-file --out-dir shape
          # (examples/explore/dag.html + tests.html), each independently
          # covered by the headless zero-egress gate (page-aware liveness)
          # and the resource-ref lint. No baseline, no project root —
          # explore is full-manifest by design.
          - name: explore
            mode: explore
            current: tests/fixtures/playground-current.json
            baseline: ""
            pr_diff: ""
            output: examples/explore
            project_root: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate example and diff
        env:
          # Matrix values are workflow-controlled (defined above), not
          # user-controlled inputs — but passing through env: is the
          # official safe pattern for any `${{ }}` interpolation.
          EXAMPLE_NAME: ${{ matrix.name }}
          MODE: ${{ matrix.mode }}
          CURRENT_MANIFEST: ${{ matrix.current }}
          BASELINE_MANIFEST: ${{ matrix.baseline }}
          PR_DIFF: ${{ matrix.pr_diff }}
          OUTPUT_PATH: ${{ matrix.output }}
          PROJECT_ROOT: ${{ matrix.project_root }}
        run: |
          set -euo pipefail
          mkdir -p target/example-check
          # --- explore arm (cute-dbt#100): the two-file --out-dir shape.
          # Renders into a scratch dir and diffs EACH emitted page against
          # its committed twin — never a single-file --out append.
          if [ "$MODE" = "explore" ]; then
            rendered_dir="target/example-check/$(basename "$OUTPUT_PATH")"
            rm -rf "$rendered_dir"
            cargo run --quiet --locked --bin cute-dbt -- explore \
              --manifest "$CURRENT_MANIFEST" \
              --out-dir "$rendered_dir"
            fail=0
            for page in dag.html tests.html; do
              if ! diff -q "$rendered_dir/$page" "$OUTPUT_PATH/$page" >/dev/null; then
                echo "::error::example-report-up-to-date: $OUTPUT_PATH/$page does not match the renderer output ($EXAMPLE_NAME). Regenerate with:"
                echo "  cargo run --bin cute-dbt -- explore --manifest $CURRENT_MANIFEST --out-dir $OUTPUT_PATH"
                echo "Sizes:"
                ls -l "$rendered_dir/$page" "$OUTPUT_PATH/$page" || true
                fail=1
              fi
            done
            exit "$fail"
          fi
          # --- report arm: the single-file --out shape, `report` verb.
          rendered="target/example-check/$(basename "$OUTPUT_PATH")"
          # Build the optional --project-root arg only when the matrix
          # row sets one (jaffle-shop omits it; playground points at
          # tests/fixtures/playground-source so the YAML drawer
          # populates per cute-dbt#69).
          project_root_args=()
          regen_hint=""
          if [ -n "$PROJECT_ROOT" ]; then
            project_root_args=(--project-root "$PROJECT_ROOT")
            regen_hint=" --project-root $PROJECT_ROOT"
          fi
          # Scope source: --pr-diff arm (cute-dbt#134 showcase row sets
          # `pr_diff`, leaves `baseline` empty) vs the default baseline
          # arm. The `@`-prefix tells cute-dbt to read the diff from file.
          # Fail-closed: exactly one scope source must be set, mirroring the
          # clap `scope_source` ArgGroup the binary enforces. Guards against
          # future matrix drift silently mis-selecting a mode.
          if { [ -n "$PR_DIFF" ] && [ -n "$BASELINE_MANIFEST" ]; } || \
             { [ -z "$PR_DIFF" ] && [ -z "$BASELINE_MANIFEST" ]; }; then
            echo "::error::example-report-check ($EXAMPLE_NAME): exactly one scope source is required (set either PR_DIFF or BASELINE_MANIFEST, not both)"
            exit 1
          fi
          if [ -n "$PR_DIFF" ]; then
            scope_args=(--pr-diff "@$PR_DIFF")
            scope_hint=" --pr-diff @$PR_DIFF"
          else
            scope_args=(--baseline-manifest "$BASELINE_MANIFEST")
            scope_hint=" --baseline-manifest $BASELINE_MANIFEST"
          fi
          cargo run --quiet --locked --bin cute-dbt -- report \
            --manifest "$CURRENT_MANIFEST" \
            "${scope_args[@]}" \
            "${project_root_args[@]}" \
            --out "$rendered"
          if ! diff -q "$rendered" "$OUTPUT_PATH" >/dev/null; then
            echo "::error::example-report-up-to-date: $OUTPUT_PATH does not match the renderer output ($EXAMPLE_NAME). Regenerate with:"
            echo "  cargo run --bin cute-dbt -- report --manifest $CURRENT_MANIFEST$scope_hint$regen_hint --out $OUTPUT_PATH"
            echo "Sizes:"
            ls -l "$rendered" "$OUTPUT_PATH"
            exit 1
          fi

  example-report-up-to-date:
    # Stable aggregator. Presents a single check name to branch
    # protection. Succeeds iff every example-report-check matrix job
    # passes. Adding a new example only requires adding a row to the
    # matrix above — branch-protection.json stays untouched.
    name: Example report is byte-identical to renderer output
    runs-on: ubuntu-latest
    needs: example-report-check
    if: always()
    steps:
      - name: Assert all matrix example reports passed
        env:
          MATRIX_RESULT: ${{ needs.example-report-check.result }}
        run: |
          set -euo pipefail
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "::error::example-report-up-to-date: one or more example reports drifted (matrix result: $MATRIX_RESULT). See the example-report-check (<name>) jobs above for the specific failure and regeneration command."
            exit 1
          fi
          echo "All example reports are byte-identical to renderer output."

  heuristics-ledger:
    # Byte-gate for the GENERATED heuristics ledger (cute-dbt#169 — the
    # example-report-check pattern). The single source of truth for every
    # check is the `heuristics!` block in src/domain/checks.rs;
    # heuristics/registry.toml + book/src/checks/*.md are generated from
    # SPECS. This job regenerates them in place and fails on any diff, so
    # the committed ledger cannot drift from the code. The cargo test
    # itself also compares byte-identity in default mode (fast local
    # signal via `cargo nextest run` / `cargo test`); `lefthook.yml`
    # mirrors this job pre-push. No untrusted GitHub event interpolation
    # in any `run:` block.
    name: Heuristics ledger is generated from SPECS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Regenerate ledger and diff
        run: |
          set -euo pipefail
          GEN_HEURISTICS_LEDGER=1 cargo test --test heuristics_ledger --locked
          if ! git diff --exit-code -- heuristics book/src/checks; then
            echo "::error::heuristics-ledger: heuristics/registry.toml or book/src/checks/*.md drifted from the heuristics! block in src/domain/checks.rs. Regenerate with:"
            echo "  GEN_HEURISTICS_LEDGER=1 cargo test --test heuristics_ledger"
            exit 1
          fi

  resource-ref-lint:
    # Secondary zero-egress gate: structured HTML parse over the committed
    # examples/jaffle-shop-report.html via the `tl` crate. Rejects real
    # loading constructs (<script src>, <link href>, <img src>, CSS
    # @import, CSS url(), protocol-relative //) — NOT raw `grep http`
    # (minified bundles carry hundreds of inert URL string literals).
    # The PRIMARY gate is `headless-zero-egress` below; this one runs
    # in milliseconds and catches template-layer regressions fast.
    name: Resource-ref lint (real loading constructs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --test resource_ref_lint --locked

  headless-zero-egress:
    # PRIMARY zero-egress gate. A real Chromium opens
    # examples/jaffle-shop-report.html via real file:// with DNS denied
    # (`--host-resolver-rules=MAP * ~NOTFOUND`) and subscribes to every
    # Network.requestWillBeSent event. The proof: zero external requests
    # (http/https/ws/wss/ftp) are emitted by the rendered chrome.
    # Re-runnable by anyone with the repo checked out — the strongest
    # auditability artifact, indexed in AUDIT.md.
    name: Headless zero-egress proof (file://, network blocked)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Pin Chrome explicitly — relying on headless_chrome's auto-fetch
      # at test time would silently hit the network during CI setup and
      # the failure mode is opaque. browser-actions/setup-chrome installs
      # a known version of Chrome and adds it to PATH; headless_chrome
      # discovers it from PATH (its built-in auto-fetch path is only
      # used when no system Chrome is found).
      - uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1.7.3
        with:
          chrome-version: stable
      # The test is `#[ignore]` by default so the standard `cargo nextest`
      # invocation in the cross-platform `test` matrix does not carry a
      # Chrome dependency. This dedicated job opts in explicitly.
      - run: cargo test --test headless_zero_egress --locked -- --ignored
      # RFC 4180 CSV parser correctness (cute-dbt#66) moved to the Rust
      # `parse_csv_rows` unit tests (`src/domain/unit_test_table.rs`,
      # `g22`–`g26`) in cute-dbt#138: the JS `parseCsvRows` twin was retired
      # when the Current view started rendering the Rust-computed FixtureTable
      # POD, so there is no longer a headless CSV parser to exercise.
      # Updated-only ↔ All-tests toggle interaction (cute-dbt#91) — drives
      # the inlined report JS in a real browser (selector visibility,
      # toggle-dependent counts, 0-updated hint, auto-All landing). Reuses
      # the Chrome install above; `#[ignore]` by default like its siblings.
      - run: cargo test --test headless_toggle --locked -- --ignored

  bdd:
    # ATDD outer loop — the executable acceptance contract for the
    # `features/*.feature` files. Uses cucumber-rs `harness = false`
    # so cargo nextest is INCOMPATIBLE; the binary is invoked via
    # `cargo test --test bdd`. The `feature-count` job pins the
    # `.feature` file count; the `baseline-required-grep` job pins the
    # exactly-one-scope-source invariant per-scenario; this job is the
    # step-definition gate (every scenario has a matching step, all
    # scenarios pass). No untrusted GitHub event interpolation in any
    # `run:` block.
    name: BDD outer loop (cucumber-rs, cargo test --test bdd)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --test bdd --locked

  crap-scorecard:
    # crap4rs scorecard reads crap4rs.toml for keyed thresholds: strict
    # CRAP <= 15 on correctness-load-bearing modules, default <= 25
    # elsewhere. CRAP = complexity * (1 - coverage)^3 + complexity, so the
    # job needs the lcov.info artifact uploaded by the Coverage job.
    name: crap4rs scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: coverage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: cute-dbt
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: lcov
      - run: |
          set -euo pipefail
          if cargo install --git https://github.com/breezy-bays-labs/crap4rs --locked --tag v0.4.0 crap4rs 2>/dev/null && command -v crap4rs >/dev/null 2>&1; then
            # crap4rs's natural exit code reports threshold breaches.
            # v0.4.0 binary surface: `crap4rs --config <FILE> --coverage <LCOV>`.
            crap4rs --config crap4rs.toml --coverage lcov.info
          else
            echo "crap4rs binary not yet pinned for cute-dbt — scorecard job is no-op until the composite-action ref lands"
          fi
