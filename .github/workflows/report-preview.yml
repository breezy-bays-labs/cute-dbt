# Sticky-PR-comment report preview (cute-dbt#71).
#
# On every PR, regenerates the committed example HTML reports against
# their fixture pairs, uploads each as a workflow artifact, and posts a
# sticky PR comment with clickable download links. The comment updates
# in place on subsequent pushes (single sticky per PR, keyed by
# `header: cute-dbt-report-preview`).
#
# This workflow is structurally separate from `ci.yml`'s
# `example-report-check` matrix + `example-report-up-to-date`
# aggregator: that pair is the byte-identity GATE (required check); this
# workflow is the human-validation AFFORDANCE (never required, never
# blocks merge, runs with `if: always()` so byte-identity failures still
# leave the artifact + comment accessible).
#
# Fork-PR caveat: GitHub issues a read-only `GITHUB_TOKEN` for
# `pull_request` events triggered from forks regardless of the
# `permissions:` block, so the sticky-comment step silently no-ops on
# fork PRs. Same-repo branches are unaffected. To get fork-PR coverage,
# split this into a `pull_request` regenerate workflow + a
# `workflow_run`-triggered comment workflow with its own writable
# token (see `book/src/recipes/github-actions-pr-review.md` § Fork PRs
# for the two well-trodden workarounds).
#
# Consumer-recipe copy lives at
# `.github/workflows/examples/cute-dbt-report-preview.yml` (subdirectory
# convention prevents it from auto-triggering inside this repo).

name: Report preview

on:
  pull_request:

permissions:
  contents: read

concurrency:
  # Use github.ref (refs/pull/<n>/merge on pull_request events) — PR-scoped,
  # avoids the security-hook-flagged github.head_ref input even though
  # `concurrency:` keys are not interpolated into `run:` blocks.
  group: report-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    # Per-example matrix worker. Regenerates each committed example
    # against its fixture pair, then uploads the rendered HTML as a
    # workflow artifact. Duplicates the matrix shape in `ci.yml`'s
    # `example-report-check` (workflow YAML cannot import the Rust
    # `COMMITTED_EXAMPLES` constant); the two stay in sync by review.
    name: Regenerate example report (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jaffle-shop
            current: tests/fixtures/jaffle-shop-current.json
            baseline: tests/fixtures/jaffle-shop-baseline.json
            project_root: ""
          - name: playground
            current: tests/fixtures/playground-current.json
            baseline: tests/fixtures/playground-baseline.json
            # Mirrors ci.yml's `example-report-check` playground row.
            # Source YAML lives in-repo so the regenerated report
            # populates the Authoring-YAML drawer (cute-dbt#69).
            project_root: tests/fixtures/playground-source
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate example report
        env:
          # Matrix values are workflow-controlled (defined above), not
          # user-controlled inputs — but passing through env: is the
          # official safe pattern for any `${{ }}` interpolation in
          # `run:` blocks.
          NAME: ${{ matrix.name }}
          CURRENT: ${{ matrix.current }}
          BASELINE: ${{ matrix.baseline }}
          PROJECT_ROOT: ${{ matrix.project_root }}
        run: |
          set -euo pipefail
          mkdir -p target/report-preview
          out="target/report-preview/${NAME}-report.html"
          # Build optional --project-root arg (jaffle-shop omits it;
          # playground points at the committed source YAML so the drawer
          # populates).
          project_root_args=()
          if [ -n "$PROJECT_ROOT" ]; then
            project_root_args=(--project-root "$PROJECT_ROOT")
          fi
          cargo run --quiet --locked --bin cute-dbt -- \
            --manifest "$CURRENT" \
            --baseline-manifest "$BASELINE" \
            "${project_root_args[@]}" \
            --out "$out"
          # Emit a size breadcrumb in the log so the sticky-comment body
          # builder doesn't need a second probe.
          ls -l "$out"
      - name: Upload report artifact
        # `if: always()` so a non-zero regenerate exit still uploads
        # whatever HTML the renderer produced — partial output is more
        # useful than nothing for the reviewer.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: report-preview-${{ matrix.name }}
          path: target/report-preview/${{ matrix.name }}-report.html
          retention-days: 7
          if-no-files-found: warn

  prdiff-preview:
    # Self-dogfood the --pr-diff flow on THIS PR's own changes
    # (cute-dbt#118). Distinct from the baseline `regenerate` matrix
    # above: that one renders the committed example fixtures in
    # BASELINE mode; this one runs --pr-diff against the PR's OWN git
    # diff scoped to `dbt-project/`, using a CI-recompiled EPHEMERAL
    # fusion manifest. A PR that edits `dbt-project/` therefore
    # self-shows its rendered PrDiff diff (the inline SQL diff #111, the
    # block-precise updated-test detection + YAML drawer diff #96, etc.)
    # in the same sticky comment.
    #
    # Empty-diff handling: an in-step guard (the "Diff dbt-project/"
    # step) detects when the PR touches no `dbt-project/` path and sets
    # an output that short-circuits the expensive install/compile/render
    # steps below — the job ends green with no artifact, never a
    # misleading empty report, never a hard failure. (Chose an in-step
    # guard over a `dorny/paths-filter`-style gate so no new third-party
    # action enters the supply chain.)
    #
    # Manifest is EPHEMERAL — recompiled in CI from the PR HEAD, never
    # committed — so the `root_path` absolute-path leak lesson (which
    # applies only to *committed* manifests) does not apply here.
    name: PrDiff preview (this PR's own dbt-project changes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      # Surfaced so `sticky-comment` can tell "PR changed dbt-project/" (a real
      # dbt-project row was uploaded) from "didn't" (no row). This job has NO
      # job-level `if:`, so it always runs to completion and its `.result` is
      # `success` even on non-dbt PRs — `.result` cannot distinguish the two;
      # `touched` can.
      touched: ${{ steps.diff.outputs.touched }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base...head diff resolves locally; the
          # base SHA is otherwise not guaranteed present on a shallow
          # PR-head checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Diff dbt-project/
        id: diff
        env:
          # Pass the SHAs through env: — the official safe pattern for
          # any `${{ }}` interpolation in a run: block. base.sha/head.sha
          # are deterministic + fork-safe (no reliance on `origin` remote
          # semantics or branch-name resolution).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p target/report-preview
          # Exclude the committed `target/` (the manifest cute-dbt consumes):
          # a PR that touches only the committed manifest has no model/test
          # SOURCE change to diff, so it should NOT trigger the full
          # fusion-install + compile + render for an empty-scope report.
          git diff --unified=0 "${BASE_SHA}...${HEAD_SHA}" \
            -- dbt-project/ ':(exclude)dbt-project/target/' \
            > target/report-preview/prdiff.patch
          if [ -s target/report-preview/prdiff.patch ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "This PR touches dbt-project/ — rendering PrDiff preview."
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
            echo "This PR does not touch dbt-project/ — skipping PrDiff preview (no artifact)."
          fi

      # All steps below run ONLY when the PR touched dbt-project/, so a
      # non-dbt PR pays no fusion-install / compile / cargo-build cost
      # and the job ends green with no artifact.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.diff.outputs.touched == 'true'
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.diff.outputs.touched == 'true'

      - name: Install dbt-fusion (standalone binary, pinned)
        if: steps.diff.outputs.touched == 'true'
        env:
          # Pinned to a specific fusion version — never floating `latest`
          # (cute-dbt#118 hard constraint). NO pip / NO `uv pip`: fusion
          # is a standalone Rust binary (consistent with #114). The
          # installer drops `dbt` into ~/.local/bin.
          FUSION_VERSION: 2.0.0-preview.177
        run: |
          set -euo pipefail
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh \
            | sh -s -- --version "$FUSION_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compile dbt-project (ephemeral manifest, offline)
        if: steps.diff.outputs.touched == 'true'
        # `profiles.yml` lives in-project (duckdb `:memory:`), so compile
        # succeeds fully offline — no warehouse, no secrets, no network.
        # There are no dbt packages, so there is no `dbt deps` step.
        # Output target/manifest.json is EPHEMERAL — used only for this
        # render, never committed.
        working-directory: dbt-project
        run: |
          set -euo pipefail
          dbt --version
          dbt compile --profiles-dir .

      - name: Render PrDiff report
        if: steps.diff.outputs.touched == 'true'
        # Same-revision contract: the manifest was just compiled at HEAD
        # and the diff is base...head, so the diff hunks line up with the
        # working-tree source — what makes the inline SQL diff (#111) and
        # block-precise updated-test detection (#96) trustworthy. The
        # `@`-prefix tells cute-dbt to read the diff from the file.
        run: |
          set -euo pipefail
          cargo run --quiet --locked --bin cute-dbt -- \
            --manifest dbt-project/target/manifest.json \
            --pr-diff @target/report-preview/prdiff.patch \
            --project-root dbt-project \
            --out target/report-preview/dbt-project-report.html
          ls -l target/report-preview/dbt-project-report.html

      - name: Upload PrDiff report artifact
        # Only upload when we actually rendered — a skipped (non-dbt) PR
        # produces no artifact, so the sticky comment shows no
        # dbt-project row. `if-no-files-found: error` would mask a real
        # render failure, so guard on the touched flag instead.
        if: always() && steps.diff.outputs.touched == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Name is globbed by the sticky-comment job's
          # `report-preview-*` selector.
          name: report-preview-dbt-project
          path: target/report-preview/dbt-project-report.html
          retention-days: 7
          if-no-files-found: warn

  sticky-comment:
    # Builds and posts the sticky PR comment. Reads the upstream matrix
    # artifacts via the GitHub API to assemble per-artifact clickable
    # download links. Fails loudly on sticky-comment errors (the locked
    # decision from the issue body — sticky-comment failure typically
    # indicates a real permission misconfig that should surface).
    name: Post sticky preview comment
    runs-on: ubuntu-latest
    needs: [regenerate, prdiff-preview]
    if: always() && github.event_name == 'pull_request'
    permissions:
      # actions: read — GET /repos/{owner}/{repo}/actions/runs/{run_id}/artifacts
      # needs the actions scope under least-privilege GITHUB_TOKEN defaults.
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Build comment body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MATRIX_RESULT: ${{ needs.regenerate.result }}
          PRDIFF_RESULT: ${{ needs.prdiff-preview.result }}
          PRDIFF_TOUCHED: ${{ needs.prdiff-preview.outputs.touched }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p target/sticky
          # Query this run's artifacts via the REST API. Per-artifact
          # browser-clickable URLs use the pattern
          # https://github.com/{owner}/{repo}/actions/runs/{run_id}/artifacts/{artifact_id}
          # which authenticated reviewers can click to download.
          artifacts_json=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name | startswith("report-preview-"))]' \
            || echo '[]')
          # Build one table row per artifact. The dbt-project artifact
          # (cute-dbt#118) is the PR's OWN --pr-diff render, so it gets a
          # distinct label vs. the baseline example previews; it is also
          # absent entirely on PRs that don't touch `dbt-project/` (the
          # prdiff-preview job skips upload), so this never claims a row
          # that isn't there.
          rows=$(printf '%s' "$artifacts_json" \
            | jq -r --arg repo "$REPO" --arg run "$RUN_ID" '
                def row_label:
                  if . == "dbt-project"
                  then "dbt-project (PrDiff — this PR'"'"'s own changes)"
                  else . end;
                if length == 0 then
                  "| _(no artifacts uploaded — see [run log](https://github.com/\($repo)/actions/runs/\($run)) for details)_ | — |"
                else
                  map(
                    (.name | sub("^report-preview-"; "")) as $slug
                    | "| " + ($slug | row_label) + " — `" + $slug + "-report.html`"
                    + " | [Download](https://github.com/" + $repo + "/actions/runs/" + $run + "/artifacts/" + (.id | tostring) + ") |"
                  ) | join("\n")
                end
              ')
          # Surface the regenerate result so the reviewer knows whether
          # the byte-identity gate (in ci.yml) is independently passing.
          status_line=$(case "$MATRIX_RESULT" in
            success) echo "All examples regenerated cleanly." ;;
            failure) echo "⚠️ At least one regenerate matrix worker failed — the rendered HTML may be partial. See \`Example report check\` in the [run log](${RUN_URL}) for details." ;;
            cancelled) echo "Run cancelled (likely superseded by a newer push)." ;;
            *) echo "Regenerate result: \`${MATRIX_RESULT}\`." ;;
          esac)
          # Surface the PrDiff-preview job's fate. The job has NO job-level
          # `if:`, so it runs to completion even on non-dbt PRs and reports
          # `result: success` regardless — `.result` cannot tell "touched
          # dbt-project/" from "didn't". Branch on its `touched` OUTPUT
          # instead ('true' only when the PR changed dbt-project/ source;
          # empty string if the job was ever genuinely skipped/cancelled, which
          # the non-'true' branch absorbs into the no-row message).
          if [ "${PRDIFF_TOUCHED}" = "true" ]; then
            prdiff_line=$(case "$PRDIFF_RESULT" in
              success) echo "This PR touches \`dbt-project/\` — the **dbt-project (PrDiff)** row below renders this PR's own \`--pr-diff\` diff." ;;
              failure) echo "⚠️ The PrDiff self-preview job failed — see the [run log](${RUN_URL})." ;;
              *) echo "" ;;
            esac)
          else
            prdiff_line="_This PR doesn't touch \`dbt-project/\`, so there's no PrDiff self-preview row._"
          fi
          cat > target/sticky/body.md <<MARKDOWN
          ## 📄 Rendered report preview

          ${status_line}

          ${prdiff_line}

          | Preview | Artifact |
          |---|---|
          ${rows}

          Click **Download** to fetch the rendered HTML. Each artifact
          is a zip containing the single-file report — extract and open
          in any browser. Reports are fully self-contained (zero
          external resource requests).

          <details>
          <summary>Alternative: GitHub CLI</summary>

          \`\`\`bash
          # gh CLI >= 2.63 extracts into ./report-preview-playground/.
          gh run download ${RUN_ID} -R ${REPO} -n report-preview-playground
          open report-preview-playground/playground-report.html
          \`\`\`
          </details>

          ---

          <sub>Posted by [\`report-preview.yml\`](https://github.com/${REPO}/blob/${HEAD_SHA}/.github/workflows/report-preview.yml) for [\`${HEAD_SHA}\`](https://github.com/${REPO}/commit/${HEAD_SHA}). Affordance only — never blocks merge.</sub>
          MARKDOWN
      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cute-dbt-report-preview
          path: target/sticky/body.md
