# Sticky-PR-comment report preview (cute-dbt#71).
#
# On every PR, regenerates the committed example HTML reports against
# their fixture pairs, uploads each as a workflow artifact, and posts a
# sticky PR comment with clickable download links. The comment updates
# in place on subsequent pushes (single sticky per PR, keyed by
# `header: cute-dbt-report-preview`).
#
# This workflow is structurally separate from `ci.yml`'s
# `example-report-check` matrix + `example-report-up-to-date`
# aggregator: that pair is the byte-identity GATE (required check); this
# workflow is the human-validation AFFORDANCE (never required, never
# blocks merge, runs with `if: always()` so byte-identity failures still
# leave the artifact + comment accessible).
#
# Fork-PR caveat: GitHub issues a read-only `GITHUB_TOKEN` for
# `pull_request` events triggered from forks regardless of the
# `permissions:` block, so the sticky-comment step silently no-ops on
# fork PRs. Same-repo branches are unaffected. To get fork-PR coverage,
# split this into a `pull_request` regenerate workflow + a
# `workflow_run`-triggered comment workflow with its own writable
# token (see `book/src/recipes/github-actions-pr-review.md` § Fork PRs
# for the two well-trodden workarounds).
#
# Consumer-recipe copy lives at
# `.github/workflows/examples/cute-dbt-report-preview.yml` (subdirectory
# convention prevents it from auto-triggering inside this repo).

name: Report preview

on:
  pull_request:

permissions:
  contents: read

concurrency:
  # Use github.ref (refs/pull/<n>/merge on pull_request events) — PR-scoped,
  # avoids the security-hook-flagged github.head_ref input even though
  # `concurrency:` keys are not interpolated into `run:` blocks.
  group: report-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    # Per-example matrix worker. Regenerates each committed example
    # against its fixture pair, then uploads the rendered HTML as a
    # workflow artifact. Duplicates the matrix shape in `ci.yml`'s
    # `example-report-check` (workflow YAML cannot import the Rust
    # `COMMITTED_EXAMPLES` constant); the two stay in sync by review.
    name: Regenerate example report (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jaffle-shop
            current: tests/fixtures/jaffle-shop-current.json
            baseline: tests/fixtures/jaffle-shop-baseline.json
            pr_diff: ""
            project_root: ""
            # cute-dbt#291: default posture — project-state stays off
            # (an empty CUTE_DBT_EXPERIMENTAL is a no-op by contract).
            experimental: ""
          - name: playground
            current: tests/fixtures/playground-current.json
            baseline: tests/fixtures/playground-baseline.json
            pr_diff: ""
            # Mirrors ci.yml's `example-report-check` playground row.
            # Source YAML lives in-repo so the regenerated report
            # populates the Authoring-YAML drawer (cute-dbt#69).
            project_root: tests/fixtures/playground-source
            # cute-dbt#291: default posture — the committed playground
            # golden carries no project-state bytes.
            experimental: ""
          # cute-dbt#134 — the durable diff-view showcase (a GOLDEN example,
          # committed + byte-identity gated — NOT the live dogfood preview),
          # mirrored from ci.yml's example-report-check. Renders in --pr-diff
          # mode (synthetic patch, NO baseline) so the sticky card can offer
          # the diff-view showcase report alongside the baseline examples.
          - name: diff-showcase
            current: tests/fixtures/playground-current.json
            baseline: ""
            pr_diff: tests/fixtures/playground-pr-diff.patch
            project_root: tests/fixtures/playground-source
            # cute-dbt#291 — the showcase opts INTO the experimental
            # project-state family (the epic #288 golden policy), mirrored
            # from ci.yml's example-report-check diff-showcase row.
            experimental: "1"
            # cute-dbt#346 — the synthetic [pr] config so the preview's
            # diff-showcase matches the committed golden's banner PR link
            # (mirrored from ci.yml's diff-showcase row).
            config: tests/fixtures/config-pr-showcase.toml
          # cute-dbt#265 Slice D — the macro-lens inline-body cap golden,
          # mirrored from ci.yml's example-report-check macro-heavy row. A
          # synthetic heavy macro (`mask_pii`, 14 callers > the cap of 10)
          # so the preview card can offer the cap showcase report.
          - name: macro-heavy
            current: tests/fixtures/macro-heavy-current.json
            baseline: ""
            pr_diff: tests/fixtures/macro-heavy-pr-diff.patch
            project_root: tests/fixtures/macro-heavy-source
            experimental: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate example report
        env:
          # Matrix values are workflow-controlled (defined above), not
          # user-controlled inputs — but passing through env: is the
          # official safe pattern for any `${{ }}` interpolation in
          # `run:` blocks.
          NAME: ${{ matrix.name }}
          CURRENT: ${{ matrix.current }}
          BASELINE: ${{ matrix.baseline }}
          PR_DIFF: ${{ matrix.pr_diff }}
          PROJECT_ROOT: ${{ matrix.project_root }}
          # cute-dbt#291: the report binary reads this directly (clap
          # env-fallback); empty = every experiment off, by contract.
          CUTE_DBT_EXPERIMENTAL: ${{ matrix.experimental }}
          # cute-dbt#346: optional --config (the diff-showcase row's
          # synthetic [pr] section); empty = no --config arg.
          CONFIG: ${{ matrix.config }}
        run: |
          set -euo pipefail
          mkdir -p target/report-preview
          out="target/report-preview/${NAME}-report.html"
          # Build optional --project-root arg (jaffle-shop omits it;
          # playground points at the committed source YAML so the drawer
          # populates).
          project_root_args=()
          if [ -n "$PROJECT_ROOT" ]; then
            project_root_args=(--project-root "$PROJECT_ROOT")
          fi
          # Scope source: --pr-diff arm (cute-dbt#134 showcase row sets
          # `pr_diff`, no baseline) vs the default baseline arm. Mirrors
          # ci.yml's example-report-check.
          # Fail-closed: exactly one scope source must be set, mirroring the
          # clap `scope_source` ArgGroup the binary enforces. Guards against
          # future matrix drift silently mis-selecting a mode.
          if { [ -n "$PR_DIFF" ] && [ -n "$BASELINE" ]; } || \
             { [ -z "$PR_DIFF" ] && [ -z "$BASELINE" ]; }; then
            echo "::error::report-preview ($NAME): exactly one scope source is required (set either PR_DIFF or BASELINE, not both)"
            exit 1
          fi
          if [ -n "$PR_DIFF" ]; then
            scope_args=(--pr-diff "@$PR_DIFF")
          else
            scope_args=(--baseline-manifest "$BASELINE")
          fi
          # cute-dbt#346: optional --config (the diff-showcase row's
          # synthetic [pr] section). Built only when the matrix row sets one.
          config_args=()
          if [ -n "$CONFIG" ]; then
            config_args=(--config "$CONFIG")
          fi
          cargo run --quiet --locked --bin cute-dbt -- report \
            --manifest "$CURRENT" \
            "${scope_args[@]}" \
            "${project_root_args[@]}" \
            "${config_args[@]}" \
            --out "$out"
          # Emit a size breadcrumb in the log so the sticky-comment body
          # builder doesn't need a second probe.
          ls -l "$out"
      - name: Upload report artifact
        # `if: always()` so a non-zero regenerate exit still uploads
        # whatever HTML the renderer produced — partial output is more
        # useful than nothing for the reviewer.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: report-preview-${{ matrix.name }}
          path: target/report-preview/${{ matrix.name }}-report.html
          retention-days: 7
          if-no-files-found: warn

  regenerate-explore:
    # GOLDEN explore pages (cute-dbt#320). Renders the committed
    # `examples/explore/` playground golden (the full synthetic playground
    # manifest → `dag.html` lineage + `tests.html` unit-test viewer) and
    # uploads both as ONE artifact, so the sticky comment can offer the
    # golden Explore section alongside the golden report rows. Mirrors the
    # `explore` arm of ci.yml's `example-report-check` matrix — explore is
    # full-manifest by design (NO baseline, NO scope source, NO
    # `--project-root`: that arg is clap-illegal without `--pr-diff`). The
    # byte-identity GATE for `examples/explore/` lives in ci.yml; this job
    # is the human-validation affordance only (never blocks merge).
    name: Regenerate golden explore pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate golden explore pages
        run: |
          set -euo pipefail
          out_dir="target/report-preview/explore-golden"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          # Full-manifest explore: no baseline, no scope source, no
          # --project-root (clap-illegal without --pr-diff). Same
          # invocation as ci.yml's example-report-check explore arm.
          cargo run --quiet --locked --bin cute-dbt -- explore \
            --manifest tests/fixtures/playground-current.json \
            --out-dir "$out_dir"
          # Size breadcrumbs so the sticky-comment builder needs no probe.
          ls -l "$out_dir/dag.html" "$out_dir/tests.html"
      - name: Upload golden explore artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Globbed by the sticky-comment + publish-previews
          # `report-preview-*` selectors; the `-explore-golden` suffix
          # partitions it out of the report golden/live buckets.
          name: report-preview-explore-golden
          path: |
            target/report-preview/explore-golden/dag.html
            target/report-preview/explore-golden/tests.html
          retention-days: 7
          if-no-files-found: warn

  prdiff-preview:
    # Self-dogfood the --pr-diff flow on THIS PR's own changes
    # (cute-dbt#118). Distinct from the baseline `regenerate` matrix
    # above: that one renders the committed example fixtures in
    # BASELINE mode; this one runs --pr-diff against the PR's OWN git
    # diff scoped to `dbt-project/`, using a CI-recompiled EPHEMERAL
    # fusion manifest. A PR that edits `dbt-project/` therefore
    # self-shows its rendered PrDiff diff (the inline SQL diff #111, the
    # block-precise updated-test detection + YAML drawer diff #96, etc.)
    # in the same sticky comment.
    #
    # Empty-diff handling: an in-step guard (the "Diff dbt-project/"
    # step) detects when the PR touches no `dbt-project/` path and sets
    # an output that short-circuits the expensive install/compile/render
    # steps below — the job ends green with no artifact, never a
    # misleading empty report, never a hard failure. (Chose an in-step
    # guard over a `dorny/paths-filter`-style gate so no new third-party
    # action enters the supply chain.)
    #
    # Manifest is EPHEMERAL — recompiled in CI from the PR HEAD, never
    # committed — so the `root_path` absolute-path leak lesson (which
    # applies only to *committed* manifests) does not apply here.
    name: PrDiff preview (this PR's own dbt-project changes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      # Surfaced so `sticky-comment` can tell "PR changed dbt-project/" (a real
      # dbt-project row was uploaded) from "didn't" (no row). This job has NO
      # job-level `if:`, so it always runs to completion and its `.result` is
      # `success` even on non-dbt PRs — `.result` cannot distinguish the two;
      # `touched` can.
      touched: ${{ steps.diff.outputs.touched }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base...head diff resolves locally; the
          # base SHA is otherwise not guaranteed present on a shallow
          # PR-head checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Diff dbt-project/
        id: diff
        env:
          # Pass the SHAs through env: — the official safe pattern for
          # any `${{ }}` interpolation in a run: block. base.sha/head.sha
          # are deterministic + fork-safe (no reliance on `origin` remote
          # semantics or branch-name resolution).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p target/report-preview
          # Exclude `dbt-project/target/` — it is gitignored build output
          # (the manifest is recompiled fresh below via `dbt compile`, never
          # consumed from git), so changes there are not a model/test SOURCE
          # change and must NOT trigger the full fusion-install + compile +
          # render for an empty-scope report.
          git diff --unified=0 --find-renames "${BASE_SHA}...${HEAD_SHA}" \
            -- dbt-project/ ':(exclude)dbt-project/target/' \
            > target/report-preview/prdiff.patch
          if [ -s target/report-preview/prdiff.patch ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "This PR touches dbt-project/ — rendering PrDiff preview."
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
            echo "This PR does not touch dbt-project/ — skipping PrDiff preview (no artifact)."
          fi

      # All steps below run ONLY when the PR touched dbt-project/, so a
      # non-dbt PR pays no fusion-install / compile / cargo-build cost
      # and the job ends green with no artifact.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.diff.outputs.touched == 'true'
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.diff.outputs.touched == 'true'

      - name: Install dbt-fusion (standalone binary, pinned)
        if: steps.diff.outputs.touched == 'true'
        env:
          # Pinned to a specific fusion version — never floating `latest`
          # (cute-dbt#118 hard constraint). NO pip / NO `uv pip`: fusion
          # is a standalone Rust binary (consistent with #114). The
          # installer drops `dbt` into ~/.local/bin.
          FUSION_VERSION: 2.0.0-preview.177
        run: |
          set -euo pipefail
          # `--version VER` pins the install (installer usage: "--version VER
          # Install version VER"). `--update` is for updating an existing
          # install, not a fresh CI runner.
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh \
            | sh -s -- --version "$FUSION_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Fail loud if the pin did not land the intended release (the PATH
          # update above only applies to LATER steps, so call dbt by full path).
          installed=$("$HOME/.local/bin/dbt" --version | head -1)
          echo "installed: $installed"
          case "$installed" in
            *"$FUSION_VERSION"*) ;;
            *) echo "::error::expected dbt-fusion $FUSION_VERSION, got: $installed"; exit 1 ;;
          esac

      - name: Compile dbt-project (ephemeral manifest, offline)
        if: steps.diff.outputs.touched == 'true'
        # `profiles.yml` lives in-project (duckdb `:memory:`), so compile
        # succeeds fully offline — no warehouse, no secrets, no network.
        # There are no dbt packages, so there is no `dbt deps` step.
        # Output target/manifest.json is EPHEMERAL — used only for this
        # render, never committed.
        working-directory: dbt-project
        run: |
          set -euo pipefail
          dbt --version
          dbt compile --profiles-dir .

      - name: Render PrDiff report
        if: steps.diff.outputs.touched == 'true'
        # Same-revision contract: the manifest was just compiled at HEAD
        # and the diff is base...head, so the diff hunks line up with the
        # working-tree source — what makes the inline SQL diff (#111) and
        # block-precise updated-test detection (#96) trustworthy. The
        # `@`-prefix tells cute-dbt to read the diff from the file.
        env:
          # cute-dbt#291 — the live dogfood opts INTO the experimental
          # project-state family (the epic #288 golden policy): a PR
          # editing dbt-project/dbt_project.yml keeps its panel/chips
          # visible on the sticky preview even though the family is
          # default-OFF for consumers.
          CUTE_DBT_EXPERIMENTAL: "1"
          # cute-dbt#346 — link the live dogfood report back to THIS PR.
          # html_url + title come straight off the PR event. The title is
          # attacker-controllable, so it rides env: (the safe pattern) and is
          # passed as a single quoted argv element to `--pr-title` (NOT
          # interpolated into the command), then askama-escaped in the HTML —
          # no command injection, no raw-HTML injection.
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          cargo run --quiet --locked --bin cute-dbt -- report \
            --manifest dbt-project/target/manifest.json \
            --pr-diff @target/report-preview/prdiff.patch \
            --project-root dbt-project \
            --pr-url "$PR_URL" \
            --pr-title "$PR_TITLE" \
            --pr-number "$PR_NUMBER" \
            --out target/report-preview/dbt-project-report.html
          ls -l target/report-preview/dbt-project-report.html

      - name: Upload PrDiff report artifact
        # Only upload when we actually rendered — a skipped (non-dbt) PR
        # produces no artifact, so the sticky comment shows no
        # dbt-project row. `if-no-files-found: error` would mask a real
        # render failure, so guard on the touched flag instead.
        if: always() && steps.diff.outputs.touched == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Name is globbed by the sticky-comment job's
          # `report-preview-*` selector.
          name: report-preview-dbt-project
          path: target/report-preview/dbt-project-report.html
          retention-days: 7
          if-no-files-found: warn

      - name: Render live explore pages
        if: steps.diff.outputs.touched == 'true'
        # LIVE per-PR explore (cute-dbt#320): the same EPHEMERAL fusion
        # manifest just compiled above, rendered into the two-page
        # explorer (`dag.html` lineage + `tests.html` unit-test viewer) —
        # the live self-dogfood of the explorer on THIS PR's dbt-project,
        # every push. Full-manifest by design: NO baseline, NO scope
        # source, and NO `--project-root` (that arg is clap-illegal
        # without `--pr-diff`, which explore never takes here). Manifest is
        # EPHEMERAL (bakes `metadata.root_path`) → these pages are CI
        # artifacts ONLY, never committed (same posture as the live report
        # preview; the committed golden explore stays `examples/explore/`).
        env:
          # explore has no env access gate, but the issue #320 contract
          # sets CUTE_DBT_EXPERIMENTAL=1 to match the live report
          # preview's experimental opt-in posture (the verb is marked
          # experimental for v0.x).
          CUTE_DBT_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          out_dir="target/report-preview/explore-live"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cargo run --quiet --locked --bin cute-dbt -- explore \
            --manifest dbt-project/target/manifest.json \
            --out-dir "$out_dir"
          ls -l "$out_dir/dag.html" "$out_dir/tests.html"

      - name: Upload live explore artifact
        # Same guard rationale as the PrDiff report upload: only present
        # when the PR touched dbt-project/, so the live Explore section
        # never claims a row that wasn't rendered.
        if: always() && steps.diff.outputs.touched == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Globbed by the `report-preview-*` selector; the
          # `-explore-live` suffix partitions it out of the report
          # golden/live buckets and into the live Explore row.
          name: report-preview-explore-live
          path: |
            target/report-preview/explore-live/dag.html
            target/report-preview/explore-live/tests.html
          retention-days: 7
          if-no-files-found: warn

  publish-previews:
    # Publish each rendered report to the repo's gh-pages branch under a
    # per-PR namespace (gh-pages/pr-<N>/<slug>/report.html), so the sticky
    # comment can offer a one-click "Open ↗" link beside Download. ONE job
    # (not per-matrix-worker) so the gh-pages push happens exactly once —
    # no concurrent-push race. Re-runs overwrite pr-<N>/ in place: exactly
    # one live preview per PR.
    #
    # Fork-PR safety: a fork PR's GITHUB_TOKEN is read-only regardless of
    # `permissions:`, so pushing to gh-pages is impossible. Every step is
    # gated on the PR coming from the SAME repo, so the job is a clean
    # no-op (ends green) on forks; the sticky comment renders "N/A (fork)"
    # for the Open link there.
    name: Publish per-PR Pages previews
    runs-on: ubuntu-latest
    needs: [regenerate, regenerate-explore, prdiff-preview]
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read       # `gh run download` reads this run's artifacts
      contents: write     # peaceiris pushes to the gh-pages branch
      pages: read         # the privacy guard reads the Pages visibility
    # Shared with mdbook.yml (book deploy) + pr-preview-cleanup.yml: every
    # gh-pages push serializes through one group so peaceiris pushes don't
    # race + lose commits.
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      # Privacy guard (cute-dbt#79): refuse to publish a PRIVATE repo's
      # report to PUBLIC GitHub Pages — Pages sites are publicly
      # URL-reachable even when the repo is private (private Pages
      # visibility exists only on GitHub Enterprise Cloud). This repo is
      # PUBLIC, so the guard passes trivially here — it stays present, and
      # identical in shape to the consumer recipe's step, per the
      # dogfood≡recipe sync invariant (consumer copy:
      # `.github/workflows/examples/cute-dbt-pr-review.yml`; walkthrough:
      # `book/src/recipes/github-actions-pr-review.md` § Privacy guard).
      # Fail-closed: a private repo whose Pages visibility cannot be
      # confirmed `private` fails here, BEFORE anything is published.
      - name: Privacy guard — private repo vs public Pages
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Repository variable opt-in: 'true' explicitly acknowledges that
          # the published report becomes publicly reachable. Unset here.
          ALLOW_PUBLIC_PAGES: ${{ vars.ALLOW_PUBLIC_PAGES }}
        run: |
          set -euo pipefail
          repo_private=$(gh api "repos/${REPO}" --jq '.private')
          if [ "$repo_private" = "false" ]; then
            echo "Privacy guard: repository is public — publishing to Pages exposes nothing new."
            exit 0
          elif [ "$repo_private" != "true" ]; then
            echo "::error title=Privacy guard::Could not reliably determine repository privacy status (received: '${repo_private}'). Failing closed."
            exit 1
          fi
          # The repo is private (or internal). Publishing is safe only when
          # the Pages site itself is private (Enterprise Cloud). A 404
          # (Pages not enabled yet) or 403 (token lacks pages: read) lands
          # in the fail-closed arm below.
          pages_visibility=$(gh api "repos/${REPO}/pages" --jq '.visibility // "unknown"' 2>/dev/null || echo "unreadable")
          if [ "$pages_visibility" = "private" ]; then
            echo "Privacy guard: private repo with private (Enterprise) Pages — safe to publish."
            exit 0
          fi
          if [ "${ALLOW_PUBLIC_PAGES:-}" = "true" ]; then
            echo "::warning title=Privacy guard overridden::ALLOW_PUBLIC_PAGES=true — publishing a PRIVATE repo's report to a Pages site with visibility '${pages_visibility}'. Anyone with the URL can read it."
            exit 0
          fi
          echo "::error title=Privacy guard::This repository is PRIVATE but its GitHub Pages site is not confirmed private (visibility: '${pages_visibility}'). Publishing would expose the report to anyone with the URL."
          echo "Remediation:"
          echo "  1. Use the artifact-link variant instead (downloads are auth-gated):"
          echo "     https://breezy-bays-labs.github.io/cute-dbt/recipes/github-actions-pr-review.html"
          echo "  2. On GitHub Enterprise Cloud, set the Pages site visibility to 'private'."
          echo "  3. To knowingly publish anyway, set the repository variable ALLOW_PUBLIC_PAGES=true."
          exit 1
      - name: Checkout (peaceiris needs a git workspace)
        # peaceiris/actions-gh-pages runs git against the repo; without a
        # checkout the workspace has no .git and the push fails.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false   # peaceiris authenticates via github_token
          fetch-depth: 1
      - name: Download rendered report artifacts
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Fetch every report-preview-* artifact from THIS run (no new
          # pinned action — `gh` is preinstalled, matching the repo's
          # "no new third-party action" preference). dbt-project is present
          # only when the PR touched dbt-project/.
          gh run download "$RUN_ID" -R "$REPO" --pattern 'report-preview-*' --dir artifacts || true
          echo "downloaded:"; find artifacts -type f 2>/dev/null || echo "(none)"
      - name: Arrange per-PR site tree
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          mkdir -p _site
          shopt -s nullglob
          # Each artifact dir is artifacts/report-preview-<slug>/ holding
          # <slug>-report.html; map it to _site/<slug>/report.html so the
          # published URL is .../pr-<N>/<slug>/report.html.
          for d in artifacts/report-preview-*/; do
            d="${d%/}"
            slug="${d#artifacts/report-preview-}"
            html="$d/${slug}-report.html"
            if [ -f "$html" ]; then
              mkdir -p "_site/$slug"
              cp "$html" "_site/$slug/report.html"
              echo "arranged: _site/$slug/report.html"
            fi
          done
          # Explore pages (cute-dbt#320) carry TWO files (dag.html +
          # tests.html), not a single <slug>-report.html, so the report
          # loop above skips them. Map each explore artifact's namespace:
          # the golden → _site/explore/, the live → _site/explore-live/,
          # so the published URLs are .../pr-<N>/explore/{dag,tests}.html
          # and .../pr-<N>/explore-live/{dag,tests}.html.
          declare -A explore_ns=(
            [report-preview-explore-golden]=explore
            [report-preview-explore-live]=explore-live
          )
          for artifact in "${!explore_ns[@]}"; do
            ns="${explore_ns[$artifact]}"
            src="artifacts/$artifact"
            if [ -d "$src" ]; then
              mkdir -p "_site/$ns"
              for page in dag.html tests.html; do
                if [ -f "$src/$page" ]; then
                  cp "$src/$page" "_site/$ns/$page"
                  echo "arranged: _site/$ns/$page"
                fi
              done
            fi
          done
          echo "site tree:"; find _site -type f 2>/dev/null || echo "(empty)"
      - name: Publish to gh-pages/pr-<N>/
        if: github.event.pull_request.head.repo.full_name == github.repository
        # keep_files: true preserves the book root + every OTHER pr-*/ dir
        # (peaceiris would otherwise wipe the branch outside destination_dir).
        # destination_dir scopes the push to this PR's namespace; re-runs
        # overwrite it in place.
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

  sticky-comment:
    # Builds and posts the sticky PR comment. Reads the upstream matrix
    # artifacts via the GitHub API to assemble per-artifact clickable
    # download links. Fails loudly on sticky-comment errors (the locked
    # decision from the issue body — sticky-comment failure typically
    # indicates a real permission misconfig that should surface).
    name: Post sticky preview comment
    runs-on: ubuntu-latest
    needs: [regenerate, regenerate-explore, prdiff-preview, publish-previews]
    if: always() && github.event_name == 'pull_request'
    permissions:
      # actions: read — GET /repos/{owner}/{repo}/actions/runs/{run_id}/artifacts
      # needs the actions scope under least-privilege GITHUB_TOKEN defaults.
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Build comment body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MATRIX_RESULT: ${{ needs.regenerate.result }}
          EXPLORE_RESULT: ${{ needs.regenerate-explore.result }}
          PRDIFF_RESULT: ${{ needs.prdiff-preview.result }}
          PRDIFF_TOUCHED: ${{ needs.prdiff-preview.outputs.touched }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Base URL of the per-PR Pages previews (e.g.
          # https://breezy-bays-labs.github.io/cute-dbt) — built from the
          # owner + repo name, both workflow-controlled (not user input).
          PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          # "true" when the PR is from a fork — publish-previews no-ops there
          # (read-only token), so the Open link must render N/A, not a dead
          # 404 link.
          IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail
          mkdir -p target/sticky
          # Query this run's artifacts via the REST API. Per-artifact
          # browser-clickable URLs use the pattern
          # https://github.com/{owner}/{repo}/actions/runs/{run_id}/artifacts/{artifact_id}
          # which authenticated reviewers can click to download.
          artifacts_json=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name | startswith("report-preview-"))]' \
            || echo '[]')
          # Partition artifacts into the two buckets the sticky comment labels
          # distinctly: GOLDEN examples (committed + byte-identity gated:
          # jaffle-shop, playground, diff-showcase) vs the LIVE dogfood preview
          # (the PR's OWN dbt-project render, cute-dbt#118 — present only when
          # the PR touched dbt-project/, so the live section never claims a row
          # that isn't there).
          golden_rows=$(printf '%s' "$artifacts_json" \
            | jq -r --arg repo "$REPO" --arg run "$RUN_ID" \
                   --arg pages "$PAGES_BASE" --arg pr "$PR_NUMBER" --arg isfork "$IS_FORK" '
                def viewcell($slug):
                  if $isfork == "true" then "🚫 N/A (fork)"
                  else "[▶ Open ↗](" + $pages + "/pr-" + $pr + "/" + $slug + "/report.html)"
                  end;
                # Report golden bucket: every report artifact EXCEPT the
                # live dbt-project row and the explore artifacts (cute-dbt#320 —
                # explore-golden/explore-live render two pages, not a
                # <slug>-report.html, and surface in their own Explore section).
                [.[] | (.name | sub("^report-preview-"; "")) as $slug
                       | select($slug != "dbt-project" and ($slug | startswith("explore-") | not))]
                | if length == 0 then
                    "| _(none uploaded — see [run log](https://github.com/\($repo)/actions/runs/\($run)))_ | — | — |"
                  else
                    map(
                      (.name | sub("^report-preview-"; "")) as $slug
                      | "| `" + $slug + "-report.html`"
                      + " | " + viewcell($slug)
                      + " | [⬇ Download](https://github.com/" + $repo + "/actions/runs/" + $run + "/artifacts/" + (.id | tostring) + ") |"
                    ) | join("\n")
                  end
              ')
          live_rows=$(printf '%s' "$artifacts_json" \
            | jq -r --arg repo "$REPO" --arg run "$RUN_ID" \
                   --arg pages "$PAGES_BASE" --arg pr "$PR_NUMBER" --arg isfork "$IS_FORK" '
                def viewcell($slug):
                  if $isfork == "true" then "🚫 N/A (fork)"
                  else "[▶ Open ↗](" + $pages + "/pr-" + $pr + "/" + $slug + "/report.html)"
                  end;
                [.[] | select((.name | sub("^report-preview-"; "")) == "dbt-project")]
                | map(
                    "| `dbt-project-report.html`"
                    + " | " + viewcell("dbt-project")
                    + " | [⬇ Download](https://github.com/" + $repo + "/actions/runs/" + $run + "/artifacts/" + (.id | tostring) + ") |"
                  ) | join("\n")
              ')
          # Explore rows (cute-dbt#320). Each explore artifact bundles TWO
          # pages (dag.html lineage + tests.html unit-test viewer), so emit
          # one row per page with its own Pages View link
          # (pr-<N>/<namespace>/<page>) sharing a single artifact Download.
          # The `$ns` arg names the published namespace: `explore` for the
          # committed golden, `explore-live` for the ephemeral per-PR
          # render. The jq program is inlined per call (not hoisted to a
          # shell var) so its `$ns`/`$page`/`$slug` stay jq positional args,
          # never shell expansions — matching the golden/live blocks above.
          explore_golden_rows=$(printf '%s' "$artifacts_json" \
            | jq -r --arg repo "$REPO" --arg run "$RUN_ID" \
                   --arg pages "$PAGES_BASE" --arg pr "$PR_NUMBER" --arg isfork "$IS_FORK" \
                   --arg slug "explore-golden" --arg ns "explore" '
                def viewcell($ns; $page):
                  if $isfork == "true" then "🚫 N/A (fork)"
                  else "[▶ Open ↗](" + $pages + "/pr-" + $pr + "/" + $ns + "/" + $page + ")"
                  end;
                [.[] | select((.name | sub("^report-preview-"; "")) == $slug)]
                | map(
                    .id as $id
                    | (["dag.html","tests.html"] | map(
                        "| `" + $ns + "/" + . + "`"
                        + " | " + viewcell($ns; .)
                        + " | [⬇ Download](https://github.com/" + $repo + "/actions/runs/" + $run + "/artifacts/" + ($id|tostring) + ") |"
                      ) | join("\n"))
                  ) | join("\n")
              ')
          explore_live_rows=$(printf '%s' "$artifacts_json" \
            | jq -r --arg repo "$REPO" --arg run "$RUN_ID" \
                   --arg pages "$PAGES_BASE" --arg pr "$PR_NUMBER" --arg isfork "$IS_FORK" \
                   --arg slug "explore-live" --arg ns "explore-live" '
                def viewcell($ns; $page):
                  if $isfork == "true" then "🚫 N/A (fork)"
                  else "[▶ Open ↗](" + $pages + "/pr-" + $pr + "/" + $ns + "/" + $page + ")"
                  end;
                [.[] | select((.name | sub("^report-preview-"; "")) == $slug)]
                | map(
                    .id as $id
                    | (["dag.html","tests.html"] | map(
                        "| `" + $ns + "/" + . + "`"
                        + " | " + viewcell($ns; .)
                        + " | [⬇ Download](https://github.com/" + $repo + "/actions/runs/" + $run + "/artifacts/" + ($id|tostring) + ") |"
                      ) | join("\n"))
                  ) | join("\n")
              ')
          # Surface the regenerate result so the reviewer knows whether
          # the byte-identity gate (in ci.yml) is independently passing.
          status_line=$(case "$MATRIX_RESULT" in
            success) echo "All golden examples regenerated cleanly." ;;
            failure) echo "⚠️ At least one regenerate matrix worker failed — the rendered HTML may be partial. See \`Example report check\` in the [run log](${RUN_URL}) for details." ;;
            cancelled) echo "Run cancelled (likely superseded by a newer push)." ;;
            *) echo "Regenerate result: \`${MATRIX_RESULT}\`." ;;
          esac)
          # Build the LIVE dogfood section. The prdiff-preview job has NO
          # job-level `if:`, so it always reports `result: success`; branch on
          # its `touched` OUTPUT ('true' only when the PR changed dbt-project/
          # source) to tell a real row from "didn't touch".
          if [ "${PRDIFF_TOUCHED}" = "true" ] && [ -n "$live_rows" ]; then
            if [ "${PRDIFF_RESULT}" = "failure" ]; then
              live_section="⚠️ The live dogfood preview job failed — see the [run log](${RUN_URL})."
            else
              live_section=$(printf '%s\n\n| Report | View | Download |\n|---|---|---|\n%s' \
                "_This PR's own \`dbt-project/\` diff, freshly compiled by fusion into an **ephemeral** manifest (never committed) and rendered with \`--pr-diff\`. Regenerated every PR — the live self-dogfood, not a committed example._" \
                "$live_rows")
            fi
          else
            live_section="_This PR doesn't touch \`dbt-project/\`, so there's no live dogfood preview._"
          fi
          # Build the EXPLORE section (cute-dbt#320) — the two-page explorer
          # (dag.html lineage + tests.html unit-test viewer), surfaced just
          # like the report with a golden (committed) + live (per-PR) split.
          # The `| Page | View | Download |` header + `|---|---|---|`
          # separator are emitted inline via printf with NO leading
          # indentation (mirrors the live_section block above) so the
          # interpolated table stays a valid GitHub markdown table.
          if [ -n "$explore_golden_rows" ]; then
            explore_golden_section=$(printf '%s\n\n| Page | View | Download |\n|---|---|---|\n%s' \
              "_The committed \`examples/explore/\` playground golden (the full synthetic playground manifest). Byte-identity gated in \`Example report check\`. Stable across PRs._" \
              "$explore_golden_rows")
          else
            explore_golden_section=$(case "$EXPLORE_RESULT" in
              failure) echo "⚠️ The golden explore job failed — see the [run log](${RUN_URL})." ;;
              cancelled) echo "_Run cancelled (likely superseded by a newer push)._" ;;
              *) echo "_(no golden explore pages uploaded — see the [run log](${RUN_URL}))_" ;;
            esac)
          fi
          # Live explore mirrors the live report dogfood: present only when
          # the PR touched dbt-project/ (the same prdiff-preview.touched gate).
          if [ "${PRDIFF_TOUCHED}" = "true" ] && [ -n "$explore_live_rows" ]; then
            if [ "${PRDIFF_RESULT}" = "failure" ]; then
              explore_live_section="⚠️ The live explore preview job failed — see the [run log](${RUN_URL})."
            else
              explore_live_section=$(printf '%s\n\n| Page | View | Download |\n|---|---|---|\n%s' \
                "_This PR's own \`dbt-project/\`, freshly compiled by fusion into an **ephemeral** manifest (never committed) and rendered with \`explore\` — the full-manifest two-page explorer. Regenerated every PR — the live self-dogfood, not a committed example._" \
                "$explore_live_rows")
            fi
          else
            explore_live_section="_This PR doesn't touch \`dbt-project/\`, so there's no live explore preview._"
          fi
          cat > target/sticky/body.md <<MARKDOWN
          ## 📄 Rendered report preview

          ${status_line}

          ### 🟡 Golden examples
          _Committed to \`examples/\` and byte-identity gated — the canonical reports contributors and consumers browse. Stable across PRs._

          | Report | View | Download |
          |---|---|---|
          ${golden_rows}

          ### 🐶 Live dogfood preview
          ${live_section}

          ## 🧭 Explore preview
          _The two-page \`cute-dbt explore\` explorer — \`dag.html\` (model lineage) + \`tests.html\` (unit-test viewer). Same golden/live split as the report._

          ### 🟡 Golden explore
          ${explore_golden_section}

          ### 🐶 Live explore
          ${explore_live_section}

          **▶ Open ↗** opens the report or explorer in your browser in one
          click — published to this repo's GitHub Pages under
          \`/pr-${PR_NUMBER}/\`.
          **⬇ Download** fetches the same self-contained HTML as a workflow
          artifact (auth-gated; works fully offline). Either way the report
          makes zero external resource requests.

          _The Pages preview may take ~1 min to update after this comment
          posts. On PRs from forks the Open link is unavailable (read-only
          token) — use Download._

          <details>
          <summary>Alternative: GitHub CLI</summary>

          \`\`\`bash
          # gh CLI >= 2.63 extracts into ./report-preview-playground/.
          gh run download ${RUN_ID} -R ${REPO} -n report-preview-playground
          open report-preview-playground/playground-report.html
          \`\`\`
          </details>

          ---

          <sub>Posted by [\`report-preview.yml\`](https://github.com/${REPO}/blob/${HEAD_SHA}/.github/workflows/report-preview.yml) for [\`${HEAD_SHA}\`](https://github.com/${REPO}/commit/${HEAD_SHA}). Affordance only — never blocks merge.</sub>
          MARKDOWN
      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cute-dbt-report-preview
          path: target/sticky/body.md
