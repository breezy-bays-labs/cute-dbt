# Templated cute-dbt PR-review workflow (Variant 2A — Pages preview).
# Copy this file into your repo's `.github/workflows/` directory, edit the
# marked inputs (dbt_project path, dbt adapter, CUTE_DBT_REV), push, done.
#
# This file lives at `.github/workflows/examples/` (subdirectory) so
# GitHub Actions does NOT auto-trigger it inside the cute-dbt repo —
# triggers only fire for files DIRECTLY under `.github/workflows/`.
#
# Full walkthrough — Variant 2B (private repos / artifact), trigger
# patterns (label / comment / manual), cleanup-on-close, and the privacy
# callout — lives at
# https://breezy-bays-labs.github.io/cute-dbt/recipes/github-actions-pr-review.html
#
# ⚠ PRIVACY: GitHub Pages on a PRIVATE repo is still publicly URL-reachable
# (private Pages visibility exists only on GitHub Enterprise Cloud). The
# "Privacy guard" step below detects that mismatch and FAILS the run
# before anything is published (cute-dbt#79). If your dbt models / data
# are sensitive, use Variant 2B (artifact link) from the recipe page
# instead — artifact downloads are auth-gated and need no guard.

name: cute-dbt PR review

on:
  pull_request:
    paths: ['dbt_project/**', '**/*.sql', '**/*.yml']   # edit to your layout

permissions:
  contents: read

concurrency:
  group: cute-dbt-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write        # peaceiris/actions-gh-pages pushes to gh-pages
      pull-requests: write   # sticky comment (see fork-PR caveat in the recipe)
      pages: read            # the privacy guard reads the Pages visibility
    steps:
      # --- Privacy guard (cute-dbt#79): refuse to publish a PRIVATE repo's
      #     report to PUBLIC GitHub Pages. Pages sites are publicly
      #     URL-reachable even when the repo is private — private Pages
      #     visibility exists only on GitHub Enterprise Cloud. Runs FIRST so
      #     a refused run spends no compile minutes and publishes nothing.
      #     Fail-closed: a private repo whose Pages visibility cannot be
      #     confirmed `private` (including Pages not enabled yet — it
      #     defaults to public when enabled) fails here. Needs `pages: read`
      #     (set above). Remediation options are printed by the step. ---
      - name: Privacy guard — private repo vs public Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Repository variable (Settings → Secrets and variables → Actions
          # → Variables). Set to 'true' ONLY to explicitly acknowledge that
          # the published report becomes publicly reachable.
          ALLOW_PUBLIC_PAGES: ${{ vars.ALLOW_PUBLIC_PAGES }}
        run: |
          set -euo pipefail
          repo_private=$(gh api "repos/${REPO}" --jq '.private')
          if [ "$repo_private" = "false" ]; then
            echo "Privacy guard: repository is public — publishing to Pages exposes nothing new."
            exit 0
          elif [ "$repo_private" != "true" ]; then
            echo "::error title=Privacy guard::Could not reliably determine repository privacy status (received: '${repo_private}'). Failing closed."
            exit 1
          fi
          # The repo is private (or internal). Publishing is safe only when
          # the Pages site itself is private (Enterprise Cloud). A 404
          # (Pages not enabled yet) or 403 (token lacks pages: read) lands
          # in the fail-closed arm below.
          pages_visibility=$(gh api "repos/${REPO}/pages" --jq '.visibility // "unknown"' 2>/dev/null || echo "unreadable")
          if [ "$pages_visibility" = "private" ]; then
            echo "Privacy guard: private repo with private (Enterprise) Pages — safe to publish."
            exit 0
          fi
          if [ "${ALLOW_PUBLIC_PAGES:-}" = "true" ]; then
            echo "::warning title=Privacy guard overridden::ALLOW_PUBLIC_PAGES=true — publishing a PRIVATE repo's report to a Pages site with visibility '${pages_visibility}'. Anyone with the URL can read it."
            exit 0
          fi
          echo "::error title=Privacy guard::This repository is PRIVATE but its GitHub Pages site is not confirmed private (visibility: '${pages_visibility}'). Publishing would expose the report to anyone with the URL."
          echo "Remediation:"
          echo "  1. Use the artifact-link variant instead (downloads are auth-gated):"
          echo "     https://breezy-bays-labs.github.io/cute-dbt/recipes/github-actions-pr-review.html"
          echo "  2. On GitHub Enterprise Cloud, set the Pages site visibility to 'private'."
          echo "  3. To knowingly publish anyway, set the repository variable ALLOW_PUBLIC_PAGES=true."
          exit 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0           # base + head SHAs must be present for the diff
          persist-credentials: false

      # --- Compile the dbt project at the PR head. `dbt compile` (not
      #     `dbt parse`) is required so compiled_code is populated — cute-dbt
      #     fail-closes on an in-scope model with null compiled_code. The
      #     adapter, toolchain (pip/uv/poetry), and profile are
      #     adopter-specific — see the recipe's Prerequisites. The DuckDB
      #     :memory: profile below needs no warehouse / no secrets. ---
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - run: pip install dbt-core dbt-duckdb         # edit: your adapter
      - name: Write a CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'PROFILE'
          my_dbt_profile:        # edit: must match `profile:` in dbt_project.yml
            target: ci
            outputs:
              ci:
                type: duckdb     # edit: your adapter; cloud adapters read secrets from env
                path: ':memory:'
                threads: 4
          PROFILE
      - run: dbt deps --project-dir dbt_project       # edit: your project path
      - run: dbt compile --project-dir dbt_project

      # --- Install cute-dbt. While unpublished, pin a main commit SHA.
      #     Once cute-dbt is on crates.io, replace these two steps with:
      #       cargo binstall cute-dbt --version 0.1 --no-confirm ---
      - uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1
      - name: Install cute-dbt
        env:
          CUTE_DBT_REV: PUT_A_CUTE_DBT_MAIN_SHA_HERE   # edit: pin a trusted commit
        run: cargo install --locked --git https://github.com/breezy-bays-labs/cute-dbt --rev "$CUTE_DBT_REV"

      # --- Diff (SHA-based: deterministic + fork-safe) + render. ---
      #     `--unified=0` so cute-dbt sees the exact changed hunks (block-
      #     precise updated-test detection + the inline YAML diff drawer key
      #     off hunk spans, not just changed filenames). The diff is taken
      #     base...head and the manifest was compiled at head above, so the
      #     hunks line up with the working tree (same-revision contract).
      - name: Render diff-scoped report
        run: |
          set -euo pipefail
          mkdir -p _site
          git diff --unified=0 --find-renames \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            > diff.patch
          cute-dbt report \
            --manifest dbt_project/target/manifest.json \
            --pr-diff @diff.patch \
            --project-root dbt_project \
            --out _site/report.html

      # --- Publish ONLY the report dir to a per-PR Pages subdirectory.
      #     publish_dir: ./_site (NOT .) so the whole checkout never lands
      #     on the gh-pages branch. ---
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
          destination_dir: pr-${{ github.event.pull_request.number }}

      # --- Sticky comment with the report link (one per PR, updated in place). ---
      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cute-dbt-pr-review
          message: |
            ## 📊 cute-dbt review ready

            [**Open the diff-scoped report ↗**](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/report.html)

            Scoped to the models + unit tests this PR changed.

# ----------------------------------------------------------------------
# Fork-PR caveat: with `pull_request` (not `pull_request_target`), forks
# get a read-only GITHUB_TOKEN regardless of the permissions: block, so
# the Pages-publish + sticky-comment steps silently no-op on fork PRs.
# Same-repo branches are unaffected. See the recipe page for the
# pull_request_target / workflow_run workarounds.
# ----------------------------------------------------------------------
