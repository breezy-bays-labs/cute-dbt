name: mdbook

on:
  push:
    branches: [main]
  pull_request:

# Workflow-scoped default. The build job widens to `contents: write` for
# the gh-pages push (main only); PR runs only build + validate and never
# push.
permissions:
  contents: read

# Shared `gh-pages` group across EVERY workflow that pushes to the
# gh-pages branch (this deploy + report-preview.yml's `publish-previews`
# + pr-preview-cleanup.yml). peaceiris pushes can race + lose commits if
# two run concurrently, so they must serialize. cancel-in-progress: false
# — a push completing is preferable to cancelling it mid-flight.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    name: mdbook (build + deploy)
    runs-on: ubuntu-latest
    # `contents: write` for the peaceiris push to gh-pages (gated to
    # main-push by the `if:` on the deploy step). On PR runs the deploy
    # step skips and nothing is pushed; on fork PRs the token is read-only
    # regardless, so the push would no-op.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # peaceiris authenticates with `github_token` directly, not the
          # checkout credentials — so persist-credentials stays false.
          persist-credentials: false
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: mdbook
      - name: Build mdbook
        run: mdbook build book
      - name: Assemble Pages site (book + examples)
        # The mdbook is the site root; `examples/*.html` is mounted at
        # `/examples/` so book chapters can link to rendered reports via
        # relative URLs (e.g. `./examples/jaffle-shop-report.html`).
        # Without this, the book would have to link to GitHub blob URLs
        # which display HTML as source (compounded by .gitattributes
        # `linguist-generated` suppressing the diff view).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r book/book/. _site/
          mkdir -p _site/examples
          cp examples/*.html _site/examples/
      - name: Deploy book to gh-pages root (main only)
        # Pages serves from the `gh-pages` BRANCH (Settings → Pages →
        # Deploy from a branch → gh-pages /). This pushes the book + the
        # rendered examples to the branch root.
        #
        # `keep_files: true` is load-bearing: it preserves the per-PR
        # preview directories (`pr-<N>/`, pushed by report-preview.yml's
        # `publish-previews` job) instead of wiping them on each book
        # deploy. Tradeoff: a *deleted* book page lingers until a manual
        # full-clean — negligible for docs. peaceiris also drops a
        # `.nojekyll` by default (enable_jekyll: false), so mdbook's
        # assets are served as-is without Jekyll processing.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
