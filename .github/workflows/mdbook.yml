name: mdbook

on:
  push:
    branches: [main]
  pull_request:

# Workflow-scoped default. Job-level permissions narrow as needed
# (the deploy job adds pages:write + id-token:write for OIDC).
permissions:
  contents: read

# Allow only one concurrent deployment, but don't cancel in-progress
# runs (Pages deploys are sequential; an in-flight deploy completing
# is preferable to cancelling it mid-upload).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: mdbook (book build)
    runs-on: ubuntu-latest
    # `configure-pages` + `upload-pages-artifact` need pages:write and
    # id-token:write when they run (gated to main-push by `if:` on each
    # step). On PR runs these steps skip and the workflow-level
    # `contents: read` is sufficient.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: mdbook
      - name: Build mdbook
        run: mdbook build book
      - name: Assemble Pages site (book + examples)
        # The mdbook is the site root; `examples/*.html` is mounted at
        # `/examples/` so book chapters can link to rendered reports via
        # relative URLs (e.g. `./examples/jaffle-shop-report.html`).
        # Without this, the book would have to link to GitHub blob URLs
        # which display HTML as source (compounded by .gitattributes
        # `linguist-generated` suppressing the diff view).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r book/book/. _site/
          mkdir -p _site/examples
          cp examples/*.html _site/examples/
      - name: Configure Pages (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Upload Pages artifact (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    name: mdbook (deploy to Pages)
    # Only deploy on main pushes; PRs validate the build via the
    # `mdbook (book build)` job above without uploading or deploying.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
