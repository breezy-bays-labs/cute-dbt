version: 2

# cute-dbt#165 dogfood — the staging columns mocked by the marts unit
# tests carry authored descriptions, so the given-table column-header
# tooltips surface description + column tests in the live PR-diff
# preview report.
models:
  - name: stg_customers
    # cute-dbt live-dogfood — a CONFIG-ONLY axis change: stg_customers has
    # zero unit tests and this schema.yml has no `unit_tests:` block, so this
    # config edit can't drag a test into scope. The Models lens shows a lone
    # [Config] chip on stg_customers + a config-file chip naming this file.
    config:
      tags: ['staging', 'dogfood']
    columns:
      - name: customer_id
        description: Unique identifier for a customer (staging grain)
        tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        description: Unique identifier for an order (staging grain)
        tests:
          - unique
          - not_null
      - name: status
        description: Order lifecycle status as exported from the app
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: stg_payments
    columns:
      - name: payment_id
        description: Unique identifier for a payment (staging grain)
        tests:
          - unique
          - not_null
      - name: payment_method
        description: Payment instrument used for this payment
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']

  # cute-dbt#172 dogfood — the union.arm-coverage given-row sketch reads
  # these declared columns for its recommendation payload.
  - name: stg_refunds
    columns:
      - name: refund_id
        description: Unique identifier for a refund event (staging grain)
        tests:
          - unique
          - not_null
      - name: order_id
        description: Order the refund applies to
      - name: amount
        description: Refunded amount in dollars (negative)
