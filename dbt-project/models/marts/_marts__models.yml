version: 2

models:
  - name: order_metrics
    description: >
      Rich dogfood mart whose transform CTEs reference each other through
      every cute-dbt v0.1 EdgeType (From / Inner / Left / Right / Full /
      Cross / UnionAll / UnionDistinct) plus a comma cross-join
      (cute-dbt#40 heuristic). Built to exercise the CTE DAG + JoinType
      legend rendering. cute-dbt live-dogfood: this is the default-selected
      model on first paint (its rich multi-JoinType CTE graph + Jinja body
      foreground the CTE DAG + Model-SQL drawer).
    # cute-dbt#200 dogfood — model tags so the report's manifest_nodes
    # lookup (and the #201/#202 shelf/hover consumers) renders a
    # non-empty tags row on the live PR-preview report. The compiled
    # manifest's top-level `tags` (the deduplicated resolved list) is
    # what cute-dbt ingests — never `config.tags`.
    # cute-dbt live-dogfood: extend tags + add meta so the Governance lens
    # renders gov-tag + gov-meta chips, and the Model-YAML drawer shows the
    # tags/meta diff.
    # cute-dbt live-dogfood — GOVERNANCE group/owner + access: order_metrics
    # joins the `finance` group (defined in _groups.yml) and is a public
    # surface, so the Governance lens renders a group/owner header chip and
    # an access/public lifecycle chip. fusion requires access under config:.
    config:
      access: public
      group: finance
      tags: ['marts', 'dogfood', 'finance', 'revenue']
      meta:
        owner: 'analytics-eng'
        maturity: 'production'
        pii: false
      # cute-dbt live-dogfood: a TEXT-ONLY (unenforced) contract block so the
      # Model-YAML drawer renders the raw contract YAML WITHOUT requiring a
      # data_type on every column (enforced:true would force that and could
      # break the whole fusion compile — kept off here deliberately; the
      # enforced-contract demo lives in the optional order_metrics_pk model).
      contract:
        enforced: false
    columns:
      - name: order_id
        description: Order identifier (may be null for full-outer non-matches).
        # cute-dbt live-dogfood: column-level tests + meta + tags so the
        # Model-YAML drawer renders the column tests as raw YAML and the
        # Governance lens renders gov-meta-col / column-tag chips. fusion
        # requires column meta/tags under a `config:` block (not bare keys).
        config:
          meta:
            grain: true
          tags: ['key']
        tests:
          - not_null
      - name: status
        description: Order status.
      - name: amount
        description: Paid amount in dollars (the order's settled total).
      - name: all_orders_amount
        description: Grand total of all paid orders (cross-joined constant).
      - name: amount_share
        description: This order's amount as a fraction of all_orders_amount.
      - name: distinct_status_count
        description: Count of distinct statuses (from the UNION-distinct arm).

  # cute-dbt#173 dogfood — the anti-join supersedes showcase. Deliberately
  # carries NO unit test: the PR preview renders join.anti-join UNCOVERED
  # with the inverted (matching-row) given sketch, while the superseded
  # join.left-null-propagation stays silent on the same construct.
  - name: customers_with_no_orders
    description: >
      Customers with no orders — the LEFT JOIN + WHERE right-key IS NULL
      anti-join idiom (cute-dbt#173 supersedes showcase).
    columns:
      - name: customer_id
        description: Customer identifier (natural key of the kept rows).
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.
      - name: matched_customer_id
        description: >
          The right-side join key — always NULL on kept rows; projected so
          the general left-null check provably fires and is superseded.

  # cute-dbt live-dogfood — a BRAND-NEW model (added in this PR) so the
  # Models lens renders it with the NEW state chip (cute-dbt#416
  # ModelState::New on the --pr-diff arm). It calls the new
  # cents_to_dollars() macro, so it is a second macro user in the Macros
  # lens.
  - name: order_metrics_audit
    description: >
      Per-payment audit projection (a NEW model in this PR). Applies the
      new cents_to_dollars() macro to the already-dollars amount.
    columns:
      - name: order_id
        description: Order identifier.
      - name: payment_method
        description: Payment instrument used.
      - name: amount_audit
        description: Amount after the cents_to_dollars() macro (a no-op here).

  # cute-dbt live-dogfood — a BRAND-NEW, deliberately ISOLATED mart (added
  # in this PR) for the mini-DAG HALO demo: it refs ONLY the UNCHANGED
  # stg_payments, so stg_payments renders as the dimmed 1-hop halo context
  # node. Also a NEW state chip in the Models lens.
  - name: payment_audit
    description: >
      Per-method payment rollup (a NEW, isolated model in this PR — the
      mini-DAG halo anchor).
    columns:
      - name: payment_method
        description: Payment instrument used.
      - name: payment_count
        description: Number of payments of this method.
      - name: total_amount
        description: Total amount across payments of this method.

  # cute-dbt live-dogfood — the enforcement.constraint-unbacked check
  # (governance-gated): an ENFORCED contract with a primary_key constraint on
  # order_id but NO unique/not_null data test backing it. enforced:true forces
  # a data_type on every column. OPTIONAL: dropped if the fusion compile
  # rejects the enforced contract (see the PR body outcome note).
  - name: order_metrics_pk
    description: >
      Primary-key audit projection (a NEW model in this PR) with an enforced
      contract and an unbacked primary_key constraint.
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: Order identifier (the declared, unbacked primary key).
        data_type: integer
        constraints:
          - type: primary_key
      - name: status
        description: Order status.
        data_type: varchar
      - name: amount
        description: Order total amount.
        data_type: integer

unit_tests:
  # DICT format (given + expect). dict only compares listed columns, so
  # the derived `amount_share` / `distinct_status_count` are asserted while
  # the rest ride along. Mocks the three import refs with a single matched
  # order so the full join chain resolves deterministically.
  - name: test_order_metrics_computes_amount_share
    description: |
      order_metrics crosses each enriched order against the grand total of
      all paid orders and derives amount_share = amount / all_orders_amount.
      With one paid order of $10 the grand total is $10, so the single row's
      share is 1.0. Uses dbt's dict format for both GIVEN and EXPECT.
    model: order_metrics
    # cute-dbt#125 — an `overrides` block in the self-dogfood project so the
    # PR-diff report's Authoring-YAML drawer surfaces override changes on a
    # real consumed dbt project (not just synthetic fixtures). vars/env_vars
    # are inert here (these models read neither) but are valid dbt and
    # demonstrate the surface; meaningful macro overrides (is_incremental)
    # arrive with the incremental-model work (cute-dbt#145).
    # cute-dbt live-dogfood: edit the override value (USD -> EUR). This
    # surfaces in the Authoring-YAML Authored<->Diff drawer as a yaml_diff
    # ONLY — it must NOT produce a data_diff (the #125 override-only guard).
    overrides:
      vars:
        reporting_currency: 'EUR'
      env_vars:
        DBT_ORDERS_REGION: 'us-east-1'
    given:
      - input: ref('stg_orders')
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'completed'
      # cute-dbt#245 dogfood — DELIBERATELY double-quoted: dbt accepts
      # both quote styles and fusion ships the authored string verbatim
      # on the manifest wire; the live PR-diff preview proves the Rust
      # parsers bind this given (bound_to_node + column_meta).
      - input: ref("stg_payments")
        format: dict
        rows:
          - payment_id: 1
            order_id: 1
            payment_method: 'credit_card'
            # cute-dbt live-dogfood: a DICT cell VALUE change (10 -> 20) so
            # the report renders a dict given-cell diff (not a reformat).
            amount: 20
      - input: ref('stg_customers')
        format: dict
        rows:
          - customer_id: 1
            first_name: 'Ada'
            last_name: 'Lovelace'
      # cute-dbt#172 dogfood — DELIBERATELY EMPTY: the refunds UNION ALL
      # arm in all_statuses gets zero given rows, so the live PR-diff
      # preview surfaces the union.arm-coverage UNCOVERED finding with
      # its given-row recommendation sketch (catalog C3 worked example).
      - input: ref('stg_refunds')
        format: dict
        rows: []
    expect:
      format: dict
      rows:
        - order_id: 1
          status: 'completed'
          # cute-dbt live-dogfood: EXPECT cell VALUE changes (10 -> 20) paired
          # with the given amount change above, so the report renders dict
          # expect-cell diffs.
          amount: 20
          all_orders_amount: 20
          amount_share: 1.0
          # cute-dbt live-dogfood: a NULL-aware cell — UNQUOTED yaml `null`
          # (NOT the string 'null'), so the report renders OLD=1 NEW=NULL with
          # the cell-null styling.
          distinct_status_count: null

  # NOTE: test_orders_sums_payment_methods was MOVED to the standalone
  # _unit_tests__orders.yml (a unit-test-only YAML, no models: block) so
  # editing it gives `orders` a clean single [Unit test] axis chip.

  - name: test_customers_aggregates_orders_and_payments
    description: |
      customers left-joins per-customer order aggregates and payment totals.
      One customer with one $10 completed order yields number_of_orders = 1
      and customer_lifetime_value = 10. Uses sql format for the GIVEN mocks
      and dict format for EXPECT (dict compares only listed columns).
    model: customers
    given:
      - input: ref('stg_customers')
        format: sql
        rows: |
          select
            1 as customer_id
            , 'Ada' as first_name
            , 'Lovelace' as last_name
      - input: ref('stg_orders')
        format: sql
        rows: |
          select
            1 as order_id
            , 1 as customer_id
            , cast('2024-01-01' as date) as order_date
            , 'completed' as status
      - input: ref('stg_payments')
        format: sql
        rows: |
          select
            1 as payment_id
            , 1 as order_id
            , 'credit_card' as payment_method
            , 10 as amount
    expect:
      format: dict
      rows:
        - customer_id: 1
          first_name: 'Ada'
          last_name: 'Lovelace'
          number_of_orders: 1
          customer_lifetime_value: 10

  # NOTE: test_orders_never_refunded_excludes_refunded_orders was REMOVED in
  # this PR alongside its model orders_never_refunded.sql (the REMOVED-model
  # state demo — the Models lens renders a "removed" summary entry).

  # EXTERNAL FIXTURE format (cute-dbt#126). Same shape as
  # test_orders_sums_payment_methods, but the stg_payments GIVEN is sourced
  # from an external csv fixture file (tests/fixtures/stg_payments_credit_card.csv)
  # via `fixture:` instead of inline `rows:`. The rows live in the file, not
  # the manifest, so cute-dbt must READ the file to render the given grid +
  # old→new cell diff. Without the reader the given renders a silently-empty
  # grid / "data in external file" affordance (cute-dbt#98).
  - name: test_orders_from_external_csv_fixture
    description: |
      orders pivots payments into per-method columns and a total amount.
      Identical to test_orders_sums_payment_methods except the stg_payments
      mock is an EXTERNAL csv fixture (cute-dbt#126) — the fixture data is not
      inlined in the manifest, it lives in tests/fixtures/.
    model: orders
    given:
      - input: ref('stg_orders')
        format: csv
        rows: |
          order_id,customer_id,order_date,status
          1,1,2024-01-01,completed
      - input: ref('stg_payments')
        format: csv
        fixture: stg_payments_credit_card
    # cute-dbt live-dogfood: the external fixture file's own credit_card amount
    # is bumped 10 -> 20 (see tests/fixtures/stg_payments_credit_card.csv), so
    # the report splices the external file's hunk as an old->new cell diff. The
    # inline expect is bumped to match (10 -> 20) so the test stays consistent.
    expect:
      format: csv
      rows: |
        order_id,customer_id,order_date,status,credit_card_amount,coupon_amount,bank_transfer_amount,gift_card_amount,amount
        1,1,2024-01-01,completed,20,0,0,0,20
