version: 2

# SPIKE (cute-dbt#145 discovery). May become the committed dogfood fixture
# after shaping settles scope. The unit test exercises the INCREMENTAL branch
# (overrides.macros.is_incremental: true) and mocks the prior model state via
# `given: - input: this`. Authored to inspect how fusion serializes `this`,
# config.materialized, and overrides in manifest.json.

models:
  # cute-dbt#169 dogfood — composite unique_key (customer_id, order_date)
  # with deliberately NO uniqueness data test: the committed
  # grain.unique-key-unbacked UNCOVERED gap the live PR-diff preview
  # surfaces at the payload level. Do NOT add a unique /
  # dbt_utils.unique_combination_of_columns test here — the gap is the
  # fixture (paired-fixture rule, epic cute-dbt#168).
  - name: customer_order_days
    description: >
      Per-customer order-day rollup at the (customer_id, order_date)
      grain. Incremental delete+insert keyed on the composite unique_key;
      no uniqueness test backs the declared grain — the cute-dbt#169
      walking-skeleton coverage gap. cute-dbt live-dogfood: description +
      body both touched so this model stays in scope (grain UNCOVERED).
    columns:
      - name: customer_id
        description: Customer identifier (half of the composite grain).
        tests:
          - not_null
      - name: order_date
        description: Order date (the other half of the composite grain).
      - name: orders_placed
        description: Number of orders the customer placed that day.
      - name: status_variety
        description: Count of distinct order statuses seen that customer-day.

  - name: order_events_incremental
    description: >
      Incremental order-events accumulator. On incremental runs it only
      processes orders newer than the loaded high-water mark
      (max(order_date) from {{ this }}).
    columns:
      # cute-dbt#165 dogfood — unique/not_null on the merge key so the
      # unit test's given/this/expect tables surface a description+tests
      # column-header tooltip in the live PR-diff preview report.
      - name: order_id
        description: Order identifier (unique key for the incremental merge).
        tests:
          - unique
          - not_null
      - name: order_date
        description: Order date; the incremental high-water-mark column.
      - name: status
        description: Order status.

  # cute-dbt live-dogfood (PR #440) — the incremental-CTE-zone showcase.
  # merge-strategy incremental keyed on event_id; the {% if is_incremental() %}
  # block wraps a high-water + delta CTE pair (a real sub-structure, not a bare
  # WHERE). unique+not_null back the merge key — a COVERED grain, the contrast
  # to customer_order_days' deliberately uncovered composite grain above.
  - name: order_events_enriched_incremental
    description: >
      Per-order event stream with a status weight. Incremental MERGE on
      event_id; on incremental runs a high-water-mark CTE and a delta CTE
      (inside the is_incremental block) restrict to events newer than the
      loaded mark. The full build emits every event.
    config:
      tags: ['marts', 'incremental', 'events']
      meta:
        owner: analytics-eng
        maturity: production
        incremental_strategy: merge
    columns:
      - name: event_id
        description: Order identifier; the incremental merge key.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Customer who placed the order.
      - name: event_at
        description: Order date; the incremental high-water-mark column.
      - name: status
        description: Order status.
      - name: status_weight
        description: Numeric weight derived from status via a Jinja loop.

unit_tests:
  # cute-dbt#164 dogfood — the pair below covers BOTH is_incremental()
  # branches (one test with the true override, one with none), the
  # incremental.branch-coverage check's covered/green case in the live
  # PR-diff preview. customer_order_days above deliberately keeps ZERO
  # unit tests — the same check's UNCOVERED ("none") gap fixture, the
  # paired-fixture rule's other half.
  - name: test_order_events_incremental_only_new_rows
    description: |
      With is_incremental() true, the model filters to orders newer than the
      high-water mark in the existing table. `given: - input: this` mocks the
      prior model state (one order on 2024-01-01); stg_orders supplies a newer
      2024-01-02 order. EXPECT is the rows the incremental run MERGES — just the
      newer 2024-01-02 row — NOT the resulting (merged) table.
    model: order_events_incremental
    overrides:
      macros:
        is_incremental: true
    given:
      # cute-dbt live-dogfood: edit a `given: - input: this` cell (the prior
      # model-state mock) — status 'completed' -> 'shipped' on the
      # high-water-mark row, so the report renders a `this` pseudo-input cell
      # diff (the incremental override drawer + branch-coverage COVERED).
      - input: this
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'shipped'
      - input: ref('stg_orders')
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'completed'
          - order_id: 2
            customer_id: 2
            order_date: '2024-01-02'
            status: 'placed'
    expect:
      format: dict
      rows:
        - order_id: 2
          customer_id: 2
          order_date: '2024-01-02'
          status: 'placed'

  - name: test_order_events_incremental_initial_full_build
    description: |
      cute-dbt#164 — the FULL-BUILD branch: no overrides block, so dbt
      compiles is_incremental() as false (the unit-test default) and the
      high-water-mark filter drops out of the compiled SQL. EXPECT is every
      input row. Pairs with test_order_events_incremental_only_new_rows to
      exercise BOTH is_incremental() branches.
    model: order_events_incremental
    given:
      - input: ref('stg_orders')
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'completed'
          - order_id: 2
            customer_id: 2
            order_date: '2024-01-02'
            status: 'placed'
    expect:
      format: dict
      rows:
        - order_id: 1
          customer_id: 1
          order_date: '2024-01-01'
          status: 'completed'
        - order_id: 2
          customer_id: 2
          order_date: '2024-01-02'
          status: 'placed'

  # cute-dbt live-dogfood (PR #440) — the enriched model's branch pair,
  # mirroring the order_events_incremental pair above: one test drives the
  # incremental CTE zone (overrides.macros.is_incremental: true), one the full
  # build. The incremental test's `this` mock is the high-water-mark source.
  - name: test_order_events_enriched_incremental_only_new_events
    description: |
      is_incremental() true: high_water reads max(event_at) from the mocked
      `this` (2024-01-01); new_events keeps only strictly-newer events. EXPECT
      is the single 2024-01-02 'placed' event the merge writes, with its
      status_weight (placed -> 1).
    model: order_events_enriched_incremental
    overrides:
      macros:
        is_incremental: true
    given:
      - input: this
        format: dict
        rows:
          - event_id: 1
            customer_id: 1
            event_at: '2024-01-01'
            status: 'completed'
            status_weight: 3
      - input: ref('stg_orders')
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'completed'
          - order_id: 2
            customer_id: 2
            order_date: '2024-01-02'
            status: 'placed'
    expect:
      format: dict
      rows:
        - event_id: 2
          customer_id: 2
          event_at: '2024-01-02'
          status: 'placed'
          status_weight: 1

  - name: test_order_events_enriched_incremental_full_build
    description: |
      The full-build branch: no overrides, so is_incremental() is false, the
      high_water + new_events CTEs drop out, and the model emits every event
      with its status_weight (completed -> 3, placed -> 1).
    model: order_events_enriched_incremental
    given:
      - input: ref('stg_orders')
        format: dict
        rows:
          - order_id: 1
            customer_id: 1
            order_date: '2024-01-01'
            status: 'completed'
          - order_id: 2
            customer_id: 2
            order_date: '2024-01-02'
            status: 'placed'
    expect:
      format: dict
      rows:
        - event_id: 1
          customer_id: 1
          event_at: '2024-01-01'
          status: 'completed'
          status_weight: 3
        - event_id: 2
          customer_id: 2
          event_at: '2024-01-02'
          status: 'placed'
          status_weight: 1
