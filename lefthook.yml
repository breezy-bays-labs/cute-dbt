# Pre-commit and pre-push hooks for cute-dbt.
#
# After cloning, run `lefthook install` once to wire git hooks. CI runs
# the same gates plus coverage + the three new mechanical guards
# (non-mirror-guard, baseline-required-grep, feature-count). pre-push
# matches the coverage-independent CI subset so most pushes don't burn
# CI minutes on easily-caught local issues.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
      timeout: 60s
    gitleaks:
      run: gitleaks protect --staged --redact
      timeout: 60s

pre-push:
  parallel: false
  commands:
    # Same battery the `Format`, `Clippy`, `Test (linux-x86)`,
    # `cargo-deny`, and `cargo doc` CI jobs run. Pedantic clippy fires
    # via `#![warn(clippy::pedantic, clippy::cargo)]` at the crate root.
    fmt:
      run: cargo fmt --all --check
      timeout: 60s
    non-mirror-guard:
      # Mirror the `non-mirror-guard` CI job. Rejects "pattern completion"
      # additions to apparatus this single-crate tool does not need —
      # explicitly documented in ARCHITECTURE.md "Conscious non-mirrors."
      # See `.github/workflows/ci.yml` for the canonical version.
      run: |
        set -euo pipefail
        fail=0
        if grep -qE '^\[workspace\]' Cargo.toml; then
          echo "non-mirror-guard: Cargo.toml must not declare a [workspace] (single-crate by design)"
          fail=1
        fi
        if grep -qE '^[[:space:]]*\[bans\.deny\.wrappers\]|^[[:space:]]*deny\.wrappers[[:space:]]*=' deny.toml; then
          echo "non-mirror-guard: deny.toml must not use bans.deny.wrappers (proc-macro fragility; no AST-purity invariant here)"
          fail=1
        fi
        if grep -rEn '^[[:space:]]*pub[[:space:]]+use[[:space:]]+crate::[a-zA-Z_]+::' src/lib.rs; then
          echo "non-mirror-guard: no public-API re-export shim pattern (single crate, no library consumers)"
          fail=1
        fi
        exit "$fail"
      timeout: 30s
    baseline-required-grep:
      # Mirror the `baseline-required-grep` CI job. Every feature line
      # invoking `cute-dbt report` must pass exactly one scope source
      # (--baseline-manifest OR --pr-diff, cute-dbt#85) unless
      # explicitly tagged @no-baseline-usage-error (the deliberate
      # neither-source case). VERB-AWARE since cute-dbt#100: `explore`
      # invocations are allowed (no scope source by design); bare
      # verbless invocations are flagged; a ZERO-MATCH TRIPWIRE fails
      # loudly if the trigger prose ever matches nothing. Keep in
      # lockstep with ci.yml (the canonical version).
      run: |
        set -euo pipefail
        # Gherkin tag semantics: a tag line applies to the NEXT scenario.
        # See ci.yml for the matching guard.
        if ! awk '
          /^[[:space:]]*@no-baseline-usage-error([[:space:]]|$)/ { pending_skip=1; next }
          /^[[:space:]]*Scenario(:|[[:space:]]+Outline)/ { skip=pending_skip; pending_skip=0; next }
          /cute-dbt( report| explore)? with --manifest/ {
            matched++
            if ($0 ~ /cute-dbt explore with /) next
            if (!skip && $0 !~ /--baseline-manifest/ && $0 !~ /--pr-diff/) {
              print FILENAME ":" NR ": " $0
              found=1
            }
            next
          }
          END {
            if (matched == 0) {
              print "TRIPWIRE: the CLI-invocation trigger matched ZERO feature lines — the invocation prose drifted; update this gate alongside it"
              exit 1
            }
            exit (found ? 1 : 0)
          }
        ' features/*.feature; then
          echo "baseline-required-grep: report scenarios without a scope source (--baseline-manifest or --pr-diff) must be tagged @no-baseline-usage-error — or the trigger matched nothing (tripwire)"
          exit 1
        fi
      timeout: 15s
    feature-count:
      # Asserts the .feature-count invariant; the enforced count lives ONLY
      # in the `expected=` line below (cute-dbt#68 — numbers in labels and
      # comments go stale). History: bumped to 24 in cute-dbt#300 when
      # one_command_review.feature joined the contract; previously
      # bumped in cute-dbt#266 (project_definition),
      # cute-dbt#106 (explore_change_context),
      # cute-dbt#105 (explore_js_contract),
      # cute-dbt#104 (explore_model_detail),
      # cute-dbt#103 (explore_test_badges),
      # cute-dbt#102 (explore_view_toggle),
      # cute-dbt#101 (explore_lineage_dag),
      # cute-dbt#100 (explore_cli + explore_full_manifest),
      # cute-dbt#171 (check_selection), cute-dbt#169 (coverage_checks),
      # cute-dbt#145 (incremental_models), cute-dbt#98 (cell_table_diff),
      # cute-dbt#84 (pr_diff_scoping), cute-dbt#71 (consumer_report_contract),
      # cute-dbt#69 (unit_test_yaml).
      # Mirrors the `feature-count` CI job; the README is not a feature.
      run: |
        set -euo pipefail
        expected=24
        count=$(find features -maxdepth 1 -name '*.feature' | wc -l | tr -d ' ')
        if [ "$count" != "$expected" ]; then
          echo "feature-count: expected ${expected} .feature files, found ${count}"
          exit 1
        fi
      timeout: 5s
    mdbook-build:
      # Mirror the `mdbook (book build)` CI job. Builds the product-docs
      # mdbook locally so book/SUMMARY.md / book.toml / cross-references
      # break before push, not in CI.
      #
      # **Soft mirror**: when `mdbook` is not on PATH the hook prints an
      # install hint and exits 0 — contributors who don't touch the book
      # aren't blocked. CI is authoritative for absent-mdbook breakage;
      # the hook is a best-effort local mirror.
      run: |
        set -euo pipefail
        if ! command -v mdbook >/dev/null 2>&1; then
          echo "mdbook-build: mdbook not on PATH — install via 'cargo install mdbook' or 'brew install mdbook' to mirror the CI gate locally. Skipping."
          exit 0
        fi
        mdbook build book
      timeout: 60s
    fixture-manifest-gate:
      # Mirror the `fixture-manifest-gate` CI job (synthetic-only invariant).
      # Covers both [[fixture]] (tests/fixtures/) and [[project_data]] (the
      # committed embedded dbt-project/ data carriers: the seed CSVs,
      # cute-dbt#115). The compiled target/manifest.json is gitignored build
      # output (recompiled fresh, never committed), so it is not a covered
      # data carrier. The cargo tests `tests/fixture_manifest_listed.rs`
      # cover SHA-256 + synthetic_only + listed-check exhaustively; this hook
      # is the fastest "you forgot to list it" signal pre-push.
      #
      # POSIX-sh compatible (lefthook runs `sh -c`, not bash) — no process
      # substitution; uses tmpfiles instead. macOS-portable: `find | sed`
      # rather than GNU `find -printf`. dbt-project data carriers are
      # enumerated via `git ls-files` (never a filesystem walk) so a local
      # `dbt compile` leaving build output under dbt-project/target/ cannot
      # leak in.
      run: |
        set -eu
        manifest="tests/fixtures/MANIFEST.toml"
        if [ ! -f "$manifest" ]; then
          echo "fixture-manifest-gate: $manifest missing"
          exit 1
        fi
        tmpdir=$(mktemp -d)
        trap 'rm -rf "$tmpdir"' EXIT
        awk '
          /^[[:space:]]*\[\[fixture\]\][[:space:]]*$/ { in_fixture=1; next }
          /^[[:space:]]*\[/ { in_fixture=0 }
          in_fixture && /^[[:space:]]*path[[:space:]]*=/ {
            line=$0
            sub(/^[^"]*"/, "", line)
            sub(/".*$/, "", line)
            print line
          }
        ' "$manifest" | sort -u > "$tmpdir/listed"
        find tests/fixtures -type f ! -name MANIFEST.toml \
          | sed 's|^tests/fixtures/||' | sort -u > "$tmpdir/committed"
        unlisted=$(comm -23 "$tmpdir/committed" "$tmpdir/listed" | sed '/^$/d')
        missing=$(comm -13 "$tmpdir/committed" "$tmpdir/listed" | sed '/^$/d')
        fail=0
        if [ -n "$unlisted" ]; then
          echo "fixture-manifest-gate: unlisted files (synthetic-only invariant):"
          printf '  - %s\n' $unlisted
          fail=1
        fi
        if [ -n "$missing" ]; then
          echo "fixture-manifest-gate: MANIFEST.toml lists missing paths:"
          printf '  - %s\n' $missing
          fail=1
        fi
        # dbt-project/ data carriers (cute-dbt#115).
        awk '
          /^[[:space:]]*\[\[project_data\]\][[:space:]]*$/ { in_pd=1; next }
          /^[[:space:]]*\[/ { in_pd=0 }
          in_pd && /^[[:space:]]*path[[:space:]]*=/ {
            line=$0
            sub(/^[^"]*"/, "", line)
            sub(/".*$/, "", line)
            print line
          }
        ' "$manifest" | sort -u > "$tmpdir/pd_listed"
        git ls-files dbt-project/seeds/ dbt-project/tests/fixtures/ \
          | sort -u > "$tmpdir/pd_tracked"
        pd_unlisted=$(comm -23 "$tmpdir/pd_tracked" "$tmpdir/pd_listed" | sed '/^$/d')
        pd_missing=$(comm -13 "$tmpdir/pd_tracked" "$tmpdir/pd_listed" | sed '/^$/d')
        if [ -n "$pd_unlisted" ]; then
          echo "fixture-manifest-gate: unlisted dbt-project data carriers ([[project_data]], synthetic-only invariant):"
          printf '  - %s\n' $pd_unlisted
          fail=1
        fi
        if [ -n "$pd_missing" ]; then
          echo "fixture-manifest-gate: [[project_data]] lists non-tracked paths:"
          printf '  - %s\n' $pd_missing
          fail=1
        fi
        if grep -nE '^[[:space:]]*synthetic_only[[:space:]]*=' "$manifest" \
            | grep -vE '=[[:space:]]*true([[:space:]]*#.*)?$' >&2; then
          echo "fixture-manifest-gate: every entry must have synthetic_only = true"
          fail=1
        fi
        exit "$fail"
      timeout: 10s
    heuristics-ledger:
      # Mirror the `heuristics-ledger` CI job (cute-dbt#169): regenerate
      # heuristics/registry.toml + book/src/checks/*.md from the
      # `heuristics!` block and fail on any diff vs the committed ledger.
      # See `.github/workflows/ci.yml` for the canonical version.
      run: |
        set -euo pipefail
        GEN_HEURISTICS_LEDGER=1 cargo test --test heuristics_ledger --locked
        if ! git diff --exit-code -- heuristics book/src/checks; then
          echo "heuristics-ledger: generated ledger drifted from src/domain/checks.rs — commit the regenerated files"
          exit 1
        fi
      timeout: 300s
    clippy:
      run: cargo clippy --all-targets --locked -- -D warnings
      timeout: 300s
    test:
      run: cargo nextest run --all-targets --locked
      timeout: 300s
    deny:
      run: cargo deny check
      timeout: 60s
    docs:
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --no-deps --document-private-items --locked
      timeout: 120s
