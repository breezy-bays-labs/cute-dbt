# Vendored frontend asset provenance.
#
# Every asset inlined into cute-dbt's generated HTML report is listed here
# with its pinned version, canonical source URL, SHA-256 of the embedded
# bytes, and SPDX license. Paired with `Cargo.toml` + `Cargo.lock` +
# `deny.toml` (the Rust crate graph), this file is the complete
# supply-chain artifact an auditor reads for the frontend bundle.
#
# Integrity is enforced two ways, both of which fail the PR on drift:
#   - `tests/assets_manifest.rs` — a `cargo test` asserting every listed
#     asset exists on disk, its SHA-256 matches, its license is permissive,
#     and no file under `assets/` is unlisted.
#   - the `assets-manifest-gate` CI job — a structural grep mirroring
#     `fixture-manifest-gate`.
#
# Update flow for a version bump: re-download from `source`, replace the
# file, update `version` + `sha256` here; the PR 9 headless-zero-egress
# test then re-validates that the new bundle still issues zero requests.
#
# Schema (each entry):
#   [[asset]]
#   name    = "..."             # library identifier (e.g. "mermaid")
#   version = "..."             # pinned upstream version
#   path    = "..."             # filename within assets/
#   source  = "https://..."     # canonical download URL
#   sha256  = "..."             # hex SHA-256 of the embedded bytes
#   license = "MIT" | ...       # SPDX identifier (permissive only)

