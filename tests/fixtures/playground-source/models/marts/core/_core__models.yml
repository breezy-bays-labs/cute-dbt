  - name: fct_clinical_events
    description: >
      Unified clinical events fact table combining conditions, medications, and procedures.
      Each row represents a single clinical event with standardized structure.
      Links to patient and encounter dimensions.
    data_tests:
      # Row count validation - should be sum of conditions + medications + procedures (v0.8 - dbt_expectations)
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 60000
          config:
            severity: warn
    columns:
      - name: clinical_event_key
        description: Surrogate key for the clinical event
        data_tests:
          - unique
          - not_null

      - name: event_type
        description: Type of clinical event (CONDITION, MEDICATION, PROCEDURE)
        data_tests:
          - not_null
          - accepted_values:
              values: ['CONDITION', 'MEDICATION', 'PROCEDURE']

      - name: event_id
        description: Natural event identifier (condition_id, medication_id, or procedure_id)
        data_tests:
          - not_null

      - name: patient_key
        description: Foreign key to dim_patients (-1 for unknown)
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_key

      - name: patient_id
        description: Natural patient identifier
        data_tests:
          - not_null

      - name: encounter_key
        description: Foreign key to fct_encounters (-1 for unknown)
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_encounters')
              field: encounter_key

      - name: encounter_id
        description: Natural encounter identifier
        data_tests:
          - not_null

      - name: event_date_key
        description: Foreign key to dim_date for event start
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
              config:
                where: "event_date_key != -1"

      - name: event_start_date
        description: Start date of the clinical event
        data_tests:
          - not_null
          # Date range validation (v0.8 - dbt_expectations)
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'1900-01-01'::date"
              max_value: "current_date"
              config:
                severity: warn

      - name: event_end_date
        description: End date of the clinical event (null if ongoing or one-time)
        data_tests:
          # Date range validation (v0.8 - dbt_expectations)
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'1900-01-01'::date"
              max_value: "current_date"
              row_condition: "event_end_date is not null"
              config:
                severity: warn

      - name: code
        description: Clinical code (SNOMED-CT or RxNorm)
        data_tests:
          - not_null

      - name: code_system
        description: Code system (SNOMED-CT or RXNORM)
        data_tests:
          - not_null
          - accepted_values:
              values: ['SNOMED-CT', 'RXNORM']

      - name: description
        description: Description of the clinical event
        data_tests:
          - not_null

      - name: reason_code
        description: Clinical code for the reason of the event

      - name: reason_description
        description: Description of the reason for the event

      - name: event_cost
        description: Cost of the clinical event
        data_tests:
          # Cost must be non-negative (v0.8 - dbt_expectations)
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "event_cost is not null"
              config:
                severity: warn

      - name: _loaded_at
        description: Timestamp when record was loaded

  # cute-dbt#165 — column-header tooltip dogfood on the incremental model:
  # authored descriptions + unique/not_null on the merge key, so the
  # playground golden surfaces the th tooltips on this model's `this`
  # given, ref given, and expect tables.
  - name: fct_encounters_incremental
    description: >
      Incremental encounter accumulator. On incremental runs it only merges
      encounters newer than the loaded start_time high-water mark.
    columns:
      - name: encounter_id
        description: Natural key of the encounter (unique per visit)
        data_tests:
          - unique
          - not_null
      - name: patient_id
        description: Patient the encounter belongs to
      - name: encounter_type
        description: Visit class (wellness, emergency, ...)
      - name: start_time
        description: Encounter start timestamp - the incremental high-water mark
      - name: total_cost
        description: Total claim cost for the encounter


# ============================================================================
# UNIT TESTS
# ============================================================================
# These unit_tests are authored to exercise the cute-dbt unit-test explorer
# (https://github.com/breezy-bays-labs/cute-dbt) against this playground's
# UNION-bearing mart models. Each test mocks a small set of upstream rows
# and asserts the SQL transformation produces the expected shape.

unit_tests:
  # cute-dbt's authoring-YAML drawer (since #69) attaches contiguous
  # `#`-comment lines at the SAME indent as `- name:` immediately above
  # the test to the test's authored slice. This block demonstrates the
  # LEADING bracket — useful for stating the test's intent before the
  # reader sees the assertion (cute-dbt#73).
  - name: test_dim_payers_injects_unknown_sentinel
    description: |
      dim_payers UNION-ALLs an unknown-member sentinel row (payer_key = -1)
      with the sequenced source rows. This test verifies the sentinel
      survives the union and the sequenced rows are surrogate-keyed
      starting at 1. Uses dbt's dict format for both GIVEN and EXPECT —
      dict format only compares listed columns, so non-deterministic
      outputs (`_loaded_at` via `current_timestamp`) are excluded from
      assertion automatically.
    model: dim_payers
    # The INSIDE bracket — comments at deeper indent than `- name:` ride
    # along with the body slice as raw text. Cute-dbt preserves them
    # verbatim in the Authoring YAML drawer (cute-dbt#73).
    given:
      - input: ref('stg_synthea__payers')
        format: dict
        rows:
          - payer_id: 'a00000aa-0000-0000-0000-000000000001'
            payer_name: 'Acme Health'
            address: '1 Acme Way'
            city: 'Boston'
            state: 'MA'
            zip_code: '02101'
            phone: '555-0100'
            amount_covered: 1000.0
            amount_uncovered: 250.0
            revenue: 1250.0
            covered_encounters: 10
            uncovered_encounters: 2
            covered_medications: 5
            uncovered_medications: 1
            covered_procedures: 3
            uncovered_procedures: 0
            covered_immunizations: 4
            uncovered_immunizations: 0
            unique_customers: 8
            average_quality_of_life_score: 0.85
            member_months: 96
    expect:
      format: dict
      rows:
        - payer_key: -1
          payer_id: 'UNKNOWN'
          payer_name: 'Unknown Payer'
        - payer_key: 1
          payer_id: 'a00000aa-0000-0000-0000-000000000001'
          payer_name: 'Acme Health'
  # The TRAILING bracket — contiguous `#`-comment lines at the SAME
  # indent as `- name:`, immediately following the test body and
  # terminated by EOF or a blank line, are attached to this test's
  # slice. Useful for cross-references and follow-up notes (cute-dbt#73).

  # cute-dbt#145 — an incremental-model unit test. `overrides.macros.
  # is_incremental: true` drives the model's is_incremental() branch,
  # `given: - input: this` supplies the model's prior state, and Expected is
  # the rows MERGED/INSERTED by the run — not the final table after the merge.
  - name: test_fct_encounters_incremental_appends_new_encounters
    description: |
      fct_encounters_incremental appends encounters newer than the latest
      already-loaded start_time. With is_incremental() true, only the new
      encounter (e2) is merged; the prior row (e1, supplied via `this`) is
      untouched, so Expected is the single inserted row — the materialization
      delta, not the resulting table.
    model: fct_encounters_incremental
    overrides:
      macros:
        is_incremental: true
    given:
      - input: this
        format: dict
        rows:
          - encounter_id: 'e1'
            patient_id: 'p1'
            encounter_type: 'wellness'
            start_time: '2025-01-01 09:00:00'
            total_cost: 100.0
      - input: ref('stg_synthea__encounters')
        format: dict
        rows:
          - encounter_id: 'e1'
            patient_id: 'p1'
            encounter_type: 'wellness'
            start_time: '2025-01-01 09:00:00'
            total_cost: 100.0
          - encounter_id: 'e2'
            patient_id: 'p2'
            encounter_type: 'emergency'
            start_time: '2025-02-01 14:30:00'
            total_cost: 500.0
    expect:
      format: dict
      rows:
        - encounter_id: 'e2'
          patient_id: 'p2'
          encounter_type: 'emergency'
          start_time: '2025-02-01 14:30:00'
          total_cost: 500.0
