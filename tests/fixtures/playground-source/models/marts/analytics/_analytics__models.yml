  # ============================================================================
  # OPERATIONAL VIEWS
  # ============================================================================

  - name: v_patient_current_conditions
    description: |
      Current (active) conditions for each patient, filtered from fct_condition_cohorts.
      Use for patient panels, disease management dashboards, and care gap identification.
      Grain: (patient_id, condition_code) - only active conditions

      Use cases:
      - Patient panel management
      - Active disease registries
      - Care gap identification
      - Real-time patient condition views

    config:
      materialized: table
      tags: ['analytics', 'marts', 'view']
    meta:
      grain: patient_id + condition_code
      owner: healthcare_analytics
      uses:
        - "Patient panel displays"
        - "Active condition registries"
        - "Care gap dashboards"
      example_queries:
        - name: "Patient active conditions lookup"
          description: "Get all active conditions for a specific patient"
          sql: |
            select
                vpcc.patient_id
                , vpcc.condition_code
                , vpcc.condition_description
                , vpcc.first_diagnosis_date
                , vpcc.months_with_condition
                , vpcc.encounter_count
            from main_marts.v_patient_current_conditions vpcc
            where vpcc.patient_id = 'patient-uuid-here'
            order by vpcc.first_diagnosis_date

        - name: "Active condition summary"
          description: "Count of patients by active condition for disease registries"
          sql: |
            select
                vpcc.condition_code
                , vpcc.condition_description
                , count(distinct vpcc.patient_id) as active_patient_count
                , round(avg(vpcc.months_with_condition), 1) as avg_duration_months
                , round(avg(vpcc.encounter_count), 1) as avg_encounters
            from main_marts.v_patient_current_conditions vpcc
            group by 1, 2
            order by active_patient_count desc
            limit 20

    columns:
      - name: patient_key
        description: Foreign key to dim_patients

      - name: patient_id
        description: Natural patient identifier

      - name: condition_key
        description: Foreign key to dim_conditions
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_conditions')
                field: condition_key

      - name: condition_code
        description: ICD/SNOMED condition code

      - name: condition_description
        description: Full condition name

      - name: first_diagnosis_date
        description: Date of first diagnosis

      - name: months_with_condition
        description: Duration of condition in months

      - name: encounter_count
        description: Number of encounters with this condition

  - name: v_provider_active_patients
    description: |
      Active patient count per provider for panel management and workload analysis.
      Aggregates patients with active conditions by their treating provider.
      Grain: provider_id

      Use cases:
      - Provider panel size management
      - Workload distribution analysis
      - Capacity planning
      - Provider assignment optimization

    config:
      materialized: table
      tags: ['analytics', 'marts', 'view']
    meta:
      grain: provider_id
      owner: healthcare_analytics
      uses:
        - "Provider panel management"
        - "Workload balancing"
        - "Capacity planning"
      example_queries:
        - name: "Provider panel sizes"
          description: "View provider workload by active patient and condition counts"
          sql: |
            select
                vpap.provider_id
                , vpap.provider_name
                , vpap.active_patient_count
                , vpap.total_active_conditions
                , vpap.avg_conditions_per_patient
            from main_marts.v_provider_active_patients vpap
            where vpap.active_patient_count > 0
            order by vpap.active_patient_count desc
            limit 25

        - name: "Provider workload distribution"
          description: "Analyze distribution of patient panels across providers"
          sql: |
            select
                case
                    when vpap.active_patient_count = 0 then '0'
                    when vpap.active_patient_count <= 10 then '1-10'
                    when vpap.active_patient_count <= 50 then '11-50'
                    when vpap.active_patient_count <= 100 then '51-100'
                    else '100+'
                end as panel_size_bucket
                , count(*) as provider_count
                , sum(vpap.active_patient_count) as total_patients
            from main_marts.v_provider_active_patients vpap
            group by 1
            order by 1

    columns:
      - name: provider_key
        description: Foreign key to dim_providers
        data_tests:
          - unique
          - not_null

      - name: provider_id
        description: Natural provider identifier
        data_tests:
          - unique
          - not_null

      - name: provider_name
        description: Full name of the provider

      - name: organization_key
        description: Foreign key to dim_organizations

      - name: organization_id
        description: Natural organization identifier

      - name: active_patient_count
        description: Number of patients with active conditions
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_active_conditions
        description: Total number of active conditions managed
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: avg_conditions_per_patient
        description: Average number of active conditions per patient
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

  - name: v_encounter_summary
    description: |
      Enriched encounter view with dimension attributes for ad-hoc analysis.
      Ephemeral (not persisted) - used as a building block for other queries.
      Joins encounters with patient, provider, organization, and payer details.

      Use cases:
      - Ad-hoc encounter analysis
      - Building block for custom reports
      - Quick encounter lookups with full context

    config:
      materialized: ephemeral
      tags: ['analytics', 'marts', 'view']
    columns:
      - name: encounter_id
        description: Unique encounter identifier

      - name: encounter_date
        description: Date of the encounter

      - name: patient_id
        description: Patient identifier

      - name: patient_name
        description: Full patient name

      - name: provider_id
        description: Provider identifier

      - name: provider_name
        description: Full provider name

      - name: organization_id
        description: Organization identifier

      - name: organization_name
        description: Organization name

      - name: payer_id
        description: Payer identifier

      - name: payer_name
        description: Payer name

      - name: encounter_class
        description: Type of encounter

      - name: total_cost
        description: Total claim cost

      - name: payer_coverage
        description: Amount covered by insurance

      - name: patient_responsibility
        description: Amount owed by patient

  - name: mart_dq_summary
    description: |
      Data quality summary metrics for monitoring quarantine rates and validation failures.
      One row per entity type (encounters, medications) with quarantine counts and failure breakdowns.
      Grain: entity_type

      Use cases:
      - Data quality monitoring dashboards
      - Quarantine rate trending
      - Validation failure root cause analysis
      - Data quality SLA tracking

    config:
      tags: ['analytics', 'data_quality', 'marts']
    meta:
      grain: entity_type
      owner: healthcare_analytics
      uses:
        - "Data quality dashboards"
        - "Quarantine monitoring"
        - "Data quality alerting"

    columns:
      - name: entity_type
        description: "Type of entity being measured (encounters, medications)"
        tests:
          - not_null
          - accepted_values:
              values: ['encounters', 'medications']

      - name: quarantined_count
        description: "Number of records failing data quality validations"
        tests:
          - not_null

      - name: total_count
        description: "Total number of records (valid + quarantined)"
        tests:
          - not_null

      - name: quarantine_rate_pct
        description: "Percentage of records quarantined (quarantined_count / total_count * 100)"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: failed_timestamp_validations
        description: "Count of records failing timestamp/date sequence validations"

      - name: failed_future_date_validations
        description: "Count of records with future dates"

      - name: failed_historical_end_validations
        description: "Count of records with end dates before 1900"

      - name: failed_historical_start_validations
        description: "Count of records with start dates before 1900"

      - name: _generated_at
        description: "Timestamp when summary was generated"


# ============================================================================
# UNIT TESTS
# ============================================================================
# These unit_tests are authored to exercise the cute-dbt unit-test explorer
# (https://github.com/breezy-bays-labs/cute-dbt) against this playground's
# UNION-bearing analytics mart. They intentionally exercise different
# fixture formats for `given` (and `expect` where relevant): one csv,
# one sql. dim_payers (_core__models.yml) covers the dict format.
# Together the three tests pin cute-dbt's renderer against every dbt
# 1.8+ unit_test fixture format. See `_core__models.yml` for the third
# test (test_dim_payers_injects_unknown_sentinel).
#
# **Test-execution prerequisite**: dict and csv given formats introspect
# the upstream model's schema (to NULL-fill unspecified columns). Run
# `dbt run-operation load_synthea_sources` against a persistent DuckDB
# target (see `playground README.md`) before `dbt test --select
# test_type:unit`.

unit_tests:
  # LEADING bracket for test 1 — the slicer attaches contiguous
  # `#`-comment lines at the SAME indent as `- name:` immediately above
  # the test (no blank-line gap below) to this test's authored slice
  # (cute-dbt#69 / #73).
  - name: test_mart_dq_summary_combines_encounter_and_medication_metrics
    description: |
      mart_dq_summary UNION-ALLs metrics from stg_synthea__encounters
      and stg_synthea__medications. This test mocks two encounter rows
      (one invalid) and two medication rows (both invalid), then asserts
      the per-entity counts + quarantine rate. Uses csv format for both
      GIVEN and EXPECT — compact tabular form across many boolean
      dq-flag columns.
    model: mart_dq_summary
    # INSIDE bracket for test 1 — comments at deeper indent than
    # `- name:` ride along with the body slice as raw text (cute-dbt#69
    # / #73).
    given:
      - input: ref('stg_synthea__encounters')
        format: csv
        rows: |
          is_dq_valid,valid_encounter_timestamps,no_future_encounter_dates,end_after_1900,start_after_1900
          false,false,true,true,true
          true,true,true,true,true
      - input: ref('stg_synthea__medications')
        format: csv
        rows: |
          is_dq_valid,valid_medication_dates,no_future_medication_dates,start_after_1900,end_after_1900_if_present
          false,false,true,true,true
          false,true,false,true,true
    expect:
      format: csv
      rows: |
        entity_type,quarantined_count,total_count,quarantine_rate_pct,failed_timestamp_validations
        encounters,1,2,50.00,1
        medications,2,2,100.00,1
  # TRAILING bracket for test 1 — the comment block butts against the
  # body above (no blank-line gap) and is terminated below by the blank
  # line separating the two tests (cute-dbt#69 / #73).

  # LEADING bracket for test 2 — sits between the blank-line
  # terminator above and `- name:` below with no further gap, so the
  # leading-wins tiebreaker is moot here (cute-dbt#69 / #73).
  - name: test_mart_dq_summary_zero_quarantined_when_all_valid
    description: |
      mart_dq_summary should report zero quarantined_count and 0.00
      quarantine_rate_pct when every upstream row passes data-quality
      validations. Uses sql format for the GIVEN mocks and dict format
      for the EXPECT — dict expects only compare listed columns, so
      non-deterministic outputs (`_generated_at` from
      `current_timestamp`) are excluded from comparison.
    model: mart_dq_summary
    # INSIDE bracket for test 2 — same rule as test 1 (cute-dbt#69 /
    # #73). Demonstrates that the slicer ride-along applies to every
    # unit_test, not just the first in the file.
    given:
      - input: ref('stg_synthea__encounters')
        format: sql
        rows: |
          select
            true as is_dq_valid
            , true as valid_encounter_timestamps
            , true as no_future_encounter_dates
            , true as end_after_1900
            , true as start_after_1900
      - input: ref('stg_synthea__medications')
        format: sql
        rows: |
          select
            true as is_dq_valid
            , true as valid_medication_dates
            , true as no_future_medication_dates
            , true as start_after_1900
            , true as end_after_1900_if_present
    expect:
      format: dict
      rows:
        - entity_type: 'encounters'
          quarantined_count: 0
          total_count: 1
          quarantine_rate_pct: 0.00
        - entity_type: 'medications'
          quarantined_count: 0
          total_count: 1
          quarantine_rate_pct: 0.00
  # TRAILING bracket for test 2 — terminated by EOF (cute-dbt#69 /
  # #73).
