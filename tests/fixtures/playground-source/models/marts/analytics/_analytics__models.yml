version: 2

models:
  # ============================================================================
  # DIMENSIONS
  # ============================================================================

  - name: dim_conditions
    description: |
      Master condition dimension for healthcare analytics.
      One row per unique ICD/SNOMED condition code, deduplicated from staging.
      Use for filtering and grouping by condition across fact tables.

      Use cases:
      - Condition-based cohort analysis
      - Disease prevalence tracking
      - Condition frequency and distribution reporting
      - Join target for condition-related facts

    config:
      tags: ['analytics', 'marts', 'dimension']
    meta:
      grain: condition_code
      owner: healthcare_analytics
      uses:
        - "Condition lookup and filtering"
        - "Cohort analysis by diagnosis"
        - "Disease prevalence reporting"
      example_queries:
        - name: "Top 10 most common conditions"
          description: "Identify the most prevalent conditions in the patient population"
          sql: |
            select
                condition_code
                , condition_description
                , patient_count
                , encounter_count
            from main_marts.dim_conditions
            order by patient_count desc
            limit 10

        - name: "Conditions by encounter frequency"
          description: "Find conditions that drive the most healthcare utilization"
          sql: |
            select
                condition_code
                , condition_description
                , encounter_count
                , patient_count
                , round(encounter_count * 1.0 / patient_count, 2) as avg_encounters_per_patient
            from main_marts.dim_conditions
            where patient_count > 0
            order by encounter_count desc
            limit 20

        - name: "Recently diagnosed conditions"
          description: "Find conditions first diagnosed in the last year"
          sql: |
            select
                condition_code
                , condition_description
                , first_occurrence_date
                , last_occurrence_date
                , patient_count
            from main_marts.dim_conditions
            where first_occurrence_date >= current_date - interval '1 year'
            order by first_occurrence_date desc

    columns:
      - name: condition_key
        description: Surrogate key (row_number)
        data_tests:
          - unique
          - not_null

      - name: condition_code
        description: ICD/SNOMED code (natural key)
        data_tests:
          - unique
          - not_null

      - name: condition_description
        description: Full condition name/description
        data_tests:
          - not_null

      - name: first_occurrence_date
        description: Earliest date this condition was diagnosed in the dataset

      - name: last_occurrence_date
        description: Most recent date this condition was diagnosed

      - name: patient_count
        description: Number of unique patients with this condition
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: encounter_count
        description: Total number of encounters with this condition
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: _loaded_at
        description: Timestamp when record was loaded

  # ============================================================================
  # FACT TABLES
  # ============================================================================

  - name: fct_patient_summary
    description: |
      Annual patient-level aggregations for outcomes tracking and population health analysis.
      One row per patient per calendar year with comprehensive utilization and cost metrics.
      Grain: (patient_id, year_actual)

      Use cases:
      - Patient outcomes tracking over time
      - Annual cost summaries and trends
      - Cohort analysis and patient stratification
      - Health trajectory visualization
      - High-cost patient identification

    config:
      tags: ['analytics', 'marts', 'fact']
    meta:
      grain: patient_id + year_actual
      owner: healthcare_analytics
      uses:
        - "Population health reporting"
        - "Cost and utilization analysis"
        - "Patient stratification"
        - "Year-over-year trending"
      example_queries:
        - name: "Top 10 costliest patients by year"
          description: "Identify high-cost patients for care management programs"
          sql: |
            select
                p.patient_id
                , p.first_name || ' ' || p.last_name as patient_name
                , fps.year_actual
                , fps.total_cost
                , fps.encounter_count
                , fps.condition_count
                , fps.payer_coverage_pct
            from main_marts.fct_patient_summary fps
            join main_marts.dim_patients p
                on fps.patient_key = p.patient_key
            where fps.year_actual = 2024
            order by fps.total_cost desc
            limit 10

        - name: "Patient count and cost by age group"
          description: "Analyze patient population distribution and costs by age cohort"
          sql: |
            select
                case
                    when fps.patient_age_at_year_end < 18 then '0-17'
                    when fps.patient_age_at_year_end < 35 then '18-34'
                    when fps.patient_age_at_year_end < 50 then '35-49'
                    when fps.patient_age_at_year_end < 65 then '50-64'
                    else '65+'
                end as age_group
                , count(distinct fps.patient_id) as patient_count
                , round(avg(fps.total_cost), 2) as avg_annual_cost
                , round(sum(fps.total_cost), 2) as total_cost
                , round(avg(fps.encounter_count), 2) as avg_encounters
            from main_marts.fct_patient_summary fps
            where fps.year_actual = 2024
            group by 1
            order by 1

        - name: "Cost and utilization trends over time"
          description: "Year-over-year comparison of costs and utilization metrics"
          sql: |
            select
                fps.year_actual
                , count(distinct fps.patient_id) as patient_count
                , round(avg(fps.encounter_count), 2) as avg_encounters_per_patient
                , round(avg(fps.condition_count), 2) as avg_conditions_per_patient
                , round(avg(fps.total_cost), 2) as avg_annual_cost
                , round(sum(fps.total_cost), 2) as total_population_cost
                , round(avg(fps.payer_coverage_pct), 2) as avg_coverage_pct
            from main_marts.fct_patient_summary fps
            group by fps.year_actual
            order by fps.year_actual desc

        - name: "High utilization patients"
          description: "Find patients with above-average encounters and conditions"
          sql: |
            with averages as (
                select
                    avg(encounter_count) as avg_encounters
                    , avg(condition_count) as avg_conditions
                from main_marts.fct_patient_summary
                where year_actual = 2024
            )
            select
                fps.patient_id
                , fps.encounter_count
                , fps.condition_count
                , fps.total_cost
                , fps.unique_providers
            from main_marts.fct_patient_summary fps
            cross join averages a
            where fps.year_actual = 2024
                and fps.encounter_count > a.avg_encounters * 2
                and fps.condition_count > a.avg_conditions
            order by fps.total_cost desc
            limit 25

    data_tests:
      # Grain test: enforce unique combination
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - patient_id
              - year_actual
          config:
            severity: error
    columns:
      - name: patient_summary_key
        description: Surrogate key (MD5 hash of patient_id + year_actual)
        data_tests:
          - unique
          - not_null

      - name: patient_key
        description: Foreign key to dim_patients
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_patients')
                field: patient_key

      - name: patient_id
        description: Natural patient identifier
        data_tests:
          - not_null

      - name: year_actual
        description: Calendar year of the summary
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1900
                max_value: 2100
              config:
                severity: warn

      - name: patient_age_at_year_end
        description: Patient age as of December 31 of the year
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 150
              config:
                severity: warn

      - name: encounter_count
        description: Number of encounters in the year
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000
              config:
                severity: error

      - name: procedure_count
        description: Number of procedures in the year
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: condition_count
        description: Number of distinct conditions diagnosed in the year
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_cost
        description: Total claim cost for the year
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000000
              config:
                severity: error

      - name: payer_coverage
        description: Amount covered by insurance
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: patient_responsibility
        description: Amount owed by patient (copay + coinsurance)
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: payer_coverage_pct
        description: Percentage of costs covered by insurance (0-100)
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
              config:
                severity: error

      - name: unique_providers
        description: Number of distinct providers seen
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 1000
              config:
                severity: error

      - name: unique_organizations
        description: Number of distinct organizations visited
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: _loaded_at
        description: Timestamp when record was loaded

  - name: fct_provider_metrics
    description: |
      Monthly provider-level utilization and performance metrics.
      One row per provider per calendar month with patient volumes, costs, and efficiency metrics.
      Grain: (provider_id, year_actual, month_actual)

      Use cases:
      - Provider performance tracking
      - Workload distribution analysis
      - Cost efficiency comparisons
      - Capacity planning and staffing
      - Quality improvement initiatives

    config:
      tags: ['analytics', 'marts', 'fact']
    meta:
      grain: provider_id + year_month_str
      owner: healthcare_analytics
      uses:
        - "Provider productivity reporting"
        - "Workload balancing"
        - "Cost efficiency analysis"
        - "Capacity planning"
      example_queries:
        - name: "Top providers by patient volume"
          description: "Identify highest-volume providers for capacity planning"
          sql: |
            select
                p.provider_id
                , p.name as provider_name
                , p.specialty
                , sum(fpm.encounter_count) as total_encounters
                , sum(fpm.unique_patient_count) as total_patients
                , round(avg(fpm.avg_cost_per_encounter), 2) as avg_cost_per_encounter
            from main_marts.fct_provider_metrics fpm
            join main_marts.dim_providers p
                on fpm.provider_key = p.provider_key
            where fpm.year_actual = 2024
            group by 1, 2, 3
            order by total_encounters desc
            limit 15

        - name: "Provider metrics trend by month"
          description: "Track provider productivity over time"
          sql: |
            select
                fpm.year_month_str
                , count(distinct fpm.provider_id) as active_providers
                , sum(fpm.encounter_count) as total_encounters
                , sum(fpm.unique_patient_count) as total_patients
                , round(avg(fpm.avg_cost_per_encounter), 2) as avg_cost_per_encounter
                , round(avg(fpm.avg_encounter_duration_minutes), 2) as avg_duration_minutes
            from main_marts.fct_provider_metrics fpm
            where fpm.year_actual >= 2023
            group by fpm.year_month_str
            order by fpm.year_month_str desc

        - name: "Provider efficiency comparison"
          description: "Compare providers by cost and volume efficiency"
          sql: |
            select
                p.provider_id
                , p.name as provider_name
                , p.specialty
                , sum(fpm.encounter_count) as total_encounters
                , round(sum(fpm.total_cost), 2) as total_cost
                , round(avg(fpm.avg_cost_per_encounter), 2) as avg_cost_per_encounter
                , round(avg(fpm.encounters_per_patient_avg), 2) as avg_encounters_per_patient
                , round(sum(fpm.total_procedures) * 1.0 / sum(fpm.encounter_count), 2) as procedures_per_encounter
            from main_marts.fct_provider_metrics fpm
            join main_marts.dim_providers p
                on fpm.provider_key = p.provider_key
            where fpm.year_actual = 2024
            group by 1, 2, 3
            having sum(fpm.encounter_count) >= 10
            order by avg_cost_per_encounter

    data_tests:
      # Grain test: enforce unique combination
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - provider_id
              - year_actual
              - month_actual
          config:
            severity: error
    columns:
      - name: provider_metrics_key
        description: Surrogate key (MD5 hash of provider_id + year_month_str)
        data_tests:
          - unique
          - not_null

      - name: provider_key
        description: Foreign key to dim_providers
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_providers')
                field: provider_key

      - name: provider_id
        description: Natural provider identifier
        data_tests:
          - not_null

      - name: organization_key
        description: Foreign key to dim_organizations

      - name: organization_id
        description: Natural organization identifier

      - name: year_actual
        description: Calendar year
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1900
                max_value: 2100
              config:
                severity: warn

      - name: month_actual
        description: Calendar month (1-12)
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 12
              config:
                severity: error

      - name: year_month_str
        description: Year-month string (YYYY-MM)

      - name: encounter_count
        description: Number of encounters in the month
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: unique_patient_count
        description: Number of distinct patients seen
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: avg_patient_age
        description: Average age of patients seen
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 150
              config:
                severity: warn

      - name: avg_encounter_duration_minutes
        description: Average encounter duration in minutes
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_procedures
        description: Total procedures performed
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_cost
        description: Total claim cost for the month
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_payer_coverage
        description: Amount covered by insurance
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: avg_cost_per_encounter
        description: Average cost per encounter
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: encounters_per_patient_avg
        description: Average encounters per patient
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: _loaded_at
        description: Timestamp when record was loaded

  - name: fct_condition_cohorts
    description: |
      Patient-condition cohort analysis for disease management and population health.
      One row per unique patient-condition combination with timeline and encounter details.
      Grain: (patient_id, condition_code)

      Use cases:
      - Disease management program enrollment
      - Cohort identification for clinical trials
      - Chronic condition tracking
      - Care gap analysis
      - Risk stratification by condition

    config:
      tags: ['analytics', 'marts', 'fact']
    meta:
      grain: patient_id + condition_code
      owner: healthcare_analytics
      uses:
        - "Disease management programs"
        - "Cohort identification"
        - "Chronic condition tracking"
        - "Care gap analysis"
      example_queries:
        - name: "Largest condition cohorts"
          description: "Find conditions with the most patients for population health programs"
          sql: |
            select
                fcc.condition_code
                , fcc.condition_description
                , count(distinct fcc.patient_id) as patient_count
                , sum(fcc.encounter_count) as total_encounters
                , round(avg(fcc.months_with_condition), 1) as avg_months_with_condition
                , sum(case when fcc.is_active then 1 else 0 end) as active_patients
            from main_marts.fct_condition_cohorts fcc
            group by 1, 2
            order by patient_count desc
            limit 15

        - name: "Chronic condition patients (long duration)"
          description: "Identify patients with long-standing conditions for care management"
          sql: |
            select
                p.patient_id
                , p.first_name || ' ' || p.last_name as patient_name
                , fcc.condition_description
                , fcc.first_diagnosis_date
                , fcc.months_with_condition
                , fcc.encounter_count
                , fcc.is_active
            from main_marts.fct_condition_cohorts fcc
            join main_marts.dim_patients p
                on fcc.patient_key = p.patient_key
            where fcc.months_with_condition >= 24
                and fcc.is_active = true
            order by fcc.months_with_condition desc
            limit 50

        - name: "Patients with multiple conditions"
          description: "Find patients with comorbidities for complex care programs"
          sql: |
            with patient_condition_counts as (
                select
                    patient_id
                    , patient_key
                    , count(distinct condition_code) as condition_count
                    , sum(case when is_active then 1 else 0 end) as active_condition_count
                from main_marts.fct_condition_cohorts
                group by 1, 2
            )
            select
                p.patient_id
                , p.first_name || ' ' || p.last_name as patient_name
                , pcc.condition_count
                , pcc.active_condition_count
            from patient_condition_counts pcc
            join main_marts.dim_patients p
                on pcc.patient_key = p.patient_key
            where pcc.condition_count >= 3
            order by pcc.condition_count desc
            limit 25

    data_tests:
      # Grain test: enforce unique combination
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - patient_id
              - condition_code
          config:
            severity: error
    columns:
      - name: condition_cohort_key
        description: Surrogate key (MD5 hash of patient_id + condition_code)
        data_tests:
          - unique
          - not_null

      - name: patient_key
        description: Foreign key to dim_patients
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_patients')
                field: patient_key

      - name: patient_id
        description: Natural patient identifier
        data_tests:
          - not_null

      - name: condition_key
        description: Foreign key to dim_conditions
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_conditions')
                field: condition_key

      - name: condition_code
        description: ICD/SNOMED condition code
        data_tests:
          - not_null

      - name: condition_description
        description: Full condition name

      - name: first_diagnosis_date
        description: Date of first diagnosis
        data_tests:
          - not_null

      - name: last_diagnosis_date
        description: Date of most recent diagnosis (null if first occurrence only)

      - name: first_diagnosis_year
        description: Year of first diagnosis
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1900
                max_value: 2100
              config:
                severity: warn

      - name: months_with_condition
        description: Months between first and last diagnosis (0 if single occurrence)
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: encounter_count
        description: Number of encounters with this condition
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: is_active
        description: True if condition has no end date (currently active)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: _loaded_at
        description: Timestamp when record was loaded

  - name: fct_cost_analysis
    description: |
      Detailed cost breakdown for financial analysis and revenue cycle management.
      One row per encounter with cost allocation details across payer and patient.
      Grain: encounter_id

      Use cases:
      - Financial performance reporting
      - Payer mix analysis
      - Patient out-of-pocket tracking
      - Cost driver identification
      - Revenue cycle optimization

    config:
      tags: ['analytics', 'marts', 'fact']
    meta:
      grain: encounter_id
      owner: healthcare_analytics
      uses:
        - "Financial reporting"
        - "Payer mix analysis"
        - "Cost allocation tracking"
        - "Revenue cycle management"
      example_queries:
        - name: "Cost breakdown by payer"
          description: "Analyze cost distribution across different insurance payers"
          sql: |
            select
                py.payer_name
                , count(distinct fca.encounter_id) as encounter_count
                , round(sum(fca.total_cost), 2) as total_cost
                , round(sum(fca.payer_coverage), 2) as total_payer_coverage
                , round(sum(fca.patient_responsibility), 2) as total_patient_responsibility
                , round(avg(fca.coverage_pct), 2) as avg_coverage_pct
            from main_marts.fct_cost_analysis fca
            join main_marts.dim_payers py
                on fca.payer_key = py.payer_key
            group by py.payer_name
            order by total_cost desc

        - name: "Monthly cost trends"
          description: "Track cost trends over time for financial forecasting"
          sql: |
            select
                strftime(fca.encounter_date, '%Y-%m') as year_month
                , count(distinct fca.encounter_id) as encounter_count
                , round(sum(fca.total_cost), 2) as total_cost
                , round(avg(fca.total_cost), 2) as avg_cost_per_encounter
                , round(sum(fca.payer_coverage), 2) as total_payer_coverage
                , round(avg(fca.coverage_pct), 2) as avg_coverage_pct
            from main_marts.fct_cost_analysis fca
            where fca.year_actual >= 2023
            group by 1
            order by 1 desc

        - name: "Cost by encounter type"
          description: "Compare costs across different encounter classes"
          sql: |
            select
                fca.encounter_class
                , count(distinct fca.encounter_id) as encounter_count
                , round(sum(fca.total_cost), 2) as total_cost
                , round(avg(fca.total_cost), 2) as avg_cost
                , round(avg(fca.procedure_count), 2) as avg_procedures
                , round(avg(fca.cost_per_procedure), 2) as avg_cost_per_procedure
                , round(avg(fca.coverage_pct), 2) as avg_coverage_pct
            from main_marts.fct_cost_analysis fca
            group by fca.encounter_class
            order by total_cost desc

        - name: "High-cost encounters"
          description: "Identify individual high-cost encounters for review"
          sql: |
            select
                fca.encounter_id
                , fca.encounter_date
                , fca.encounter_class
                , p.first_name || ' ' || p.last_name as patient_name
                , py.payer_name
                , fca.total_cost
                , fca.payer_coverage
                , fca.patient_responsibility
                , fca.procedure_count
            from main_marts.fct_cost_analysis fca
            join main_marts.dim_patients p
                on fca.patient_key = p.patient_key
            join main_marts.dim_payers py
                on fca.payer_key = py.payer_key
            order by fca.total_cost desc
            limit 25

    columns:
