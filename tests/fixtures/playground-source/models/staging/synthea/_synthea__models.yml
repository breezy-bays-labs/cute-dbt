  - name: stg_synthea__observations
    description: >
      Staging model for clinical observations (vital signs, lab results).
      One row per observation with surrogate key.
    data_tests:
      # Row count validation (v0.8 - dbt_expectations)
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 200000
          config:
            severity: warn
    columns:
      - name: observation_id
        description: Surrogate key for the observation record
        data_tests:
          - unique
          - not_null

      - name: patient_id
        description: Foreign key to the patient
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_synthea__patients')
              field: patient_id

      - name: encounter_id
        description: >
          Foreign key to the encounter. Note: ~10% of observations have null
          encounter_id (from external sources or historical data imports).
        data_tests:
          - relationships:
              to: ref('stg_synthea__encounters')
              field: encounter_id
              config:
                where: "encounter_id is not null"

      - name: observation_at
        description: Timestamp when observation was recorded
        data_tests:
          - not_null
          # Date range validation (v0.8 - dbt_expectations)
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'1900-01-01'::timestamp"
              max_value: "current_timestamp"
              config:
                severity: warn

      - name: observation_code
        description: LOINC code for the observation
        data_tests:
          - not_null

      - name: observation_description
        description: Description of the observation
        data_tests:
          - not_null

      - name: observation_value
        description: Value of the observation (stored as string)

      - name: units
        description: Units of measurement

      - name: observation_type
        description: Type of observation (numeric, text, etc.)

      - name: _loaded_at
        description: Timestamp when record was loaded into staging


# ============================================================================
# UNIT TESTS
# ============================================================================
# Source-given fixture (cute-dbt#57): unlike the ref()-given unit_tests
# in the marts YAML files, this test mocks a dbt SOURCE input —
# `source('synthea_raw', 'patients')` — giving cute-dbt a real
# wire-shape fixture for source() given binding.

unit_tests:
  - name: test_stg_synthea__patients_renames_and_hashes_source_columns
    description: |
      stg_synthea__patients renames the raw Synthea UPPERCASE columns to
      snake_case and hashes the SSN with md5. The given mocks the
      synthea_raw.patients SOURCE directly (inline dict rows) — the only
      unit test in this project whose input is a source() rather than a
      ref() (cute-dbt#57). Dict expect compares listed columns only, so
      the non-deterministic _loaded_at (current_timestamp) is excluded
      from assertion automatically.
    model: stg_synthea__patients
    given:
      - input: source('synthea_raw', 'patients')
        format: dict
        rows:
          - Id: 'c0000000-0000-0000-0000-000000000001'
            FIRST: 'Ada'
            LAST: 'Lovelace'
            GENDER: 'F'
            CITY: 'Boston'
            STATE: 'Massachusetts'
            SSN: '999-99-9999'
    expect:
      format: dict
      rows:
        - patient_id: 'c0000000-0000-0000-0000-000000000001'
          first_name: 'Ada'
          last_name: 'Lovelace'
          gender: 'F'
          city: 'Boston'
          state: 'Massachusetts'
          ssn_hash: '257cf696294931925796925d89aa0afb'
