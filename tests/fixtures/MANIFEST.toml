# Test-fixture provenance (PHI-safe invariant — hard, non-negotiable).
#
# Every file committed under `tests/fixtures/` is listed here with its
# origin, source URL, SHA-256, and an explicit `synthetic_only = true`
# flag. The PR 4a (#5) gate is structurally enforced by two mechanisms:
#
#   1. `cargo test` (`tests/fixture_manifest_listed.rs` +
#      `tests/fixture_parse.rs`) parses this file and asserts:
#        - every regular file under `tests/fixtures/` (excluding
#          MANIFEST.toml itself) appears in the [[fixture]] table by `path`;
#        - every entry has `synthetic_only = true`;
#        - SHA-256 of each listed file matches.
#   2. CI job `fixture-manifest-gate` (.github/workflows/ci.yml) runs the
#      same constraint as a pure-shell awk-and-comm grep — no cargo
#      dependency, fails the PR if anything under tests/fixtures/ is
#      unlisted.
#
# Together these enforce ADR-5's PHI-safe constraint structurally — a
# PHI-tainted fixture cannot land silently. A real-PHI fixture in this
# public repo would torpedo the cute-dbt adoption thesis (risk-team trust
# IS the product) on day one.
#
# Schema for each [[fixture]] entry:
#   path = "<filename-relative-to-tests/fixtures/>"
#   origin = "dbt-playground" | "tuva-project" | "jaffle-shop"
#          | "synthetic-handcrafted"
#   origin_url = "https://..."             # canonical source repo URL
#   sha256 = "<hex>"                       # `shasum -a 256 <path>`
#   synthetic_only = true                  # MUST be true (ADR-5)
#   license = "<SPDX identifier>"          # license of the source project
#   description = "<one-line>"             # why this fixture, what it exercises
#   synthetic_handcrafted = false          # true only for the last-resort
#                                          #   hand-crafted v12 stub; defaults false

[[fixture]]
path = "jaffle-shop-baseline.json"
origin = "jaffle-shop"
origin_url = "https://github.com/dbt-labs/jaffle_shop_duckdb"
sha256 = "eeace8628d69c0895a91b38dd23713d8f1a57067dcc04869f4585c4336677b6d"
synthetic_only = true
license = "Apache-2.0"
description = """
Compiled dbt 1.11.9 manifest (schema v12) for the canonical \
dbt-labs/jaffle_shop_duckdb demo with one authored unit test on \
stg_customers. Synthetic Faker-style demo data only — no real customers, \
no PHI. Acts as the BASELINE of the diff-scoping pair: stg_customers \
body is the un-modified version.\
"""

[[fixture]]
path = "jaffle-shop-current.json"
origin = "jaffle-shop"
origin_url = "https://github.com/dbt-labs/jaffle_shop_duckdb"
sha256 = "7a61632c06cd3ebc8a5f5b8bb45494cf16935dae33a1f40bec2b1bccfadd5505"
synthetic_only = true
license = "Apache-2.0"
description = """
Compiled dbt 1.11.9 manifest (schema v12) for the same project as the \
baseline, but with stg_customers body modified (added `trim()` calls on \
first_name/last_name). This is the CURRENT side of the diff-scoping \
pair — PR 5's StateComparator should see stg_customers in the modified \
