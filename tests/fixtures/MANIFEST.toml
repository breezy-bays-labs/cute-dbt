# Test-fixture provenance (synthetic-only invariant — hard, non-negotiable).
#
# This file is the SINGLE provenance authority (cute-dbt#115). It carries
# two tables:
#
#   * [[fixture]]      — every file committed under `tests/fixtures/`.
#   * [[project_data]] — the committed DATA-bearing files of the embedded dbt
#                        project `dbt-project/` (cute-dbt#114): the seed CSVs
#                        under `dbt-project/seeds/`. dbt-project's source SQL /
#                        YAML / config are CODE, not data, so they are
#                        deliberately NOT listed here. (The compiled
#                        `target/manifest.json` is gitignored build output —
#                        never committed, recompiled fresh by CI/local — so it
#                        is not a data carrier this gate covers; see
#                        cute-dbt#115.) This closes the #114-review gap: the
#                        seeds previously sat outside the synthetic-only scan,
#                        doc-enforced only.
#
# Why synthetic test fixtures exist at all (two distinct reasons, so this is
# not re-litigated): (a) fault-injection fixtures — the `parse-only` and
# `no-test-uncompiled` cases below — encode manifest shapes a HEALTHY
# `dbt compile` structurally cannot emit, so they are hand-authored by
# design and stay. (b) The historical "no real dbt project yet, so hand-roll
# a manifest" workaround is RETIRED now that `dbt-project/` exists as a real,
# compilable dogfood project; new happy-path coverage should come from it,
# not from fresh hand-rolled manifests.
#
# Every entry in either table records origin, source URL, SHA-256, and an
# explicit `synthetic_only = true` flag. The PR 4a (#5) gate is structurally
# enforced by two mechanisms (both widened in #115 to cover [[project_data]]):
#
#   1. `cargo test` (`tests/fixture_manifest_listed.rs` +
#      `tests/fixture_parse.rs`) parses this file and asserts:
#        - every regular file under `tests/fixtures/` (excluding
#          MANIFEST.toml itself) appears in the [[fixture]] table by `path`;
#        - every git-tracked seed under `dbt-project/seeds/` appears in
#          [[project_data]];
#        - every entry (both tables) has `synthetic_only = true`;
#        - SHA-256 of each listed file matches.
#   2. CI job `fixture-manifest-gate` (.github/workflows/ci.yml) runs the
#      same constraint as a pure-shell awk-and-comm grep — no cargo
#      dependency, fails the PR if anything under tests/fixtures/ OR any
#      dbt-project data carrier is unlisted. The `lefthook.yml` pre-push
#      hook mirrors the same shell logic (keep all three in sync).
#
# Together these enforce the synthetic-only constraint structurally — a
# fixture (or a dbt-project seed) containing real data cannot land silently.
# Real data in this public repo is a release blocker.
#
# Schema for each [[fixture]] entry:
#   path = "<filename-relative-to-tests/fixtures/>"
#   origin = "dbt-playground" | "tuva-project" | "jaffle-shop"
#          | "synthetic-handcrafted"
#   origin_url = "https://..."             # canonical source repo URL
#   sha256 = "<hex>"                       # `shasum -a 256 <path>`
#   synthetic_only = true                  # MUST be true (ADR-5)
#   license = "<SPDX identifier>"          # license of the source project
#   description = "<one-line>"             # why this fixture, what it exercises
#   synthetic_handcrafted = false          # true only for the last-resort
#                                          #   hand-crafted v12 stub; defaults false
#
# Schema for each [[project_data]] entry (same shape; path is REPO-ROOT
# relative because these files live outside tests/fixtures/):
#   path = "dbt-project/seeds/<file>.csv"
#   origin / origin_url / sha256 / synthetic_only / license / description
#   as above. (`fixture_parse.rs` does NOT shape-check these — they are CSV
#   seed data, not manifests.)

