# cargo-mutants configuration for cute-dbt.
#
# Focused (Quinn CQ8 proportional-rigor): mutation-test the four
# correctness-load-bearing modules at 100%-kill-or-classified-equivalent;
# render-template glue is reported, not gated. Strict modules mirror the
# crap4rs strict-keyed paths.

# cucumber-rs `harness = false` means `cargo nextest` is incompatible
# with the bdd test target; cargo-mutants must invoke `cargo test`. We
# explicitly enumerate the kill-detection test targets so the slow
# Gherkin outer-loop binary (`tests/bdd.rs`, every scenario spawning a
# subprocess) does NOT run on every candidate mutant. The
# mutation-kill signal lives in the unit tests + the fast integration
# tests below; the BDD target is the contract gate, not the
# kill-detection gate.
test_tool = "cargo"
additional_cargo_test_args = [
  "--lib",
  "--bins",
  "--test", "diff_scoping",
  "--test", "run_loop",
  "--test", "manifest_ingestion",
  "--test", "cte_engine",
  "--test", "render_integration",
  "--test", "fixture_parse",
  "--test", "fixture_manifest_listed",
  "--test", "assets_manifest",
  "--test", "domain_clean_arch",
  "--test", "resource_ref_lint",
  "--test", "golden_report",
  "--test", "cell_table_diff",
]

# Focused scope. Render-glue and POD domain types are NOT in this list —
# they are measured but not gated (per ADR-4 / quality-loop playbook).
examine_globs = [
  "src/domain/state.rs",
  "src/domain/preflight.rs",
  "src/domain/pr_diff.rs",
  "src/domain/scope.rs",
  "src/domain/cell_diff.rs",
  "src/domain/unit_test_table.rs",
  "src/domain/unit_test_yaml.rs",
  "src/adapters/manifest.rs",
  "src/adapters/cte_engine.rs",
  "src/adapters/asset_embed.rs",
  "src/adapters/render.rs",
]

# Skip unwrap_or-style fallbacks where surviving mutants are typically
# equivalent. Tracked via the v0.1 fidelity-limit issue at the
# StateComparator site (filed with PR 5).
exclude_globs = []

# Classified-equivalent mutation: `delete ! in StateComparator::models_in_scope`
# at state.rs:288 (`!v.is_empty()` inside `is_some_and`). The only values
# reachable via `test_targets.get(id)` are `None` (model absent → arm 2
# inserts regardless of the closure) or `Some(non_empty_vec)` (model present
# → arm 1 has already inserted it via its in-scope unit tests, so BTreeSet
# dedup makes the arm-2 predicate invisible). No discriminating test is
# constructible without violating the domain invariant that a modified model
# with at least one unit test always has that test in scope.
# cute-dbt#30 — filed with PR C.
#
# Classified-equivalent mutation: `replace - with + in dedent` at
# unit_test_table.rs:1616 (the per-line slice-start clamp
# `min_indent.min(l.len() - l.trim_start().len())`). `min_indent` is the
# MINIMUM leading-whitespace width over all non-blank lines, so every
# non-blank line's own indent is >= min_indent → the `.min()` always returns
# min_indent; the `+` mutation makes the clamped term strictly larger still,
# so `.min()` still returns min_indent → byte-identical output for every
# input. The clamp only guards a slice-overflow panic that min_indent's
# definition already precludes. The sibling 1607 mutant (the min_indent
# computation) IS discriminating and is killed by
# `dedent_strips_only_the_common_prefix_and_preserves_deeper_indent`.
# The exclude_re below pins the line (`:1616:`) so it excludes ONLY the
# equivalent clamp mutant — the sibling `1607:26` `- with +` in the
# min_indent computation shares the same mutant *name* but is discriminating
# and stays gated (and killed).
#
# The line pin (`:1616:`) is intrinsically fragile: the discriminating sibling
# shares the identical mutant name (`replace - with + in dedent`), so the line
# number — not the name — is the only discriminator, and it drifts whenever
# unit_test_table.rs grows above the `dedent` fn. Re-pin via `cargo mutants
# --list | rg dedent` whenever it moves (last re-pin: cute-dbt#143,
# 1532→1616 — the stale `:1532:` pin surfaced exactly as designed, as a
# false MISSED survivor in the #143 mutation run).
# The mutation gate self-detects a stale pin: a drifted line stops excluding
# the equivalent clamp, which then surfaces as a false survivor (a red gate) —
# which is how the original `:839:` staleness was caught.
# tracked: cute-dbt#129 — equivalent dedent clamp mutant (#98 mutation gate);
# stays OPEN as the exclusion tracker (restoration: lift if `dedent` is ever
# refactored so the per-line slice start can legitimately differ from
# min_indent). cute-dbt#128 is a literal duplicate of #129 (closed as dup).
#
# Classified-equivalent mutation (cute-dbt#143): `replace match guard
# c == '\'' && chars.peek() == Some(&'\'') with false in split_quote_aware`
# at unit_test_table.rs:847 (the doubled-single-quote escape arm). The arm
# pushes BOTH quotes of a `''` and stays quoted; disabling it routes the
# first `'` through the `Some(q)` close arm (push, quote=None) and the
# second `'` through the `None` open arm (push, quote=Some) on the very next
# iteration — no character lies between the two adjacent quotes, so the
# accumulated text AND the final quote state are byte-identical on every
# input. Verified by exhaustive brute force: all 21,845 strings of length
# <= 7 over {', ',', 'a', 'b'} produce identical output (see the K12a note
# in unit_test_table.rs tests). Line-pinned for the same self-detecting
# staleness behavior as the dedent pin. tracked: cute-dbt#143.
#
# Classified-equivalent mutation (cute-dbt#143): `replace * with / in
# single_quote_end` at unit_test_table.rs:1173 (`byte += 2 * '\''.len_utf8()`).
# The multiplicand `'\''.len_utf8()` is the compile-time constant 1, so
# `2 * 1 == 2 / 1 == 2` on every input — no distinguishing case exists. The
# same-line sibling `* with +` IS discriminating (2 + 1 == 3) and is killed
# by `k12h_single_quote_end_escape_byte_step_is_two_times_len`. The `/` in
# the replacement text disambiguates within the line pin. tracked: cute-dbt#143.
#
# Classified NON-TERMINATING mutations (cute-dbt#143): eight `+= -> *=`
# cursor mutations INSIDE a helper's own scan loop. The stuck index spins
# in-function (`x *= 1 == x`; `0 *= k == 0`), so even a direct unit call
# hangs on any input that would expose a difference, while every input that
# terminates is output-identical (the loop body was never needed for it).
# No bounded distinguishing test exists; cargo-mutants reports TIMEOUT
# (it cannot tell a hang from slow). The practical detector is the
# wall-clock timeout itself: a non-terminating mutation hangs the suite and
# the per-run timeout fires. Hang behavior empirically confirmed for the
# scan_csv_matrix / skip_line_comment / consume_quoted_run representatives
# (20s wall-clock, #143); the rest share the identical structural shape.
# Where the mutant NAME is unique within its function the entry is
# name-only (drift-proof); where a same-name sibling is killable the entry
# is line-pinned (same self-detecting staleness as the dedent pin):
#   - scan_csv_matrix:658        `i += feed(..)` -> *=   (0 stays 0)
#   - skip_line_comment:1018     `self.i += 1`   -> *=   (i*1 == i)
#   - skip_block_comment:1028    `self.i += 1`   -> *=   (line-pinned: the
#     fn's `+= 2` open/close mutants at 1025/1030 are killable, same name)
#   - split_union_all_arms:1056  `idx += 1`      -> *=   (line-pinned: the
#     1052 `idx += 2` sibling mutants are killable, same name)
#   - single_quote_end:1180      `i += 1`        -> *=   (line-pinned: the
#     1173 byte-step `+= -> *=` sibling is killed by k12h, same name)
#   - tokenize_sql_words:1284/1287 `i += 1`      -> *=   (name-only: BOTH
#     += sites in the fn are non-terminating)
#   - consume_quoted_run:1313    `i += 1`        -> *=   (line-pinned: the
#     1308 `i += 2` escape sibling mutants are killable, same name)
# tracked: cute-dbt#143 — see the K13 classification note in
# src/domain/unit_test_table.rs for the in-code rationale.
exclude_re = [
  "delete ! in StateComparator::models_in_scope",
  "unit_test_table\\.rs:1616:.*replace - with \\+ in dedent",
  "unit_test_table\\.rs:847:.*replace match guard .* with false in split_quote_aware",
  "unit_test_table\\.rs:1173:.*replace \\* with / in single_quote_end",
  "replace \\+= with \\*= in scan_csv_matrix",
  "replace \\+= with \\*= in SqlCommentStripper::skip_line_comment",
  "unit_test_table\\.rs:1028:.*replace \\+= with \\*= in SqlCommentStripper::skip_block_comment",
  "unit_test_table\\.rs:1056:.*replace \\+= with \\*= in split_union_all_arms",
  "unit_test_table\\.rs:1180:.*replace \\+= with \\*= in single_quote_end",
  "replace \\+= with \\*= in tokenize_sql_words",
  "unit_test_table\\.rs:1313:.*replace \\+= with \\*= in consume_quoted_run",
]
