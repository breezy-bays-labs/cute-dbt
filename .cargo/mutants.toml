# cargo-mutants configuration for cute-dbt.
#
# Focused (Quinn CQ8 proportional-rigor): mutation-test the four
# correctness-load-bearing modules at 100%-kill-or-classified-equivalent;
# render-template glue is reported, not gated. Strict modules mirror the
# crap4rs strict-keyed paths.

# The kill-detection harness is nextest (cute-dbt#143). Under plain
# `cargo test` (one process per test BINARY), a mutant that breaks cursor
# advancement in a scan-loop helper hangs a sibling test, so the binary
# can never exit to report the kill-tests' failures — the suite verdict
# degrades to an inconclusive TIMEOUT. nextest runs process-per-TEST and,
# under the `mutants` nextest profile (`.config/nextest.toml`,
# slow-timeout terminate-after), TERMINATES a hung test and marks it
# FAILED — converting those hangs into genuine CAUGHT verdicts (#143
# verification over unit_test_table.rs: 141 mutants → 140 caught,
# 1 unviable, 0 timeouts, 0 missed).
#
# `--profile mutants` selects that nextest profile EXPLICITLY — nothing
# selects it implicitly (no NEXTEST_PROFILE env contract). The profile's
# default-filter also excludes the two binaries that cannot run under
# cargo-mutants:
# - bdd: cucumber-rs `harness = false`; nextest cannot enumerate it.
#   It is the contract gate, not the kill-detection gate (every nextest
#   profile excludes it).
# - fixture_manifest_listed: enumerates committed files via
#   `git ls-files`, and cargo-mutants scratch copies carry no `.git`
#   dir, so the gate fails there spuriously. Profile-scoped filter,
#   NOT a coverage exclusion — the gate still runs in the default
#   profile, lefthook, and CI.
# All other test binaries (lib, bins, the integration suites) run on
# every candidate mutant — new test binaries join kill-detection
# automatically.
test_tool = "nextest"
additional_cargo_test_args = ["--profile", "mutants"]

# Focused scope. Render-glue and POD domain types are NOT in this list —
# they are measured but not gated (per ADR-4 / quality-loop playbook).
examine_globs = [
  "src/domain/state.rs",
  "src/domain/preflight.rs",
  "src/domain/pr_diff.rs",
  # The ONE cross-model `depends_on` self-inversion site (cute-dbt#443).
  # `invert_depends_on` + `ModelLineage::from_manifest` are correctness-
  # load-bearing: the three consumers read this one inversion, so a silent
  # adjacency bug mis-shapes every downstream lineage view. Mirrors the
  # crap4rs strict-keyed entry.
  "src/domain/lineage.rs",
  # path.rs joined at cute-dbt#183 — it was extracted from scope.rs at
  # cute-dbt#96 with its dedicated kill suite (tests/path_matching.rs)
  # but never re-added to the focused scope after the split.
  "src/domain/path.rs",
  "src/domain/scope.rs",
  "src/domain/cell_diff.rs",
  "src/domain/unit_test_table.rs",
  "src/domain/unit_test_yaml.rs",
  "src/adapters/manifest.rs",
  "src/adapters/cte_engine.rs",
  "src/adapters/asset_embed.rs",
  "src/adapters/render.rs",
]

# Skip unwrap_or-style fallbacks where surviving mutants are typically
# equivalent. Tracked via the v0.1 fidelity-limit issue at the
# StateComparator site (filed with PR 5).
exclude_globs = []

# Equivalent-mutant re-audit against cargo-mutants 27.0.0 (cute-dbt#328,
# 2026-06-13). cargo-mutants's emitted operator set drifted between the
# version that wrote the historical pins and 27.0.0: at three previously
# pinned sites the targeted mutant is NO LONGER GENERATED, and at the
# fourth the function was refactored away. Empirically re-verified each
# former site with a scoped `cargo mutants --re '<fn>'` run — all four
# former equivalents are now either ungenerated or genuinely CAUGHT, so
# their stale pins (which matched nothing) are removed. The live
# equivalent survivors moved to pr_diff.rs (the #323 LCS-diff trio); they
# are pinned below.
#
# Removed (stale; mutant ungenerated or now killed in 27.0.0):
# - `delete ! in StateComparator::models_in_scope` — the function was
#   refactored (cute-dbt#167 arm-2 projection); 27.0.0 emits no `delete !`
#   there. All six current models_in_scope mutants (incl. 516:25 `&& -> ||`
#   on `is_model && !has_tests`, 514:58 `== -> !=`) are CAUGHT. Verified
#   #328: 6 mutants, 0 missed in models_in_scope.
# - `unit_test_table.rs:...:replace - with + in dedent` (the slice-start
#   clamp) — 27.0.0 emits only `- with /` at the clamp (col :43), not
#   `- with +`. The clamp `- with /` is CAUGHT: a long-content line makes
#   `l.len() / l.trim_start().len()` smaller than `min_indent`, which the
#   csv-symmetry test (`csv_dedented_old_equals_fusion_string_new`,
#   8-space indented region) distinguishes. The min_indent sibling at
#   :1619 (`- with +` and `- with /`) is also CAUGHT
#   (`dedent_strips_only_the_common_prefix_and_preserves_deeper_indent`).
# - `unit_test_table.rs:...:replace match guard ... with false in
#   split_quote_aware` — 27.0.0 emits only `with true` for this guard,
#   not `with false`. `with true` forces the doubled-quote arm to fire on
#   every char and is CAUGHT by `k12a_split_quote_aware_doubled_single_quote_stays_quoted`.
# - `unit_test_table.rs:...:replace * with / in single_quote_end` (the
#   `byte += 2 * '\''.len_utf8()` step) — 27.0.0 emits only `* with +` at
#   the step (col :27), not `* with /`. `* with +` (2+1=3) is CAUGHT by
#   `k12h_single_quote_end_escape_byte_step_is_two_times_len`.
#
# Re-verify drift whenever cargo-mutants is upgraded or these fns move:
# `cargo mutants --list -f <file> | rg '<fn>'` lists the emitted mutants;
# a pin that matches nothing surfaces (by design) as a false MISSED
# survivor on the next gate run.
#
# Live classified-equivalent mutations — the #323 LCS reverse-apply trio
# in src/domain/pr_diff.rs (cute-dbt#323 flagged, deferred to #328 for the
# orchestrator-gated config edit; re-confirmed MISSED in the #328 sweep):
#
# - `pr_diff.rs:1075:91: replace + with * in consume_change_block` — the
#   Removed-loop LCS index `common[*i][*j + 1]` → `*j * 1 == *j`. Inside
#   the loop guard the `&&` guarantees `old[i] != new[j]`, so
#   `common[i][j] == max(common[i+1][j], common[i][j+1])`; the comparison
#   `common[i+1][j] >= common[i][j+1]` is then equivalent to
#   `common[i+1][j] >= common[i][j]`, which the `j+1 -> j` mutation
#   produces. cute-dbt#323 brute-forced 0 distinguishing inputs.
#   Column-pinned (`:91:`) so the KILLED siblings on the same line stay
#   gated: `1075:9`/`1075:52` (`&& -> ||`, the latter killed by
#   `diff_lines_added_loop_stops_at_a_common_line_mid_block`), `1075:65`
#   (`+ -> -`/`+ -> *` on `*i + 1`), and `1075:91:+ -> -`.
# - `pr_diff.rs:911:35: replace && with || in record_aligned_emphasis` —
#   `!pair_is_ws_only(h, k) && (bs..=be).contains(&line_no)`.
#   `added_emphasis` is read only for substantive in-block Added pairs;
#   for those both operators yield the identical insert decision. They
#   diverge only on out-of-block (never rendered) or ws-only (Context,
#   emphasis ignored) lines. cute-dbt#323 classification.
#
# adr: ops/decisions/cute-dbt/adr-equivalent-mutant-classifications.md —
# the LCS reverse-apply equivalent-mutant classifications (the #323
# brute-force proofs are the authority; the ADR collects them). NOTE
# (cute-dbt#328): this ADR path is referenced by the historical pins but
# the file does not yet exist in the ops repo — flagged to the orchestrator
# to create/relocate; the classification proofs live in the #323 commit
# messages (`a45ba03`) until then.
#
# NOTE (cute-dbt#328): two further pr_diff.rs survivors surfaced in the
# #328 sweep that are NOT pinned here — the symmetric Added-loop
# counterparts at `1081:69` (`+ -> *`, mirrors 1075:91) and `1081:74`
# (`> -> >=`, the Added-loop tie-break comparison). 1081:69 is the
# algebraic mirror of the 1075:91 proof; 1081:74 needs its own brute-force.
# Both require a brute-force/killing test in src/domain/pr_diff.rs to
# classify rigorously, which is out of this config-only lane's edit scope
# — flagged to the orchestrator for a follow-up.
#
# NOTE (cute-dbt#143): eight `+= -> *=` cursor mutations inside the
# scan-loop helpers of unit_test_table.rs (scan_csv_matrix,
# skip_line_comment, skip_block_comment, split_union_all_arms,
# single_quote_end, tokenize_sql_words, consume_quoted_run) hang the test
# that exercises the loop and previously degraded to inconclusive
# TIMEOUTs under `cargo test`. Under the nextest harness above they are
# genuinely CAUGHT (the hung test is terminated and marked failed), so
# they are deliberately NOT excluded. See the K13 note at the end of
# src/domain/unit_test_table.rs.
exclude_re = [
  # #323 LCS reverse-apply equivalents in consume_change_block /
  # record_aligned_emphasis (cute-dbt#328 re-audit; both re-confirmed
  # MISSED). Column-precise so the killed siblings on 1075 stay gated.
  "pr_diff\\.rs:1075:91:.*replace \\+ with \\* in consume_change_block",
  "pr_diff\\.rs:911:35:.*replace && with \\|\\| in record_aligned_emphasis",
]
