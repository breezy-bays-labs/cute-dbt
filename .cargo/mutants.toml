# cargo-mutants configuration for cute-dbt.
#
# Focused (Quinn CQ8 proportional-rigor): mutation-test the four
# correctness-load-bearing modules at 100%-kill-or-classified-equivalent;
# render-template glue is reported, not gated. Strict modules mirror the
# crap4rs strict-keyed paths.

# The kill-detection harness is nextest (cute-dbt#143). Under plain
# `cargo test` (one process per test BINARY), a mutant that breaks cursor
# advancement in a scan-loop helper hangs a sibling test, so the binary
# can never exit to report the kill-tests' failures â€” the suite verdict
# degrades to an inconclusive TIMEOUT. nextest runs process-per-TEST and,
# under the `mutants` nextest profile (`.config/nextest.toml`,
# slow-timeout terminate-after), TERMINATES a hung test and marks it
# FAILED â€” converting those hangs into genuine CAUGHT verdicts (#143
# verification over unit_test_table.rs: 141 mutants â†’ 140 caught,
# 1 unviable, 0 timeouts, 0 missed).
#
# `--profile mutants` selects that nextest profile EXPLICITLY â€” nothing
# selects it implicitly (no NEXTEST_PROFILE env contract). The profile's
# default-filter also excludes the two binaries that cannot run under
# cargo-mutants:
# - bdd: cucumber-rs `harness = false`; nextest cannot enumerate it.
#   It is the contract gate, not the kill-detection gate (every nextest
#   profile excludes it).
# - fixture_manifest_listed: enumerates committed files via
#   `git ls-files`, and cargo-mutants scratch copies carry no `.git`
#   dir, so the gate fails there spuriously. Profile-scoped filter,
#   NOT a coverage exclusion â€” the gate still runs in the default
#   profile, lefthook, and CI.
# All other test binaries (lib, bins, the integration suites) run on
# every candidate mutant â€” new test binaries join kill-detection
# automatically.
test_tool = "nextest"
additional_cargo_test_args = ["--profile", "mutants"]

# Focused scope. Render-glue and POD domain types are NOT in this list â€”
# they are measured but not gated (per ADR-4 / quality-loop playbook).
examine_globs = [
  "src/domain/state.rs",
  "src/domain/preflight.rs",
  "src/domain/pr_diff.rs",
  # path.rs joined at cute-dbt#183 â€” it was extracted from scope.rs at
  # cute-dbt#96 with its dedicated kill suite (tests/path_matching.rs)
  # but never re-added to the focused scope after the split.
  "src/domain/path.rs",
  "src/domain/scope.rs",
  "src/domain/cell_diff.rs",
  "src/domain/unit_test_table.rs",
  "src/domain/unit_test_yaml.rs",
  "src/adapters/manifest.rs",
  "src/adapters/cte_engine.rs",
  "src/adapters/asset_embed.rs",
  "src/adapters/render.rs",
]

# Skip unwrap_or-style fallbacks where surviving mutants are typically
# equivalent. Tracked via the v0.1 fidelity-limit issue at the
# StateComparator site (filed with PR 5).
exclude_globs = []

# Classified-equivalent mutation: `delete ! in StateComparator::models_in_scope`
# at state.rs:288 (`!v.is_empty()` inside `is_some_and`). The only values
# reachable via `test_targets.get(id)` are `None` (model absent â†’ arm 2
# inserts regardless of the closure) or `Some(non_empty_vec)` (model present
# â†’ arm 1 has already inserted it via its in-scope unit tests, so BTreeSet
# dedup makes the arm-2 predicate invisible). No discriminating test is
# constructible without violating the domain invariant that a modified model
# with at least one unit test always has that test in scope.
# cute-dbt#30 â€” filed with PR C.
#
# Classified-equivalent mutation: `replace - with + in dedent` at
# unit_test_table.rs:1616 (the per-line slice-start clamp
# `min_indent.min(l.len() - l.trim_start().len())`). `min_indent` is the
# MINIMUM leading-whitespace width over all non-blank lines, so every
# non-blank line's own indent is >= min_indent â†’ the `.min()` always returns
# min_indent; the `+` mutation makes the clamped term strictly larger still,
# so `.min()` still returns min_indent â†’ byte-identical output for every
# input. The clamp only guards a slice-overflow panic that min_indent's
# definition already precludes. The sibling 1607 mutant (the min_indent
# computation) IS discriminating and is killed by
# `dedent_strips_only_the_common_prefix_and_preserves_deeper_indent`.
# The exclude_re below pins the line (`:1616:`) so it excludes ONLY the
# equivalent clamp mutant â€” the sibling `1607:26` `- with +` in the
# min_indent computation shares the same mutant *name* but is discriminating
# and stays gated (and killed).
#
# The line pin (`:1616:`) is intrinsically fragile: the discriminating sibling
# shares the identical mutant name (`replace - with + in dedent`), so the line
# number â€” not the name â€” is the only discriminator, and it drifts whenever
# unit_test_table.rs grows above the `dedent` fn. Re-pin via `cargo mutants
# --list | rg dedent` whenever it moves (last re-pin: cute-dbt#143,
# 1532â†’1616 â€” the stale `:1532:` pin surfaced exactly as designed, as a
# false MISSED survivor in the #143 mutation run).
# The mutation gate self-detects a stale pin: a drifted line stops excluding
# the equivalent clamp, which then surfaces as a false survivor (a red gate) â€”
# which is how the original `:839:` staleness was caught.
# adr: ops/decisions/cute-dbt/adr-equivalent-mutant-classifications.md â€”
# equivalent dedent clamp mutant (#98 mutation gate); permanent
# classification (re-audit if `dedent` is ever refactored so the per-line
# slice start can legitimately differ from min_indent). Formerly tracked
# via cute-dbt#129 (and its literal duplicate cute-dbt#128, closed as dup).
#
# Classified-equivalent mutation (cute-dbt#143): `replace match guard
# c == '\'' && chars.peek() == Some(&'\'') with false in split_quote_aware`
# at unit_test_table.rs:847 (the doubled-single-quote escape arm). The arm
# pushes BOTH quotes of a `''` and stays quoted; disabling it routes the
# first `'` through the `Some(q)` close arm (push, quote=None) and the
# second `'` through the `None` open arm (push, quote=Some) on the very next
# iteration â€” no character lies between the two adjacent quotes, so the
# accumulated text AND the final quote state are byte-identical on every
# input. Verified by exhaustive brute force: all 21,845 strings of length
# <= 7 over {', ',', 'a', 'b'} produce identical output (see the K12a note
# in unit_test_table.rs tests). Line-pinned for the same self-detecting
# staleness behavior as the dedent pin.
# adr: ops/decisions/cute-dbt/adr-equivalent-mutant-classifications.md â€”
# equivalent doubled-quote escape-arm guard mutant; permanent classification
# (brute-forced over all 21,845 inputs of length <= 7, zero distinguishing
# cases; classified in #143).
#
# Classified-equivalent mutation (cute-dbt#143): `replace * with / in
# single_quote_end` at unit_test_table.rs:1173 (`byte += 2 * '\''.len_utf8()`).
# The multiplicand `'\''.len_utf8()` is the compile-time constant 1, so
# `2 * 1 == 2 / 1 == 2` on every input â€” no distinguishing case exists. The
# same-line sibling `* with +` IS discriminating (2 + 1 == 3) and is killed
# by `k12h_single_quote_end_escape_byte_step_is_two_times_len`. The `/` in
# the replacement text disambiguates within the line pin.
# adr: ops/decisions/cute-dbt/adr-equivalent-mutant-classifications.md â€”
# equivalent escape byte-step mutant; permanent classification
# (`'\''.len_utf8()` is the compile-time constant 1, so `2 * 1 == 2 / 1`).
#
# NOTE (cute-dbt#143): eight `+= -> *=` cursor mutations inside the
# scan-loop helpers of unit_test_table.rs (scan_csv_matrix,
# skip_line_comment, skip_block_comment, split_union_all_arms,
# single_quote_end, tokenize_sql_words, consume_quoted_run) hang the test
# that exercises the loop and previously degraded to inconclusive
# TIMEOUTs under `cargo test`. Under the nextest harness above they are
# genuinely CAUGHT (the hung test is terminated and marked failed), so
# they are deliberately NOT excluded. See the K13 note at the end of
# src/domain/unit_test_table.rs.
exclude_re = [
  "delete ! in StateComparator::models_in_scope",
  # Re-pinned 1616 -> 1628 (cute-dbt#313 PR2: split_quote_aware extracted
  # `step_unquoted`, shifting every line below it in unit_test_table.rs down).
  "unit_test_table\\.rs:1628:.*replace - with \\+ in dedent",
  "unit_test_table\\.rs:847:.*replace match guard .* with false in split_quote_aware",
  # Re-pinned 1173 -> 1185 (cute-dbt#313 PR2, same extraction shift).
  "unit_test_table\\.rs:1185:.*replace \\* with / in single_quote_end",
]
